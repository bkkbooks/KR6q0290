body:
  text: 皇明成祖永樂二十一年四月御製普菴至善弘仁圓通智慧寂感妙應慈濟真覺昭貺慧慶護國宣教大德菩薩實録序朕惟如來以廣大智慧於諸人天普作方便為苦海之舟楫畏途之階梯所以極功德之盛大備名號之至尊正覺妙道流傳印土超天地歷浩劫永永其無窮焉近代以來有能具真如之體契大慈之心弘道演法濟物度人使諸有情均沾利益功德昭著不惟見諸當時而且傳諸來世若普菴至善弘仁圓通智慧寂感妙應慈濟真覺昭貺慧慶護國宣教大德菩薩是已惟菩薩慧性圓通根器宏厚紹臨濟之法緒領牧菴之宗旨峻機玄辨妙契華嚴具足六通游戲三昧靈應莫測變化無方其住世也心存利濟開化人天凡有禱求者隨所願欲悉皆感孚以故四衆傾仰如佛在世逮于示化之後行業彌高靈響益著功德廣大難罄名言於是緇流輯其傳法之派系歷世之歲年悟道之機鋒類粹成帙題曰實録朕嘗取而觀之究其慈心慧力莫非禦災捍患拯危救急化人為善而積其善因戒人為惡而脫其惡趣所以振揚宗風上裨益於王化下利澤於生民功德之盛不可思議焉然非有以表彰之曷以稱朕歸崇尊顯之心哉是用進加鴻號并為序諸編端鋟梓以傳非惟俾菩薩之貺異蹟昭昭然在人耳目而凡修習之士覽是編者莫不嚴守毗尼精修淨業皆得證無上菩提之果而同囿於佛日照臨之下以共享太平熙皞之福於無窮豈不韙哉右續文獻通考第二百四十七卷載寶永辛卯春正月道忠鈔出置本録之首皇明成祖永樂十八年十二月封普菴師制曰朕惟佛道以慈悲為體方便為用超卓萬有拯拔羣倫廣利濟以無邊妙神通而莫測不有丕承於法緒曷能茂振於宗風惟普菴禪師萬行圓融六通具足端嚴自在變化無方誓覺悟於羣迷普利益於庶類如溥甘霖於六合膏澤均沾猶現滿月於千江光輝旁燭眷此弘彰於靈化式宜荐錫於名稱今特加封普菴至善弘仁圓通智慧寂感妙應慈濟真覺昭貺惠慶護國宣教大德菩薩於戲教闡宗乘傳千燈之派系功施幽顯福四海之生靈翊我皇明永臻至治右續文獻通考第二百四十七卷載寶永辛卯春正月道忠鈔出置本録之首御製普菴至善弘仁圓通智慧寂感妙應慈濟真覺昭貺慧慶護國宣教大德菩薩實録序苦海之舟楫畏途之階梯慧性圓通根器宏厚紹臨濟之法緒領牧菴之宗旨峻機玄辨妙契華嚴心存利濟開化人天四衆傾仰如佛在世行業彌高靈響益著禦災捍患拯危濟急化人為善而積其善因戒人為惡而脫其惡趣進加鴻號并為序諸編端嚴守毗尼精修淨業皆得證無上菩提之果而同囿於佛日照臨之下以共享太平熙皡之福於無窮豈不韙哉是為序永樂二十一年四月十七日御製加封普菴禪師制皇帝制曰朕惟云云超卓萬有拯群倫云云如溥甘露於六合膏澤均沾猶現滿月於千江光輝旁燭教闡宗乘傳千燈之派系功施幽顯福四海之生靈永樂十八年傳法宗派圖臨濟云云五祖法演龍門清遠牧菴法忠普菴印肅默菴圓信雪菴師益寂菴印淨和光應世年譜乙未師於是年十一月二十七日辰時生庚子師至是甫六歲夢一僧點其心曰汝他日當自省既覺以意白母黃氏視之當心一點紅瑩大似世之櫻珠甲寅是年八月師依壽隆賢和尚出家而和光應世生辛酉是年四月八日填祠牒為僧禮壽隆賢和尚為師壬戌是年五月師受甘露大戒於袁州之開元寺癸亥師是年入湘訪溈山牧菴忠禪師師問萬法歸一一歸何處忠公竪拂示師師有省即回受業是歲圓通生甲子圓成生丁卯圓泟生戊辰圓信生己巳十一月望日牧菴示寂于黃龍癸酉師三十有九領使帖住慈化因閲華嚴合論至達本情忘知心體合處豁然大悟遍體汗流喜曰我今親契華嚴法界矣自此弘誓開化人天丙子師四十有二於五月賢和尚示寂七月師奉檄兼管壽隆甲申是秋圓通祝髮於慈化己丑師壽五十五矣而弟子圓通於三月三日示寂七月二十一日師索筆書偈于方丈西壁跏趺而逝悟道因緣師諱印肅號普菴袁州之宜春人也世姓余紹臨濟十二世孫牧菴忠禪師之緒有宋之時生於縣之太平里初師未生時鄰夜有望其室者祥光燭天遠近相諤已而蓮生道周或現阡陌衆愈異之及師生五相豐潤即善世言由是人始知為至聖之徵實乙未政和五年十一月二十七日辰時也庚子宣和改元之二年師夢一僧點其𮌎曰汝他日當自省既窹白母黃氏視點紅瑩大似世之櫻珠至高宗甲寅紹興四年八月遣師壽隆賢和尚賢授以法華師曰諸佛元旨貴悟于心數墨循行何益于道賢甚器之辛酉紹興十一年四月八日剃染壬戌紹興十二年五月受甘露大戒於袁州之開元寺聞牧菴忠公唱導溈山師入湘訪問萬法歸一一歸何處牧菴竪拂示之有省歸壽隆時癸亥紹興十有三年師甫二十有九矣癸酉紹興二十三年使牒請主慈化寺孝宗丙戌乾道二年正月一日始營梵宇至四年十二月落成弟子圓通圓融圓成勤勤贊襄與有績矣舊傳殿址本李倉監施而莫詳開迹何代也師利世不伐嘗言捨家出家當為何子披緇削髮本屬何因若不報國資家虗負皇恩勑命若不導化檀那枉作空門釋子每楮衣糲食藜杖芒屩脅不沾席者十有二年一日誦華嚴論至達本情忘知心體合豁然大悟遍體汗流乃曰我今親契華嚴法界矣遂示衆曰李公長者於華嚴大經之首痛下一槌擊碎三千大千世界如湯消雪不留毫髮許於後進者作得滯礙普菴老人一見不覺吞却五千四十八卷化成一氣充塞虗空方信釋迦老子出氣不得之句然後破一微塵出此華嚴經遍含法界無理不收無法不貫便見摩耶夫人是我身彌勒樓臺是我體善財童子是甚茄子文殊普賢與我同參不動道場遍周法界悲涕歡喜踊躍無量大似死中得活如夢忽醒良久云不可說不可說又不可說始信金剛云信心清淨即生實相實相既生妄想生滅全體法身遍一切處方得大用現前即說偈曰揑不成團撥不開何須南嶽又天台六根門首無人用惹得胡僧特地來師一日復舉似心齊圓通二子云達本情忘知心體合汝作麼生會二人顧笑云未達翌日各呈頌師因題云據宗眼一觀句到意未到其體未合其情未忘不免強書數字歌曰解佩令也明眼人前覷著三十拄杖不饒為什麼如此不合雪上加霜解佩令云先天先地何名何樣阿曼陀無物比況觸目菩提自是人不肯承當且輪回滯名著相圓融法界無思無想廬陵米不用商量血脉才通便知道擊木無聲打虗空盡成金響柏庭立雪一場敗闕了無為當下休歇百匝千回但只這孤圓心月不揩磨鎮常皎潔無餘無缺無聽無說韶陽老只得一橛十聖三賢聞舉著魂消膽裂唯普菴迥然寂滅俄有僧稱道存自蜀冒雪而來既見師曰此吾不請友也遂相徵詰棒喝交馳心心密契僧曰師再來人也大興吾道非師其誰因指雪書頌而行自是廣津梁崇塔廟禦灾捍患天動物與雖鬼神莫測其變符頌藥水驗世非一嘗自贊云蒼天蒼天悟無生法談不說禪開兩片皮括地該天如何是佛十萬八千己丑乾道五年七月二十一日沐浴書偈于方丈之西壁云乍雨乍晴寶象明東西南北亂雲深失珠無限人遭劫幻應權機為汝清枯木救度書畢跏趺而逝至冬十一月一日奉全身于塔己亥淳熙六年正月弟子應世書請臨江艮齊謝公諤銘其塔慈昱不敏膺二十三傳之寄因次其略以曉來學其諸靈應詳見內傳云塔銘佛之道以慈悲為體以方便為用外此空談虗說苦志刻心以至費日窮年居巖走市皆非佛之本意故為其徒而方袍圓頂去亦必以是而後得其正二十年前余在鄉飫聞袁州有僧號普菴者其所得非吾所知而其事迹深能動人耳目所以江湖間奔走傾動以不得見為恨然其諄諄不過誘其為善戒其為惡證之以如何為吉為福感之以如何為凶為禍聽者皆足以發其善心而消其惡想若此者千萬端矣至於世之所為緣事者如修橋闕路以濟於人凡波濤險要之處在在多其所成就其工力壯偉規撫氣象照映山川所以論修造功行者必以普菴為說他方之興工役者亦多祖普菴之餘余亦歎未能一識以償宿願或過其橋每諦觀其題字偈頌而欽羡之大率出於慈悲方便佛之道其在此耶淳熙六年正月其徒弟僧應世者惠然遣僧持書且出新荊南節度推宮歐陽世美所狀行實俱來以塔銘為托其言有曰先師歸寂逾十年矣每念法乳之賜獲大安樂而缺典慊然于心噫余固不能無前之說則銘以為宜師名印肅宜春縣余氏子六歲夢云云櫻珠父母因此許從壽隆院賢和尚出家年二十七落髮越明年受戒師容貌魁奇智性巧慧賢師器之勉令誦經師曰嘗聞諸佛元旨必貴了悟于心數墨巡行無益於事遂辭師遊湖湘謁大溈牧菴忠公因問萬法云云後歸受業院癸酉歲有鄰寺慈化者衆請住持寺無常住師布衾紙衣晨粥暮食禪定外唯閲華嚴經論一日大悟遍體汗流喜曰我今親契華嚴境界遂述頌曰揑云云自此之發為言句動悟幽顯有不期然而然者一日忽有僧名道存冒雪至師目之而喜曰此乃吾不請友矣遂相與寂坐交相問答或笑或喝僧曰師再來人也非久當大興吾教乃指雪書頌而行師乃庵隱南嶺其號曰普菴忘懷于世因四縣巡撿丁君驥與長者劉汝明同請出山願助營費重為慈化修建佛殿師辭不獲竟從請至斯慕道向風者衆師乃隨宜為說或書頌與之有病患者折草為藥與之即愈或有疫毒人迹不相往來者師與之頌咸得十全至於祈雨祈晴伐怪木毀淫祠靈應非一由是工大興富者施財貧者施力巧者施藝寺因茲鼎新延及數千里之間闢路建橋樂為善事皆師之化或問師修何行而得此師乃當空畫云還會麼其人云不會師云止止不須說其峻機玄辨多如此而歌頌讚語遍傳人間如證道歌判元録已盛行於世忽一日索筆書頌於方丈云云枯木救度頌畢示衆曰諸佛不出世亦無有涅槃入吾室者必能玄契矣善自護持無令退失索浴更衣跏趺而寂時則乾道五年七月二十一日也享年五十五僧臘二十八十一月一日全身入塔是時四衆雲集悲號之聲振動山谷蓋師之終始大槩如此以余所聞其奇蹤異迹固屢書不一書而足今姑以荊南之狀為之序而銘之銘曰佛念衆生廣存濟度循常道故或未易悟間出奇偉耳駭目驚激其善心土纍山成惟普菴師名藹鄉國聞者見者默然有得亦建棟宇且營橋梁作方便唱源深流長雖然如是是亦游戲其行非行其止非止師乎無心雲開月明師道常存何有於銘御製普菴云云序即心悟道即道證心浩渺汪洋莫極涯涘師因華閲嚴經契悟乃曰云云忽醒良久復稽首笑云幸遇不可說云云二人相視笑云云寂滅上堂示衆應化非真佛從緣起塵劫未悟今日有因普菴指迷歸正先持戒定以安家次助焚修而報國自經三載梵宇將周普化十方資金不匱僧行皆忘飢失寢道友乃努力堅心各受苦辛而無退轉被魔遭謗而自辦肯心亦不害命傷靈亦不拋家失業念生死之大事思業劫之難逃若不自覺覺他誰當度汝今觀得悟成佛菩薩皆因纍劫修心了通一念便解變大地山河而作黃金棄世間金玉而盡同瓦礫却於無相妙門示現百千三昧化萬類而說一心摧百邪而依正道談禪瞬目無非實相要指迷津莫過了悟又明王公宰相朱紫賢侯若不從十善修因現今安能如是但是十相具足福德之人皆是前因今受其果而嗟品類貧窮下賤衣不蓋形食不充口被人驅使不得暫歇劫盡復生披毛帶角萬劫也難為勸化千生而那出苦輪患因世世貪嗔苦由生生結業苦患因誰造元來只自心富貴從何得輸機本自平所以佛假大慈悲視衆生如一子廣弘誓願大建法幢假說三乘指歸實際若無諸佛說法誰立十聖三賢若不禮佛為師爭獲超凡入聖法不孤起緣在衆心共贊同成須依知識知識乃分善惡迷悟不同凡情而逐相隨聲豈辨箇中真僞真則法身清淨有作者權化衆生得箇入頭方自醒悟能分緇素心境一如僞則色空儱侗語默瞞頇談經而不會佛意說禪而豈入宗通自己業識茫茫無本可據那更與囚人解縛醉體䭾人千年暗室不逢燈更用濃磨墨汁潑瞽人引路衆盲而盡墮危坑邪術治迷合家而全成疫死正法者了心達本體若虗空不動步而法遍十方一剎那而圓成無漏性相平等事理皆如未嘗見一衆生無量光明為眷屬萬象鏡中無影迹千燈一室焰重重若能如是方表出家苟或未然直須自省是故圓覺經云成道亦無得本性圓滿故又云覺遍十方界即得成佛道又云修多羅教如標月指若復見月了知所標畢竟非月依師不正是謂邪師邪師過謬非衆生咎善男子經是佛語禪是佛心心語非文佛法無說是故金剛經云無法可說是名說法無相為相是名實相無法可得是名真得無心可得是名真心真心遍一切處而無二體於無住本建立一切法所以普菴老人蒙佛慧我三昧無缺無餘常住世間而無欲一物出世間而豈說自功於十二年中深藏祕密間搜藏教不在文字而見法身強覽傳燈識破機關而超祖意遍身法體達麼堂堂教詮萬法唯心真如獨露是以見人詰不見對夫子以難言了道無言入孤峯而隱迹復覩信心奔禮朝夕不離重運智悲佛恩德念今生而一了更不復迷觀纍劫而勤修方能契合我雖自度愍念群迷若不應物隨機箇裡終無利益經云唯以佛之知見示悟衆生故世尊出世若無衆生佛無出入遂向頭上安頭應聲應色知我者不消半箇不知我者從化百千我似野鶴孤雲法身圓足汝似水月空花無本可據若竪指端標實相你道我顛若拈主丈究心你又怕怖若教看經念呪又如失乳盲孩若教禮佛坐禪反成法縛若教你常在我邊無可咬嚼深觀淺喻察其情而難逶玄關不免假立化城權歇塵勞而指歸寶所寶所在近是汝本家大寶無邊汝不得用父母念汝見子無因欲得汝歸委付寶藏汝若不辭道遠途旅艱辛淡寂為心孤雲作侶日復一日年復一年食無求飽而事理現前居無求安而定慧常圓忽聞鶯啼柳陌叫賣花天目擊而父體無邊子到而七珍布地更說什麼華嚴境界且休誇極樂西天不因漁父引深溪爭得透龍門而及第初聞佛說將謂我永作衆生今日妙聞頓悟而佛無別體所以建興古剎慈化道場先祝聖壽以無疆次報群臣兼宰相四恩三有即我自心我心淨則法界平安我心背則成無間業天長地久法雨慈風會萬物以同源等乾坤而為一珍重上堂示衆上堂云三界唯心唯佛解萬法唯識更誰知迷悟本無權立化恰如黃葉止兒啼涅槃生死猶如夢十聖三賢是阿誰有物先天無相貌言詮不及體阿彌祇這阿彌是汝心不勞逐相外邊尋三僧祇劫隨時立心心心即是如今若人不了心非相執境迷真著色了色通聲無二體山河大地說真經敢問諸人真經作麼生說良久云今妙音無間歇除非迦葉不聞聞又云還會麼若於這裡會得便許你與佛祖同一段光明與普菴共一箇受用如或未然只今不惜口業更直為諸人說破善男子要會麼盡乾坤世界是你一箇眼睛父母所生之身是一箇翳子一切凡夫不知這一隻金剛妙明圓鑑不虗的眼睛堅執一箇父母緣生微塵翳子所以認空華為實相捉水月為真形出生入死幾時休汩沒輪回何日了相殺啖為苦報種相愛淫為生死根改頭換面親非親戴角披毛滅不滅且不知一微塵中有十方諸佛說法不斷亦不知一微塵中藏八萬四千無間地獄只管認有作無將虗為實古德云一翳在眼空花為實相捉水月為遍界忽悟本心無法不解若能一念見善知識聞法信受自得心開當下見性充滿法界無物不融無塵不透無法不通無我我所說是誰得不可說而真常說不可得而祇麼得以法為身身含十方無盡虗空不曾有一微塵與我作對亦不見有一法是我所得若到這裡猶如一輪寶月孤明寂照又如一顆摩尼隨色現無名相無邊表絶對待非大小亦無生亦無滅照燭森羅光不歇如斯方是破微塵若不如如終未徹華嚴經云有一智人破微塵出此經卷量等大千佛語不虗少人信解善男子善女人汝今不發一善心即是惡業衆生佛稱一善與汝安名者人發善願天必從之一切恆沙功德從此一善而發生永不變壞地獄長劫苦痛因此一惡而招報難脫苦輪善惡只由汝心苦樂只汝自受如今貪嗔癡不歇決定三惡道難除如今慈悲智堅牢決定見性成佛道今時愚人見果不知因念念發無明恰如不下種空手等秋成朝夕興殺害臨死告觀音佛出也難救虗枉費精神一失人身者萬劫墮毛群智人驗果便知因了真非相亦非名言滿天下無口過行滿天下衆皆欽若要廣度河沙衆不如我自了真心達得無心元是佛始能方便接群生自不持戒令他持戒無有是處自不清淨令他清淨無有是處自不見性令他見性無有是處自縛未解解他人縛無有是處是以古德云迷人未了勸盲聾土上加泥又一重悟人有意如迷意常在迷中迷不逢諸仁者你如今怕惡樂善持齊奉戒切不得依附外道邪魔夜聚曉散貪色愛財傳習妖教妄起訛言此是白衣假說南宗北祖四果修行壞民種族永無利益官司不住根究莫令被他捉著生入牢獄非輕死墮無間不淺諸仁者邪法如氷霜正道若太陽杲日麗天無不照氷霜仁消洋佛說三乘十二部會來只是一翳方長年有病不尋藥五千餘卷枉施張魔王眷屬成群隊朝夕巴歌作道場唯有普菴真實要同音異口贊吾皇大衆贊吾皇一句又作麼生道良久云將此深心奉塵剎是即名為報國恩珍重浴佛上堂本自無名古聖默契靈知者強之道法身無相瞿曇老婆心切假相曰生生本不生滅本不滅生滅本無谷神全者方便隱顯我佛釋迦因地於歷劫恆沙身命財布施為法忘軀皆不離有為所以真心未契直至會遇然燈於一切法無所得故始發菩提心方得受記於來世作佛權號釋迦因斯公案未了不免幻化臨時混萬物而出生一法身而湛寂屆當四月八日摩耶脅開悉達化生地神捧擁九龍吐水淨法界灑無邊身七步生蓮指天指地誰敢應正當恁麼時兩不相見若遭雲門一棒誰肯向前相問直是狗子一飽忘千飢大地生靈且不知自心口毒雲門老應須絶未見牟尼今日浴佛普菴則不然昔日未見然燈我道分明顯露及乎見了知之恰似不曾何況未離兜率已降王宮未出母胎度人已畢更加說法四十九年現種種變化神通又向雙林入涅轉轉無端今問大衆還有具一隻眼睛的麼出頭來與你同共證明大家浴佛苟或未然觀吾一偈稽首摩耶大肚皮無憂樹下手攀枝母子至今無覔處落花啼鳥示全機涅槃圖法語諸行無常是生滅法生滅滅已寂滅為樂如來證涅槃永斷於生死若能忘心聽當得無量樂普菴和尚以涅槃圖現月輪相權設建化門會初發心功德人見性成佛示衆法語夫破一微塵之大覺體用全彰演五千四十八卷為教詮言言體實指八萬四千妙門同歸性海用處無空事理宏該卷舒自在豈不見先天唯一氣假道以權名含容萬物而亘古亘今離諸性相而孤明圓宗靈知空劫直至如今不滅不生不增不減本無四生六道皆由妄想發生古聖慈悲遺經設典欲令衆生反己權標儒釋道名立像標心假言入要是以儒宗孔孟道究老莊釋探真空三元一體其體也非空非色非有非無包天地而一物無遺利有情而常光獨耀如斯妙本罕遇提綱聖遠邪深魔強法弱自達磨西來不立文字直指人心見性成佛賴得一花開五葉結果方成然後六祖大鑑禪師普傳天下心心相印號曰傳燈了了靈知隨機開示或有沉空滯寂或有執相馳求即栗橫擔千山萬水自不知身是道場念念處塵背覺中道退忘永沉魔界或有白衣俗士四果長齊盡是苟利纏身壞民種族箇箇死如生龜脫殼人人終似活剝狐狸速入阿鼻永沉無間古德云一盲引衆盲相牽入火坑圓覺經云非衆生咎邪師過謬豈不見達磨初至少林面壁九年水泄不通二祖立雪斷臂達磨亦未可信在二祖告云請師為我安心達磨云將心來與汝安二祖云覓心了不可得達磨云與汝安心竟二祖豁然大悟本心遍一切處方會達磨西來之意次第相傳至於六祖如今說法難竝先賢有名無實末學誰知背覺合塵難求正見普菴初精究於華嚴次熟披於海藏忽覩彌勒樓開親見善財行履處然後淨名方丈之中通光不二便見楞嚴七處徵心知阿難未明此事當下心開廓徹實相融通於心外無心而三昧現前向頭上安頭而提携後進是以遊戲般若建立涅槃重興佛祖之規開示凡情信入普告十方善男子佛於楞嚴會上與阿難言本來無有世界衆生因妄而有生因生而有滅生滅名妄滅妄名真是稱如來無上菩提及大涅槃夫涅槃者是衆生之本性故曰涅槃金剛經云若胎生若卵生若濕生若化生若有色若無色若有想若無想我皆令入無餘涅槃而滅度之心經云遠離顛倒夢想究竟涅槃裴相國云寂靜常樂故曰涅槃善男子三界唯心萬法唯識識如夢幻心本涅槃一道如如精通冥密是故經云若人欲了知三世一切佛應觀法界性一切唯心造若人能特十善報生天福堅持五戒復得人身觀其法界除一念見性成佛之人其餘所得受生王公大臣顯官富貴形相端嚴聰明智慧蓋是修行布福慈悲喜捨不退善根而報生如是若是知因識果向上增修了悟本心見性成佛永不變壞觀其貧窮下賤披毛戴角著地飛空千種萬類皆纍世為人造十不善業行殺盜淫故招此報經云世間之樂皆是苦因是故一失人身萬劫不復唯佛知之凡情莫測若不明理誘進群迷將何報答佛恩豈可名為知識伏願諸佛子盡發菩提心返本還元免沉惡道若到這裏直是斬釘截鐵轉不退輪但辦肯心必不相賺假使鐵輪頂上旋定慧圓明終不失上祝萬年聖壽國祚延長諸佛道場法輪常轉文修武偃雨順風調天下太平人民快樂普禮三身四智佛一念阿僧祇劫中身心一如遍法界法身不滅壽無窮一月六旬權準則一年四會表參同妄念不生無損益五千連貫贈寰中所得未嘗圖別用共成進納續宗風初法難傳憂不信黃梅五百獨盧公如今箇箇堪分付報國資家理不窮莫道祖師西土出剎那自肯即心通涅槃經云諸行無常是生滅法生滅滅已寂滅為樂如來證涅槃永斷於生死若能至心聽當得無量樂普菴云信心清淨者共入無餘涅槃之圖為圓普二字行童普說上堂云此中寶所非從妄想發生心地光明應化萬緣如是人心佛行佛行人心遇末劫則地獄現前逢明眼則彌勒境界為什麼如此所作無心自然契合不用皮毛滴酒二三載何事不圓終日杜門信施力財而未嘗少缺道非傲物顯天真佛豈背人法身普應若無靈感於物何異紙𦘕日頭若有應於群心杲杲炎光遍爍聖凡難辨龍蛇混雜以同居迷悟同光佛於衆生而一體悟則方通消息動靜法益群情迷時總屬夢游生死無明顛倒夢中說夢迷覺不分醉戒醉人傍觀呵笑善男子欲求解脫依師戒定慧方成日久月深般若純熟心法現前由人努力不在遲疑今日雖安來朝難保人似浮根岸草水急難留且無可救之人誰作波心之主唯有真心廣佛本自不滅不生猶若虗空包含天地顯假名則無窮無盡建法幢則無量無邊二乘外道不通玄根境法中虗揑怪妄謂諸佛有法可說卜度法身妄認識神更不求大悟了心一向愛他文字所以徒學多知返成謗教老僧若不了心與汝一般愚昧今幸具足元常意光無盡所以終日杜門怕逢醉漢有時苦口汝又不行朝夕而只是自瞞懶惰而怕見和尚不肯息心自悔廣作衆緣天龍嗔呵護教不肯一時業報現前難瞞衆目若是箇信佛依法修行之人為法忘軀寒灰冷月深思古德非少善而得見如來復想我身無一德而助資衆善假使十二時中懸腰墜石猶自妄意粗心直饒粉骨碎身箇裏難求良匠今則棄俗割愛忽遇斯人何不速辨精機信心實地步步依如念念不退究竟涅槃定歸實際與佛無殊天龍守護鬼神瞻依邪魔摧落千古而不墜玄風長劫而本光不動所遺言句自有護法傳扶所立標宗劫火應不能壞如斯精妙事由一心舍短從長豈由他悟佛教則如標月指祖說如潑水示氷見月知光釋氷為水然後大感佛祖之恩殞命猶難酬報我迷心法經劫而不出塵勞今悟佛因見性而永脫生死拳拳在念豈不快哉安比十聖三賢二乘圓覺五蘊不空輪回不歇任你聰明超世不離三界循環假饒移山填海猶落非色界中雖然雷電奔馳不出五通陰界直饒橫衝直過也不出諸佛法身未解自己本無一切有為如幻直須幻盡覺圓具足實相將大地山河為自己以色空明暗顯真如指南柏以標心顧西松而露意方寸逈絶於能所大千無假一微塵受用身心不落有無知見為人拈舉非干聲色指人心如斯方是出家兒不誤後來之初學等觀今時聚此出家當求何事教汝持戒一行不持令汝澄心愈增嫉妬教汝擊鐘𮘗呪也無一字分明隨時逐隊開喧只欲打過教汝恭敬往來廣結歡喜衆緣汝又要自求間靜迷識沉神食氣不和自成病體諸事難為必竟變壞又入魔徒百千萬劫不遇善知識汝等今時遇我出家知汝來處亦知汝去處只似空花從空而有我不得全定汝作妖魔我著汝魔同歸魔道我若如是法身法身如猛火𦦨邪魔猶若氷霜汝是消洋法身常住亘古亘今永無變壞所以千佛萬佛只傳此心歷劫恆沙此宗不壞汝之業識雖聞不信後日明朝自當敗闕莫道良醫門下猶有病夫爐鞴完全尚存鈍鐵自是覆盆之下而不肯開張暗爛敗根斯光常在不從直訓役我多言若是善根何消如此各自努力但辨肯心一切時中究竟如是珍重示徒血脉論圓普二字猶是假名雖以假名而談實相若據正宗於汝無一微塵許與老僧為緣為對只是從佛口生依法化生成真如者假名釋子了知名相從何而有幻塵滅故非幻不滅諸幻雖盡不入斷滅解如是法無得無證若有得證必歸斷常以要言之真實不虗真實不實表裡瑩徹明眼可驗何以故表權形色裡實心性心性實則形色光輝形色劣弱則心性虗妄汝隨業識強順師顏不依自本而由顛倒所以增長無明起諸違順故現斯果知之否也歌云了即業障本來空未了應須償宿債汝之宿債曷可具陳萬死千生處處結習汝之根性不脫父母何以故父精母血因愛和合汝識遇緣如竹生笋苦甜堅脫必竟非異所以佛悟法身圓滿猶若虗空始於自身中妙解一切衆生皆本是佛故演十二因緣六波羅蜜教化有情返源還本破一微塵而識自心量等法界指權就實點墨成經為如來藏若有一根發信心地開通便能透脫纍生習氣知是空花實無輪轉如來因地而圓覺不復更迷衆生因妄而顛倒生死不停生死不停則老病死煎冤家聚散六道三途披毛戴角而卒未休寧是故佛詮極提大患往往先覺非剎那而便自肯心動經歷劫以身命財而布施供養恆沙諸佛普修萬行良因百劫慈悲念念精進常無退轉一日時節到來如夢忽覺了無生死業緣解脫如空無礙却來觀世間猶如夢中事便能順情起諸如幻廣化迷徒自驗本而識末就現果以知因窮極自他悉皆如是出入動靜惟我自知生死涅槃是誰分別何以故虗空性故常不動故如來藏中無起滅故無知見故如法界性究竟圓滿遍十方故是則名為因地法行十方如來一切菩薩無不因斯而得解脫真源澄湛瑩徹周空覺海汪洋普滋法界世間希有天上那聞越聖超凡摩尼無價所以父子難傳於此法過在耳目之間君臣相遇以徒勞道非境界直得投崖飼虎割肉濟鷹捨寶位如棄淚唾灰身心猶若死尸知道不離慈悲作佛須當練行若不灰心練行喚什麼堪表修行若不為衆辦緣將何發齊心稱贊福從贊嘆而生罪因慈忍而滅罪福由人賢愚各守了法身之大事豈敢胡言才有是非紛然惑亂只是因芥子而墜立針鋒難逢罕遇似浮木而權歇盲龜幾時曾見妙觀察智不出師心了境含虗箇須真佛因何汝等依幻說覺自瞞方寸以所知心卜度如來用世語言作佛知見理成誑謗不出魔關恣情自高暗讐憎嫉而自不知看看福謝病苦俱臨更向業果裏增嗔又向真如中加謗喫著不得是無福受用不得是無緣疾病纏綿是果報嫌恨自他即業識若不識心如何脫病若無六度魔魅出家不信真言寧熏俗種師指千言如鴨背上澆水俗談半句似箭射入芭蕉普菴似認賊為子賴得我墻壁堅牢汝等如羊質虎皮到處而常逢虎豹自不知醜明眼難瞞若不恁麼為祖稱師猪摟羊捲裏也不少何不子細參詳佛法豈容易得須是步步依經而首行六度解佛玄宗而不著名言指東道西纖毫不立雖知佛法而聖凡難解也須方便而不住化緣我既了心因佛教誨若要報佛深恩歡悅見在佛子三界即我佛一心萬法即佛一識若向孤峯絶頂不離世間若或穿市過街湛然常寂如是一念其疾如風賓從甚多其室廣博容師子座不與凡流同生滅唯達道之人口說無異風入松嶺他有分別時我無分別我有分別時他無分別是知主伴重重狀似千燈同一室性相平等譬如萬象一鏡中與麼猶自寐談諸佛亦復如是快早警䇿改過修真莫執無明無益己事信我如是者究竟作佛不依如是者總著前言血脉戒針直論如是老師述離垢堂訓行童咦禪關律戶離塵脫俗者宜登具眼鉗鎚唯斬釘截鐵者可見為什麼如此佛法無多子久長難得人豈不見黃梅會下五百徒衆到頭只許老盧一人至今曹溪遍界自餘者亂稱南宗北祖燒香四果皆是貪財愛色敗壞良民直至而今凡情不測生受世間牢獄死入無間阿鼻豈明佛性自心免逐邪魔群走佛說一大藏教更不披尋隨他去禮拜村人妄想道了却四願咦你尚未了業識逃何況我今便能解脫我被火宅煎熬你又貪色愛財二家如此荒忙佛法有何交涉祖師心印猶如太虗佛真法身亦復如是佛祖二名一體禪經兩字同宗打破祖父機關弄出紅塵師子怕時恰似落空契了真如不二轉凡為聖由未清醒入聖超凡方通這裏裏許也不存我見我見則猶落他觀直是六種震動箇中不漏纖毫一目圓光剎塵普現說得行得殺活自然吞納有無摧邪竪正萬法乃唯心一體一道而不出本光如斯妙解之人汝可依為師範善男子吾若不道安作汝師誑說法人罪不可懺假稱悟道速被邪魔自斯業識茫茫更受衆人禮拜不獨瞻禮更有施捨歸依福不回他令他失望須是通光非相一用無私本末全彰故非外物會萬法歸於一體了法界具足針鋒終日喫飯而不曾咬著一粒糝長年著衣而不曾掛一絲住時腳不點地行時寸草不生臥時天龍守護坐時體若虗空四事供養敢辭勞萬兩黃金也消得祇這阿師應不賺汝便喫拄杖三十也知道打草蛇驚若受千言教誨不肯聽時翻成毒藥一言之下心地開通舉拂拈槌要知落處若是箇難死種深知火宅煎熬四大難避幸然跳在般若光中又遇明師指示一聞千悟鼻孔無邊才見老師出方丈門便奪取拄杖子打折腳教老師一生起不得四天門王扛不動也要諸方宿德亂走禪和知有與麼事善男子我今見汝正是飢逢王膳不能餐病遇醫王爭得瘥只是箇久靜思動久動思靜父母被汝煩煎造罪更來惱佛也不知普菴是悟道之人亦不知自己入鑊湯爐炭猶自眼裏火起舌上烟生恰似一堆爛草藏蛇踏著時只消一口又如野馬無繩千里追風難趂不望你成佛作祖說法度人只得汝自息塵勞免招後報忽然老師不露形相汝却出頭來一領紙被且蒙頭度日何曾沾粒糝腹裏氣如鼓響耳聞全若鐘聲巖前枯木恰相當心月孤圓常快活去則如雲出洞湛體何移三家村裏邏茶湯十字街頭覔飯喫楊州夜市插足時不礙髑髏酒肆淫坊展手時摩尼滿目因緣甚事得解如斯初心一見便無心誰道我今無住著隨方設化觸目遇緣精金應不變為塵一悟無生永不錯當知本佛何假更修只傷礦重金微得旨淘金去礦又逢爐鞴完全鉗鎚本分所以先覺遺經禪宗方便一夫酒醒扶起衆人一箇眼開群知天曉不妨於行住坐臥師子威儀闡大慈悲作多方便化迷成佛有為萬法也難齊指示歸心世出世間無可比切莫學狐狸野族壞汝千生答不落因果尚墮五百生中度日瞞人罪非一劫拜辭父母棄捨六親直入空門誓究空王之道灰心歇念失寢忘飢投禮明師願悟無師之正訣其餘世間塵事無私妙智鎮常包佛談生死涅槃廓徹靈明全體納既到這裏何必方袍佛果現前豈干落髮未悟本心成佛更頂戴一座鐵圍無不是殺命傷神方與你連成一貫皇恩勑牒且非是喫酒曆頭甘露戒壇又豈比教驢習馬言言說戒字字教持初地堅修故須如是佛觀衆生種性難化立法而曲為狂癡前業猶未懺除轉更破齊犯戒看經滿藏問來一字不通禮佛百千執相皆成虗妄或向千山萬水即栗橫衝見人時面目向天打坐時袈裟裹腦齊粥稍晚魚鼓鳴遲心中起怒毒如蛇叱喝主人無鑒識挑包頂笠直下雲山又向荒村隨門乞食得多時廣揚贊嘆得少時面如死灰夜宿漁亭朝遊酒肆釋迦入涅佛法委付王臣知道邪魔未興濫汙那有朧諸佛愚昧神仙經云若人食肉便同羅剎假道現形壞民種族法身如太虗現形如水月且不見太虗行淫食肉又何曾見水月貪色愛財法身應不如斯水月難為把捉太虗水月舍利之子則色不異空法身非相大解脫人則空不異色若是釋子定契斯宗若是邪魔魂消識滅這般道理唯佛能知十聖三賢且無門路堂名離垢二地果中汝等入此旦暮一如更不安規立矩也不縛汝坐禪依吾口道學吾行用吾三昧精進力若背師說汝招後報決定依師即自心自心非相即實相自性如空即真空忽然喚夜作天光常在天光見彼夜這裏汝超無量法不許人將聲色傳為衆行童小參上堂云無見頂相放光明大士不離汝心說波羅蜜未嘗間斷深嗟六道流浪四生終日圓覺而未嘗圓覺如盲子居日中而不見光明而問其母曰如何我不見日出常居黑暗其母告子而泣曰我子我子汝乃宿世不善之業障蔽一切功德破壞佛法使諸修行衆生不見自性本光如今使汝目盲如居黑暗不覩日月燈光而不見一切妙明殊勝非無日月燈光照燭子形我今哀哉無計是汝自殃非日為咎汝今若能自悔前罪我作十不善障蔽自他修行佛法行孝順心饒益群情作大佛事我今受苦猶如地獄如今無目必竟來生無目來生又死劫劫生生常在黑暗聞名聽聲悉皆苦報痛至方知壞形復死死中又生生中又死生生死死更無別心只是你心絶光斷明人與非人吞汝殺汝千般苦汝萬種殘汝不得休歇當此之時求誰懺悔誰是憐汝誰是汝父母誰是汝六親何不快轉心輪自家警䇿除佛一人與汝說破其餘朋侶及汝現在親戚父母亦不能知此事他各自迷心與汝一般盡是業識茫茫有何可定今日不知來日事貪嗔癡愛度朝昏披毛戴角更相互豈識修真般若門且如老和尚自從大唐老師所度據正宗大乘佛祖流傳教藏消息子細消拜看來全無一絲毫作用如佛祖所說皆是世間凡夫所作所為我此時曉夕不眠在在處處常自思惟若只恁麼看他如此敗闕到死臭爛與凡畜無異又何名出家若只如此出家更有什麼奇特事何處超凡何處越聖何為了心何為出地獄何為不生不滅何為得出三界輪回何為離宿業冤讐何為脫披毛戴角何為成佛作祖何為可報國王水土天地日月護惜臨照之德何為可答父母祖宗令他一念承我出家功德悉得解脫何為自覺覺他成彼佛事何為教化大地衆生得佛正道何為摧邪顯正何為荷擔佛法何為建立道場開發迷悶衆生各相解釋所以淨飯王宮四太子捨棄金輪王寶位向雪嶺修行苦行六年飢餐麻麥受萬種苦蓋為一切衆生求此一心大道為法忘軀慈悲忍辱未算他於過去生中作忍辱仙人於恆河沙劫以身命布施而求此心功德圓滿報身千百億化身說法四十九年以成三百餘會度脫衆生不勝其數尚有海藏金言撮成五千四十八卷西天親傳正法眼藏者首傳迦葉轉轉相傳計二十八代而有菩提達磨大師亦是國王之子受二十七祖大師法印遠來唐土救衆生九年面壁於少林立雪斷臂為二祖而又次第傳燈至於曹溪六祖大鑒禪師已後此土大振玄風廣彰實相天下名山皆此宗而建立應超有漏不出此心如何現在出家不思本事只管一向用貪癡而作出家行殺盜淫而作佛事是何道理迷昧如斯豈不賺他俗子破壞佛門三界混然全無發覺癡癡如醉妄想若顛出死入生誰訣醒汝哀哉痛哉連日徹夜我如失大寶藏珠又如忽喪考妣了不能生了不能死唯我自嗟每向人前無堪告訴又復禮佛轉誦諸教論詮兼傳燈録不得自性開通求師無地覔侶無門於是兀坐忘身息塵慮習不覺日至一日年過一年經論入心非口解說行慈運悲饒益不倦深知經教都說自心但要慈悲常懷忍辱供養一切含靈衆生便成自心功德愛老憐貧忘飢失寢在在處處利益一切人歡喜接一切人為一切人作方便而不求果報為一切人興佛事而不見善惡我人漸漸揩磨不久忽然透石穿山光明遍照信知佛祖只是自心卜度真詮皆為我語方始發大誓願救接迷徒自然而百衆來瞻不求而殊勝自至我以法身淨妙猶若大虗智體雙彰慧身一合對機演教隨事呈心開方便而不離其心釋邪魔而不憑別法是以五年三載自在如然從他毀譽而我道無心任彼詰徵而無少缺書詩寫頌對病用醫發藥施香真常佛事不苟分文之利養巨剎圓成不求一箇之衆生法施具足修橋布路逈不同凡演道諷經山林佛韻如斯善境安不快哉如何我輩行童不依正教一向作業講說是非超過凡夫所作業報汝今不信我道如斯不久天魔教汝自見莫怪老僧若只是汝不離俗家習氣來近老僧老僧即非邪師自悟本性識破前後因果好惡是真是假若悟若迷見一字也便解來因聞一言而便知落處汝今瞞我只是自瞞汝今依我只是自依向我則萬世光明背我則沉劫墮苦墮苦則汝身自墮光明則汝自成佛我法如是諸佛亦然只是勸人達本明心其餘更無他事珍重善說行童上堂云現在出家收拾二十餘人行童於中無一人肯信我教化行住坐臥靜習威儀求了生死大事欲望出脫塵勞見本性而達妄緣都是業識深厚乍聞有悟道普菴便即時要修持齊戒及乎得作行者便更不思十方信施衣食難消佛法是甚麼事速求易得善男子諸佛菩薩經劫捨身受苦不生一念退轉嗔恨之心不起我人之相尚不能得見一真正元本之師此箇法門光覺古佛若似如今親見普菴及上古本色老人應不到經劫受苦不得現前不道無禪只是無師觀其所由你這一輩盡是久靜思動久動思靜之流與佛法究竟沒交涉且如慈化原本寂寥一竹一木尚難為十行五僧何可度雖古有屋亦是衆生緣會時節一期興衰變謝今古自然似浮雲亂起於長空如春夜遍開於大地微塵含佛剎佛剎裹微塵茫茫習業而人畜相吞念念勞形而不知本體體之唯佛解者名師依本即師師心即本本師若虗空迷人怕入迷人似水月不可得形纏藤摝水而虗度時光箇箇相爭而不識本月圓咦却在這裏這箇事若聞師一指便肯全收更不待少頃明朝無我人相若有人我水月依然時時而妄想空花碌碌而轉歸無間再思此事便變魔業而落空佛奈汝何我安施力汝等幸自遭遇得人如芥子投針鋒一念發齊若金鑄鐵打又更父母愛緣已斷六親纏網都除且無一事在心頭況遇明君持世界不令絲髮惱汝修行果獲良因先崇報國四恩乃衆生常背三有而輪劫不知不習善因如何資答願聞諦省速脫包纏於一相無相之中明通道理於一身多身無礙露柱全光脫過現未來萬種之罪愆了阿僧祗塵劫於一念若與麼親見實用方可以少分勸發迷徒若也緇素不分遇人切莫開口罵地喝天猶通懺悔狂謗佛法罪劫難消若向出家門庭非是貪衣覔食設求衣食父母六親豈無若是求名取利因緣應不出家出家乃脫俗離塵不求所得孤心隻意入空門而頂禮投師絶念忘思探經論而只觀自性若清淨便證法身更不別求一足永足張三李四相逢似覩夢形同道師資稽首如觀幻境知一切法不得自性惟我玄通似空含像指燈籠而真機誰解撥黃葉而箇意誰知且不問年月日時秋冬四季不談佛法不解吟詩一番紙被重三斤一領布衫拈不起也不愁明朝無飯後日乏衣一頓馨香清風明月禪悅法喜飽懶何為他家鼓樂助吾機半夜松聲謳一曲千巖萬竹眉毛家風海島巒崖肚皮活計說什麼蘆芽穿膝元來不受人瞞道什麼灌頂鵲巢這裏司通意氣喚南作北我自無邊相叫大哥有何交涉我見世間之物無有不壞今明自性天真不憂生死雖然如是未得見解妙圓者不可輕忽於人法身定從慈悲智慧而成不從妄誑欺人而得用三十七種而助發以六度萬行而相資直是到底徹通方跨得泥牛木馬應須絶妙方正用得兔角龜毛若也未透斯宗學語者俱招惡果又何假袈裟褁相剃髮稱僧設得明心一切自現但得其本末事何愁也表出家而得遇師通不似他人而墮邪見網誓不辜於佛說佛說我心誓不學於邪法邪魔我身我身被魔則長如地獄我心證佛則萬古風光是知迷悟自分一心非二汝等依吾正訣快疾承當不勞心力若更不循驢鳴未免一場狼藉明朝遍入孤峯裏是處尋求不見師自古上賢難出手為伊不肯淡工夫垂經留教五千卷迷人看著轉迷途凡夫貪愛將為事少得曹溪這老盧自今後不得道禮師出家求披剃老師一眼都識破你諸人你若是箇般若種再來的不待你言而因緣自合老師亦不可妄想多計較也你腳跟下業茫茫不知只管禮拜明眼人求出家你教我如何向你說無無始至今你老大鼻孔被我將兔角拄杖子穿了多時也汝自不知善男子性相平等我皆令入無餘涅槃而滅度無量無數無邊衆生實無衆生得滅度者何以故若有普菴老師即非老師也珍重小參蠢動含靈皆具足佛性墮在一微塵不能自發覺唯佛乃能知之雖興佛事廣化群生而奈邪宗亂為聲色誑惑信徒創宇立像百種繁興苟利纏身如麻似粟師祖師翁相附相依將如來教典作工匠惟貪博酒博飯以鐃鈸鐘磬為樂馳求無猒無足是故法華經云若使人作樂琵琶鐃銅鈸而供養其佛皆以成佛道此是轉無明之種性動靜歸心生死唯佛佛即自心心何生滅也流浪逐物轉變剎那萬品千般長淪苦海諸佛說法誰知無說之心權立化城誰解一宿而覺傷嗟種習氣深聞經一字而不識其心見像一尊而豈知標體若色見聲求俱成邪道出家之子既到這裏莫錯下注腳且仔細看是箇什麼道理古人云聽其言觀其行言行相乖心口不一貪財愛色嗔喜無時動靜離真合塵背覺見有見無怕貧憂死此正是外道邪魔濫觴正宗迷惑凡流入深險趣千劫萬劫不得出輪經云非衆生咎邪師過謬此等邪輩如何可驗一日十二時中盡說飲酒食肉不礙菩提行盜行淫不妨般若張三是我酒侶李四是我茶郎但結一世之欣歡豈覺沉淪於萬劫計掛財穀多度小師看經則先問錢財佛事則預求酒炙也還本庫受生也辨銀朱棺槨只道我是幾代住持又誇我是紫衣大德你如今看他敗缺無限郎當齊他有甚為功施他將何為德功德則不然且試將釋迦所說一字問他看如何答得謾陳達磨玄機誰能下口若說得如流水用得如顛狂須是對機於沒量人前百匝千回全無變動體用雙彰色空一辨非眼耳鼻舌身意之所解於針鋒上走得馬射得弓絶爾我沒西東好相逢處不相逢大家和遍無生曲誰解如今即古風普菴老人自得心開意解之後見即佛見知即佛知於十二時中唯以佛之知見示悟往來不曾向人說空中有花水中有月圓覺經云一切衆生於無生中妄見生滅猶如空花及第二月空本無花病者妄執我既如是萬物皆如善男子萬法虗僞皆因緣會而生生法本無一切唯識識如夢幻但是一心心寂而知目之圓覺此深信裴相國之言不虗謬也他是俗人一悟周通該玄入理汝等行童今投我出家此事若不說破恐你枉費心力不辨緇素真僞無分賺汝千劫萬劫之大事既到這裏直是朝參暮學速究本心幸遇其師不得放過針芥相投難逢難遇互更結習淨念身心異口同音𮘗佛梵語警聖凡十二時中絲毫不漏和南無我人之相運力無彼此之心但要將勤補拙得意生身何須問踏破老盧行者甘贄即依大虗實自性之道場識破水月空花箇中年無新舊月非大小意光無盡若到這裡方教後人喚作普菴弟子邪魔不侵可稱師子之兒瞞他不得苟不如是永嘉大師云飢逢王膳不能餐病遇醫王爭得瘥咦要解麼快薦與周君禮佛者乃自心衆生之主悟即本是佛不悟名衆生衆生性即與佛性無二只是住形著相隨眼入色被色有分別好惡有無境界見塑神𦘕鬼迷惑正心所以心中常疑怕耳又聞說古今有多般是非之事皆相煩擾念念不停出生入死至于如今猶尚不歇所以普菴一心了達萬法虗僞不實唯有真心猶若太虗佛親證之示人無別法佛真法身猶若虗空此幻質父母緣生之物四大假會成人不為堅固定歸敗壞佛云應物現形者猶若水中之月有什麼著實但只要了取本來法身清淨不生不滅莫執虗幻假形水月空花為實所以普菴老人不說一切禍福善惡果報此等皆從妄想顛倒發生一心不生萬法無咎如今多劫迷惑一見了性之人說真實法何更外執成虗妖怪此皆是一人傳虗萬人傳實唯一本心別無一微塵可得生死是誰神明是誰父母親眷是誰善男子只是你久迷不覺猶如夢幻忽然夢覺何處有夢夢中所見境界何處可得如今浮世亦復如是你如今捨財造三門賴遇普菴若是他人殺無限之生靈起多般之口業你捨功德未成日他地獄先現不是小事千劫萬劫酬還債命不了經云雖是善因能招惡果且得遇明眼人今作善事當來之世必招善果不動一滴酒不動一皮毛施一文則不落有無奉一貫則凡聖該通不曾漏失毫釐只是普菴不許凡夫愛財捨財著相修道你今捨則又去貪財是名假施全無功德善知識者教你不著一切色凡人愛者速離速脫是名捨財財多害己引惹凶徒驚殺自己殘害眷屬官符口舌百種禍愆曉夕不得自在命終入地獄改形出生又披毛戴角輪回不休皆是不捨幻財何以早通心地若得心地光明了本不生今心不滅方將定慧照破一切世人所愛無不是若未了之人將以為樂佛說世間之樂皆是苦因寂靜常樂是名真樂外道著相而教人修道者亦復如是不知道本無形名名無可名故為非常名道者乃先天之本性始覺合本覺故名得道如何執捉色身子午運氣咬牙伏足向南面北餐松啖柏念呪絶糧求靜恬安不信自心圓明無有二相含靈寂照一顆金剛針劄不入若到恁麼田地且喚什麼作佛佛者是如今本覺妙明包含萬有唯真得見解之人方能知之你但看佛說諸經教典亦如是說所以外道聲聞不悟佛說執相沉空自無見解只管教人巡行數墨喚作看經造屋揑像望求福報此是一切有為之法如夢幻泡影皆歸幻化無有實相唯有因師不立文字竪起指頭便領當取永劫受用不盡於住相布施且無交涉見性功德無量無邊捨財千萬分不及見性一分但見自性不被財色迷若未見性終被幻財空境所惑如今多有人說你癡聾被道人所迷不惜家財我如今作麼生向你道天下叢林侵天卓嶽應有功德皆是信心之人布造亦不是無福之人所立無福之人見財便貪一箇身口何曾飽暖更有現世家有千萬不肯布施分毫亦不得間歇片時夜驚怕賊日恐家貧如蜂聚蜜時節到來別人收拾亦不知自己身從他烟𦦨生死沉溺若遇真實見解之人不問你施與施肯信斯人言行一如常不退轉發菩提心心離世業自定其心莫教別生貪戀古來有不須減現世無不要添十二時中常常細觀細察一切不實唯我心光大自在天真因普菴老人初生言示更無別法與人祇這本心頭頭示誨自是我耳不聞其奈樂聞不絶不捨晝夜常念普菴此之心念雖猶屬妄爭奈普菴常以無相三昧攝汝本淨明妙同歸一體無自無他非凡非聖你且未知猶如百川之源未入海時俱有川源之名一一不同究竟歸海皆同海味無有滴水別有異名是故善知識念念以大慈悲智成就法界含靈同歸性海萬法一心一心萬法於這一箇法身之中見一切衆生無不是佛你今施設無空過只要隨緣任運切莫因布施而害衆生未得福而先作業普菴真實不問錢只要離塵脫業纏一聞千悟方堪委若不如如顛倒顛信得老婆心切處何須苦苦學神仙珍重與易仲能佛非形相以法為身迷悟同根是非一體且夫法身不變猶若虗空凡夫妄念想逐浮塵生死不停背斯真體不因佛說沉劫無知現覩戴角披毛細照飛空著地莫是心無佛性蓋謂古聖難逢五伯間生方遭一遇若遇則心有所感便似如今若不逢則未脫毛群有何利益不是往古無聖蓋由不信良因致此一失人身所以萬劫不復釋迦世尊非是偶得此心度人無量皆是以身命財等恆河沙劫舍離群魔不發一念悔恨之心方了本願談六度萬行之修也只要汝慈悲為本忍辱為根不悟本心猶為虗行直是斬釘截鐵失寢忘飢真實於無相之中識達本源自性方名究竟豈不見裴公相國於世何愁為天下宰相缺少什麼尚自遠尋知識廣建精藍禮禿首以為師求法身之大事何況淺福凡流衣食難度者如今豪富不解思量念念貪心不知落劫墮毛群轉更無明重來受業你看他一日十二時中思量甚事可喻來生因果歷然非干他事造善造惡只你自心佛與衆生一性無二便是看經到死若不解佛意有何利益口誦佛說心行惡心心口不齊返福為咎多有邪師不斷淫而說戒對面自瞞汝禮為師果還邪報飲酒食肉日夕貪財作自己刀山為千劫苦帶纍樂善凡夫他世自相殺啖經云我負汝財汝缺我命淨名云布施汝者不名福田供養汝者墮三惡道諸佛因悟方見自身中一切衆生與我一時成佛方可出語成經所行顯道耆婆覽草無不是藥達法之人動靜俱正以法界而為道場化衆生而為佛事如佛所說大地觀來少得全成只是宿習有為聲聞緣覺執相滯空各稱宗匠多立文言不契達磨之玄風安辨摩竭而掩室九年面壁何曾行道看經二祖立雪齊腰天明猶尚不說此佛法是什麼事如今打鐃擊鈸抄覽登門愛財而設像看經著色而大忘佛理魔民種族幾劫自休達磨西來好無交涉六祖大鑒禪師墜石懸腰得法而風幡權示自雲門老漢一棒打殺釋迦佛與狗子喫且圖天下太平那有這般續佛慧命大莖大根種可作鬼神之師人天仰賴而後雪峰玄沙百丈溈仰不是遠國他盡皆目前境界深諦皆了自心表裡法身如是方能竪建化門指權歸實若不如斯親禮何益今見楚萍有信心易仲能自聞普菴之道不畏寒暑不管路遙化四方之愚心各持齊而受戒亦不是求財求福箇箇要了本明心二三春秋施力不倦於南泉䁀新殿閣一剎儼然如善財化境一百十城似淨名廣容方丈此事世之希有妙德難量一日携倫告求少語老僧寄根表悟猶若間雲有時谷口布長空有時又歸無色處遂磨松握管書無字之𥧌言妙意周空寫無心之般若汝但修心知虗空不見有我人之相別無奇特只用衆而不空箇裏無雙本不生而不滅佛法無多子久長難得人念念堅不退堪作了事身不消心外覔堂堂本法靈十方佛共證更不費精神普菴如是道何患不圓成背塵合覺録大方廣佛華嚴經說一切衆生皆是無明造十不善業墮落地獄餓鬼畜生三惡道報如影隨形不相捨離所受苦報各不相知如夢如幻雖生怕怖苦痛難忍而無所求解脫之處除非為人得身安健早求佛教速依正法信心清淨護持十善除十惡念念念堅牢戒城精進永不退轉若能於一生中聞有真正大善知識者不惜身命不遠千里而來一禮一言直是大肯不動步而便得成就契經合道了悟廓然無心外法不復受後有之形心法通貫永超三界逈脫苦輪皆同廣佛華嚴轉十惡而成十善復從善友提撕翻妄想而成正覺今將十種而互換參融能持則不失人身究竟則終成佛道持則其身不失不省則萬狀千頭若成佛則道等先天有名萬物之母若不悟則罪等河沙亦名無間地獄此義如王施飯雖飢渴而未敢餐嘗又如扁鵲盧醫貧疾遇而返生驚怖所以道飢逢王膳不能餐病遇醫王爭得瘥是故圓覺經云捨惡樂善復現天人棄愛樂捨還滋愛本便現有為雖增善果而未成聖道何以故未盡有心未得如佛雖未成佛且修精進拳拳行善而免墮三途步步不退而終到裏許除非自悟及早信修此喻如空不勞拂拭智人除心不除事生滅心除何事可得也迷人除事不除心妄心未除事憑何遣哉若無一切心何用一切法佛說一切法為除一切心若人解實相於中無虗誑說與不說同是即名最上實相未全融語默空花同而復結空果後進不能通何故不能通緣師指落空依妄不歸實師子墮邪宗二妄相依墮帶纍千萬箇因一人道虗萬類皆招禍不了却自心只管說他過將謂佛法僧也似陳行貨倒牀喫不得苦痛忍難過曉夕無把捉又見火輪磨始悔我自錯無福轉加禍未得將為得未證將為證妄想一剎那果招沙劫病皆是自欺心不依佛慧命六度未能圓五戒猶未定口說一切無貪嗔轉增盛人問道如何胡應全無性此不見性種三界魔民蟲衆生若遭遇萬劫墮貧窮自壞他亦壞自聾他亦聾自墮彼亦墮自空彼亦空究竟還如佛萬像一鏡中若能如是解可表警凡籠香積堂如意針古人修道如救頭然大事未成如喪考妣如今大肯觸目菩提扟鼻孔也不得工夫那有身心別想常觀自性無異虗空諦信不虗萬無失一只可一粥一飯長養聖胎動靜隨時堪為道種若於普菴門下欲求衣食而飽暖縱懶墮以貪眠汝錯用心便宜速去前面自有高樓酒店楊州夜市恣汝歡娛飽作受用應來道友運力布心粥飯隨緣休懷忿怒料汝來此不為衣食而來只欲常聞諸佛法印所以未舉足時先思益彼若非自省有過無功更有日來雲水十方賢士遇夜止可一宿逢齊只可一餐自家日用與他一般他事忙然我亦爾長安雖樂不是久居不若自安方思利彼不可害人利衆則衆口贊歎福自斯生害人則衆心怨恨海水也枯今生無福者患在前生若於雪上加霜未免凝寒入骨所得衣食之處皆是魚腹吞鈎未入腹中被他牽拽欲脫無因傍人笑怪千生萬死煩惱殺人所以維摩經云布施汝者不名福田供養汝者墮三惡道一切人只欲苟他心不知自折本能輸機者解算人之本君子務本本立而道生道既已生於我何求哉道是萬法之母法界總入我心且不見有一微塵是心外之物直須如是始得無生苟或未然速須懺悔豈不見如今有福之人非一人之所賴利益無窮尚猶轉轉慈悲不生輕忽此人向上增修一遇明人頓超佛地如今無福之人現在衣食不足語默如癡動靜無不干人曉夕令他作念自不悔過不信善言一失人身千劫受苦無福者不曾修種報得貧窮有福者纍生布施廣結善緣才出頭來一切具足王苗相種修行未見性者可以受生猶防失念招得來生不如意其餘富貴皆因纍劫修來一切下賤貧窮無不是貪財還力更有負鞍銜鐵拽把拖犁水陸萬類衆生業識飛空著地本源常寂皆因妄念受諸形貪食戀淫發起無明之煩惱直至如今習氣堅牢寧受業而不肯回頭忽然債主相逢連哭哀聲苦告如斯種類時劫何休相殺相淫讎無間歇嗚呼惟佛大慈演教標宗當為何事只欲一靈發覺相勸化出迷輪若解背境觀心便入法王灌頂位念念不舍精進行持假使鐵輪頂上旋定慧圓明終不失如窮子獲寶藏珍珠遇貧人歡喜布施只如布施兩字又作麼生會瞪目良久云空花水月一納無餘迷時四生六道悟時一顆明珠珍重𡎺墻法語古寺重新尚無壁落道場廣闊微力難成若非外護布遮那初地難堅牢戒塹善男子今幸太平時節家國安寧一身清淨不遭魔十二時中常自在任性開解諸惡莫作調和意氣衆善奉行細明三界內無休釋老喻之為火宅若不速出必為所燒三車現駕於門前諸子好乘而遊戲周圍功備祕密圓通常騎露地白牛飽納雪山肥膩是知拈槌𡎺土下下無空瓦蓋茅拖明明知有這一段大事不可商量發心只在自承當休假衆緣而成就本非造作自在天真無形而觸著磕著觸目遇緣而物無非我隨事即理而道不離人智用無功功無虗棄且不同秦城萬里又豈比劍閣三關任是鐵壁銅墻這裏工夫無縫八風吹不動卓爾獨存劫火難燒金剛不壞圓如寶月針劄不通遠觀包了達磨城近覩天珠歷落善財遍參百一十城未出這垣周全本願彌勒樓閣更無別處再逢親友受用元珍知道因師而步步還鄉如暗得燈而頭頭不錯咦善男子如今不歇更待何時戴角披毛非干他事一失人身萬劫不復修行者如麻似粟學道者萬萬千千難似達磨老胡僧罕竝曹溪盧上座傳燈滿録續光永焰者能有幾人是處開山溈仰雪峰等也不可得天下洞府海內名山若非明眼無心后代何求居隱如今向他屋裏翻作鐵圍用佛言詮墮謗教網嗚呼六趣卒未休時箇中少得其師業報非衆生咎但信自心即佛何勞向外馳求一聞千悟世間希便肯承當今更少幸助糧財成佛舍好承興勢設包羅汝若將來全體用空中莫背老婆婆砌石階法語普通長石萬百年階用之為首次第安排南泉山慈化院唐時古剎前後希人嶺貫楊岐雲通大仰路連吳楚舍接佳賓一僧了事而道號普菴衆信欽歸而二千六百家家念善戶戶諷經填路布橋利益群品唯念佛而祝延聖壽共崇福而願賀太平仰天扣地而不退初心護聖資凡而虔虔在念樓閣殿塔佛事皆圓唯不壞壞遠功莫若橫鋪石道一人難辨賴衆同臻萬古千春其功不朽人財遷變道果常存如今不布待來生何異冬收不留種貧賤多而富貴少布施希而作業深道人心似白蓮華雖混泥而應不染自能一善深嗟衆信無緣不免廣露化機欲得抱金舍草百年金寶別人收一道石階常普濟普濟祇益施財人無分難求君莫怪幸希回首莫遲疑今日不知來日事千丈百尺量而飯食與工資堅實無窮我等不求纖毫利養善心難發知識難逢一回相見沒良緣後會重親誰解后俟當工畢刻石標名今古不差須教明白一丈約兩千半貫一尺成一十五旬分寸不空定還成就幸甚修造法語本院香花古剎乃自先代李倉監請額施地創興不記年代續後此方衆信不斷修崇而且見遺題古殿梁棟曰景祝二年也殿宇雖壞而莫道儼然常存風俗雖變而其善心猶在嗚呼生靈之所以往來者六道也其道則一六唯心變若得六用一和即是如來出世若只夢想不開未免披毛戴角善男子莫錯會返本還源了心悟法不是這箇道理豈不見古德才見宗匠有許建化引入後進他便道切莫教壞人家男女何況廣造捨木輸金竪殿立像演法開堂諸佛豈不嗔呵祖師未肯相許經云雖是善因能招惡果達磨西來單傳心印不立文字直指人心見性成佛衆生本是佛達本非衆生君子當務本本立而道生道既已生知無我人衆生壽者方可入無相三昧隨機設化指彼迷徒歸自本心與佛法非同非異應無所住而生其心即是大解脫人也此人無眼耳鼻舌身意無色聲香味觸法亦無所得故不妨似水月空華示導衆生蓋緣一切衆生自背覺合塵經於多劫生滅不停習氣包纏斷福德種性於此淨心不能頓契是以古聖權設像法指歸實際所以永嘉大師云覺即了不施功一切有為法不同住相布施生天福猶如仰箭射虗空勢力盡箭還墜招得來生不如意爭似無為實相門一超直入如來地若到這裡須是顯權就實本末雙彰有為而知無為有用而了無用以黃葉止兒啼以息而化群品如斯巨眼應用皆真所以龐居士云神通并妙用運水及搬柴衆生依覺悟究竟不沉埋念念無所等登彼佛梯階一日了心無可得清風樓上赴官齊更不可逐妄迷真誑嚇衆生作諸業事我未解脫脫彼人縛無有是處一盲引衆盲相牽入火坑有一般人懼不千劫萬劫作驢作馬酬債償業長循地獄了不能出所謂愛他一粒粟壞却十年糧不知自己業識茫茫無本可據更向暗途化人修造講道說禪此非小事所以維摩經云布施汝者不名福田供養汝者墮三惡道楞嚴經云如世狂人妄號帝王自取誅戮何況假稱法王永沉無間普菴自了心非相之後不欲見人獨入孤峯常以片雲隻月游戲菩提於一切法應如是知如是見如是信解不生法相而奈十方善信不肯放過老僧各求所得之正因願示一毫之實義不免開菴南嶺妙應來祈祝千古萬古之遺風今日此時而普現是以得之於心應之於手忽覩四縣都文大夫勸誘醴陵大檀越劉用晦建此一佛普光明殿為萬古之標宗作祝聖之功德上願世主之光明亘古耀今壽超數量德越太清金枝玉葉鎮芬芳堯雨舜風常普濟修文偃武吾道一貫蠢動含靈總入圓光不滅正當恁麼時不見有施之士安有受捨之人用晦還本以成真季率忘知而入道然後一竹一木用來俱證真常運力布心皆是當來佛子善男子真是如斯了本智用無功地獄何從而生天堂何處不是既到這裏箇箇跨金毛獅子人人騎獨步象王文殊即是普賢釋迦倒騎佛殿羅漢不奈安身普菴鼻孔遼天笑時只道善財癡百一十城在這裏摩耶腹內造樓臺一口吸盡西江水試問參方知不知靈光運用從何起直須堅密處安身釋迦寶殿真如理彭氏捨寢堂法語夫古寺香花元無稅産滴水為界四壁寥寥失蓋像摧年深木朽某使命灑掃一十二年念念究心忘飢失寢應奉檀那而不闕往來雲水事無虧食無求飽而常令他飽居無求安而常與他安不患寡而患不均衆心歡喜而我願足忽然大解無相法門直入孤峰心無對待化時未盡衆信攀緣不免向頭上安頭隨機利物殿堂取新而革故尊像幻出於儼然只這方丈寢堂賴遇彭公施地若不是昔遵佛記今果難圓豈不見相國裴公肅宗皇處處與明眼人相會頭頭而設建道場只欲佛法與王道齊興聖心共凡心一體如今長者亦復如然於無住相布施而福果無休於無漏法門而永為佛種不問存亡族屬過現未來入正念則一身多身破空花則一相非相真如不變大道顯然所作無虗咸歸實報鼎修慈化院及諸處橋道給法語付衆信淮教修因預崇佛果報國資家究竟無我普化十方為國焚修住持沙門某於紹興癸酉年奉使府差住持此山四壁寥寥香華寂靜元無産業粥飯隨緣常年祇應四縣巡檢啓建聖節道場行香不闕某常念捨家出家當為何事披緇削髮本屬何因現在業識茫茫無本可據忽爾人身一失萬劫難回若不為國焚修虗負皇恩敕命若不導化檀那枉作空門釋子一朝村院主萬劫失人身只恐為僧僧不了為僧僧了總輸僧世談今古唯我省躬如說修行不由他悟雖在空門而不了悟空經云出家凡夫雖受佛恩而不崇修報經云負恩辜德更有過去三生纍劫殺害父母出佛身血未曾還報必在未來受無量苦如今不省更待何時是以直下忘飢失寢木食草衣十有二年脅不臥席心若死灰亦不斷接客應緣雖混流無垢染一日時節到來無異日光明普覆七日而逈絶知見身心如一體虗空大似死中得活猶如久睡忽驚返觀非相亦非名心月孤光無晝夜方知歷劫不舍如來今悟無師含虗寂照觀萬物不出我體明藏教不出自心如是我聞一時成佛嗟品類而不見本光受業輪而出入生死有生死則不契本光無生死則本光一合相理如是經教顯然衆生一了自心照見一切如佛只緣貪嗔癡愛殺盜邪淫流浪四生輪回六趣若人去酒智慧便生自覺覺他永無失賺若人去肉立德慈悲萬類無傷戒珠朗耀若不殺生壽無量身若不邪淫名清淨種智若不偷盜衆德來資若不妄語發言衆信心若不貪一時具足若無嗔怒所作和合行不愚癡人神護贊與人方便勝自看經輟己待人理何殊佛若人未能超出世間不若且修利益己事然後利他先須孝養父母若順父母則天地皆和直須念報國恩若報國恩則供輸不闕常願天下太平而我家始安一切人樂而我家始樂但向十二時中能行饒益於一切人者便是諸佛菩薩鎡基超越聰明外道學佛者如麻如粟樂仙者萬萬千千不脫名聞利養不發廣大慈悲飲酒而誑稱仙醉喫肉道過度衆生道若太虗汝事且有何交涉毀佛謗經破齊犯戒永墮地獄不出苦輪善男子那有盲聾底諸佛愚昧底神仙直似枯木寒灰澄潭萬丈與太虗合一體與乾坤無兩樣到恁麼時亦未可信你在恐汝作身邊知見未解空色無邊際處定有往還後受形段之身准前又成業報切須因果世間事然後超出世間人豈不見古德云說得一丈不如行取一尺說得一寸寸尺連丈意滿虗空然後消息盈虗包含萬有如鏡含像無諍三昧名稱第一有諍生死不入上乘今普勸善男子善女人應如是降伏其心應如是發菩薩心念汝等去佛不遠猶如盲子在燈光之中煩惱即是菩提猶口酸之人喫水味成其醋汝等若無這箇佛不應說蠢動含靈皆有佛性若是地獄難救佛應不說此十千魚生忉利天只患其中真實少得諸佛子汝若信佛佛即汝心汝但師心遇魔不退逢難堅牢得不退轉阿耨多羅三藐三菩提之心便自保守一悟永悟更不復迷萬古騰輝不生不滅雖然如是必假聞修以幻修幻恰如頭上安頭遂拈黃葉誰知權止孩啼普願聞熏皆通種智果然如願各發本心助力施財精進不退三復寒暑梵剎一新不犯滴酒皮毛不住諷經行道六度齊修福慧雙布功圓果滿如是慶揚祝皇王萬歲千秋願文武宰僚快樂堯風普扇舜雨常滋天下太平萬民歡慶一心淨土無剎不收法界含靈俱沾利樂然願在會發心善信本非男女之形名異體同今日重圓寶智施不斷命之法財助不生滅之法力轉凡為聖雪峰解使木人指妄歸真童子聚沙作佛所以如來出世蓋為一大事因緣我既了心豈可埋光獨善者也修橋法語和光叔基美世英仲能元逸此中善信肯心議士共布佛事道行友徒普般種族曾與諸佛救度衆生者同一心布共一手作男子身全七寶本無缺少若不遇人七寶變灰土忽因聲聞而緣覺會灰土而合法身灰土假名得心現量以無相三昧不住布施化信修橋其不住相布施福德不可思量亦復如是善男子一切障礙即究竟覺得念失念無非解脫智慧愚癡通為般若但於此處應化無方事無不了神獻之木和信肯則堪用所須於中不材與匠弗顧而莫加殘毀普警此方云千古靈跡有樹神通不捨則焉敢非言未得本圓身屬凡夫而豈無速報古德安禪師破竈而青衣禮謝豈不聞乎嶽頂圭公神朝而一日不顧仰山受戒遷廟而倒住堵田天上天下五通無不信戒歸佛若是普則周遍法界如是庵則六一包含若不得這箇圓頓法門微塵也用不得用不得則疑神返害命殞形消體用全則空色無私幻無作有以法界為我道場化衆生皆成佛事豈非入地者之所弘持百尺竿頭正是喪身失命直須大死裏得活方堪作這一下鉗鎚分斷悟由也未出五通手腳千萬劫妖精古怪五處靈而宿命不通常於無色界中心念佛而恍恍惚惚欲受形而強心未質百劫昏沈唯佛者助國救民唯依邪者愛享血味樂衆生血髓者陳亡戟沒孤魂依草附葉永不出輪他自受苦不息安有福德資人經云二妄相依生妄業道打猪殺狗祭菩薩迷人有眼真如瞎世間殺命命還他善惡豈差於毫髮依佛助天者嚴持梵福救死拔生於螻蟻尚不生惱害之心何沒哀聲歷歷屠戮而笑作等間口腹未充先斷他命經云若人食肉便同羅剎佛頂首楞嚴經云若人食肉得菩提道無有是處豈不見孟氏云見其生不忍其死聞其聲不忍食其肉君子遠於庖廚莊生云夫養形之人故不足以存生齊宣以羊活牛畢竟羊誰敢壞聖人法活唯欲度生餓鬼貪嗔念念取死仰山受具戒應不害生積善天符心俱正直神守方隅而拱朝上帝帝觸神光而便顯功能人順道平則瑞氣冲天神朝天喜天喜則神祐護人鄉寧井靜三災不生神人歡樂皆因路道坦然橋梁永固往復不傾危本土神光喜稼穡物豐濃自然盈富貴道險橋危處衆生心怨怒怒氣黑冲天天帝責本土守境土無功虗受信瞻禮神不合天心興災難求止喻如守土官真功亦如是道人安敢言化迷成寐語唐突萬千人皆道我不是道真實不虗有言無盡意汝等大慈悲橋了早宜歸珍重助柴法語助柴一事欽信佛法者不難舍俗出家依說而行者定得神通妙用運力搬柴妙有入無非凡境界聲色之外體露堂堂一合相理而誰自誰他色究竟處全通三昧解麼了得麼信不二麼若落第二月且莫虗誑自己好招罪無間去老師若未全通這百千無量三昧一蟻子也不敢胡亂用胡亂使若自不解脫更祛役於人成何道理速三惡道報苦不出輪善男子出家兩字是解脫法門勤行苦行自利利他不聽是非不求好惡行住坐臥如理實見不著有無不俱塵俗超出凡流戒行堅牢靜念精進有疑即問有逆即忍有習即離貪嗔有念即無念念無則正有念則邪有念則凡夫無念是出家出家者離一切有離一切有則解脫解脫則方見性見性則無我無我則成如是成如是則我聞我聞則一時一時則無量劫無量劫則佛佛則法為身含十方無盡虗空虗空即是法身法身猶若虗空應物現形如水中月汝會得虗空又不見法身為什麼不見法身病在有我見人見身見邊見所以不見此一箇見字從古至今賺殺萬千學道人誤了多少凡夫識却不會佛以法身周遍如目普觀吞空融色而非眼耳鼻舌身意絶對待而非我人衆生壽者既到與麼田地方可作得初地入門見解之人然後離四句而談無量四句絶百非而解纍劫瑕非雖然如是一念不忘正念非離非合拳拳不舍本源湛然海印是謂海印森羅智含萬象方便而直指人心得意而不立文字只要打折達磨西來腳莫令有誤本來人當處得心非向背九年面壁寂光明庭中立雪憨癡漢海裏口乾渴愛津如今大有心顛倒夢寐胡諍學道人且向自心中體究於斯如實更證明須觀古德皆如是萬莫瞞心自發輕誑謗定招無間業未全本覺且依經修行未了身依口莫學提綱沒量人對病用醫須有意指權歸實救迷情迷悟不同誰解意三乘猶尚未全明不契一乘為外道經生持戒不知徒勞南北與東西滿口文章不合義不曾親近正知見色見聲聞弄識神髑髏幾度皮消殞林下追尋沒一人妄把玄詮為事會五千救網變成塵看經須用錢財雇佛事全憑鐃鈸音餕餡餅皮紗布絹猪羊犬馬折經金僧俗一同輪苦趣辜負牟尼古佛心致使類多賢行少仁慈鮮矣足孤貧榮華富貴千無一菩薩神仙不降生如麻似粟人頭面殺盜貪嗔勝畜心不管剎那沉劫海且徒眼下樂精神背善惡臨無解處燒香合掌告觀音大慈大悲來救苦須臾命斷嘆悲深一生不布纖毫善悔懼雙交沒主人方知今死難思悔黑業無邊我自成寄語世間今未死光陰莫負早回心何況出家親悟者喃喃直指古同今所以辨心供作務將勤補拙助元靈相逢來往無心見大事未成戒行深只欲心空如及第回頭救接未歸人始合老師弘大願先難後易嘆吟吟十字街頭不見客孤峯頂上目群生助柴活計元如是不負當時這老僧且休莫說別事來日十三日更為汝等納𬅿如未足者不出此月定要足風急雪霏地轉天翻都不干汝事只管打坐看經任是四天門王來亦動汝不得早求解脫了畢出家這一段大事以悟為則珍重老和尚制柴曆於方丈後注計罪福纖毫無差各自驗取好與萍鄉知縣法語自悟無師心大解脫不空無住普菴老人某於法會靜久離名絶相之處舉所慧妙香一爇云百億恆沙諸佛盡入香光法界菩薩先天同知供養一心遍界塵剎俱收一言全通無不感應是知皇宗先族皆悉崇般若良因今為世俗提綱隱顯全通消息斯幸萍鄉縣宰出現世間內懷禪悅之心外作勸農之主無理不貫無事不收遠近一如古今非異某常光久合深知出手難為末法強魔箇中希逢伴侶明藏教全無一字了佛身猶若虗空誰是得意忘言那解無相三昧佛是覺義有相皆虗法性湛然一心海印僧真了法應不干塵動靜體合真如舉措皆標心印迷徒難化隨事依黃葉止啼豐干饒舌若於正宗門下則千劫難酬不免胡漢用一鏡全光照了萬像皆是幻故圓覺了義經云幻滅覺圓滿覺心不動故所以二十餘年守株待兔恰如面壁少林聞見如癡俗目視為禿物假使說禪說道聞如犬吠雷鳴直饒撥草瞻風妄見轉成聾瞽深信古人云諸佛不出世四十九年說祖師不西來少林有妙訣如是奇特同參可謂千里同風古佛今佛了義者只說一心迷悟不同聲色而見聞各異世輪忙急生死剎那自了而非念一切我脫而諸人未解所以卜庵出手對境無心以法界而為道場化衆生而佛事凡夫肉眼動經劫而罕遇道人萬類含靈沉溺而不逢正化所以應化非真富貴不礙只欲開人天二路轉凡為聖用報皇恩且令布路修橋郡邑宰僚欣利益民無苦楚商旅逍遙地水火風三灾變吉是知古佛亦假慈悲現在通方亦復如是斯蒙大志開此大心直指淨樂白眉香緘空墜八部龍神和光同喜千年枯木忽開花久溺驪珠今日現知縣朝議大居士興隆佛法真人子千億珍重與醴陵真如居士衆生本是佛佛字是西天梵語唐言乃覺義佛名雖異悟了一體同若人不達本逐末走西東君子當務本本立佛性同通一萬事畢終不被塵籠非塵體不動本實理含融先天唯此物今古學無蹤難了意在處塞頑空色空本無有指妄言色空若得妄消歇真體者何窮真體非形相不離形相中幻質皆虗僞大智發於中幻盡覺圓滿心光寥廓通此通無對待天地在其中森羅并萬像影現一鏡中鏡中實我體寂湛印倥侗若能同道者與理本相同唯守性清淨眼耳若盲聾情忘兼想盡忽覺己身空自了本無物強以道言通此法滯諸學皆幻質相容若離一切相形體外靈通左右逢其源煩不入胸中我尚不可得非我何可得眷屬猶如夢非冤不遇逢如今兒女者皆再來祖宗一根來復去如觀桑葉同本樹何曾動凋葉有來冬葉落明年發根深不怕風但能勤力護勿使火兼蟲毀壞本根者萬劫墮貧窮如今憂生死猶如顛哭空不知空本無如翳生眼中眼明雖說實不可順盲聾且如圓覺經云一切衆生於無生中妄見生滅猶如空中花及第二月空本無花病者妄執如來因地修行知是空花即無輪轉元本無生今則何滅變滅者為塵塵者末也不變不壞者元本自體也體者猶如虗空父母緣生之身應物現形如水中月如今見居士執水月空花為堅牢自性何不達本忘情知心體合於無相三昧之中悟一切衆生及自己眷屬皆是幻化所成無有堅實惟有妙明真性亘古超今卓然獨立珍重國舅夏執中御帶書及寫草庵歌至以此謝之以此微妙圓覺本體湛然之光不離當處回向佛法再來人承宣大居士精修般若德順明君細窮蠢動皆真寥廓三界如是自知本有應勿外求天人交集未離微何況欲中能體用大似杲日舒光盲人難覩道豈離人人之自離之所以裴相國序圓覺經云血氣之屬必有知凡有知者必同體所謂真淨明妙虗微靈通卓然而獨存者也是衆生之本源故曰心地是諸佛之所得故曰菩提又道終日圓覺而未嘗圓覺者凡夫也此本真如學至於無學之處妙解色空入無邊際忽得自心本源一合便解諸佛語默今古名言十二分教斯通一念普觀無量劫若非宿種善根那有王苗相種天上天下唯佛獨尊若識本心心覺即佛佛是梵語焉滯名相悟性真如心含法界始知年無新舊月無大小元本無生今何有滅千里同光道存目擊離一切相即名諸佛唯承宣大居士順時保護與信士喪子法語某謹參世英大居士妙在非言語之語自從達解本心光陳見解者希相許今蒙大士墜名香妙明寂照揮倫楮清風匝地意何窮自這賢儒誰伴侶自傷嗟憑誰語若問吾男歸何處普菴達本不曾生水月空花無實據不離當處常湛然覓即知君不可取此靈都是祖宗因因果歷然隨誰聚如今依舊復來生何必自迷求解注今古誰曾得久長唯有法身鎮常住不消追拔與看經三界唯心須了義冬節與湯亨老及都料法語失却本來面目箇箇日南長至先祖時節苦臨處處笙歌樂醉也參禪亦詳義也貧窮亦富貴蒙頭塞耳有誰知大地茫茫沒巴鼻智悲同運野店橫溪頭頭物物實理希奇悟本誰悟迷是誰迷家家觀世音戶戶禮牟尼亨老總不知都料斫木底不因這三門如何在這裡老師本無節世間如夢寐我今夢中說說者覺如義若有未覺者好蓋令飽睡等待睡惺時自己難回避恐彼少鹽醋米麵并豆豉我擊木童兒汝定知來意每人與一飽大家要了利冬日莫更歇臘盡相將至如人各上山努力爭先勢時節莫瞞心早歸歡喜地堅箇彌勒樓露出真慈氏了知生死即涅槃自性如空包天地試問空空空不知不知知處法不二即日冬回各希珍重因人問世間禍福遂述此語示之謹依佛戒則定既自定則淨慧朗然淨慧發生則心自解脫自心既解脫則一切煩惱不生若無煩惱則解脫知見設有知見則應不住色聲香味觸法其處若不生心其心遍滿法界即名真心若見有生死可觀即不名見性是同凡見金剛經云凡所有相皆是虗妄若見諸相非相即見自性如來大凡一切人元本不生因妄有生元本不滅因妄見滅是故圓覺經云一切衆生於無生中妄見生滅如空中花道人不可指空中花示誑一切謂空中有此花空中乃翳幻出見他相則因我妄生佛有五千四十八卷字字不說人之生死不談人之禍福禍福乃由自心所招生死乃皆我妄執只教人一心行善人發善願天必從之改過修心古今常道六道四生皆是自心趣入佛經所載者皆盡說解衆生之心心本是佛佛者西國梵語此土譯為覺義其佛是一切衆生本覺自性悟者猶如虗空故名法身以法身而觀一切衆生猶如夢幻出生入死都無著實恰似空花眼有翳則生翳消則滅生滅本無真如一體見性者自然而知不見性者經劫不脫如今見有卜卦看命者皆是依文字輪排從今向去妄說是非教人疑中更疑迷裏更迷那有了期又道人生百歲今時希有又道六十年閻浮客亦自希有也但依經小乘談戒權治信心修行者假說看經者來世聰明布施者招來生福報不殺生者得來生長壽持戒堅牢者得再獲人身若一悟本性者名見性成佛經云一切諸聖賢皆以無為法而有差別一切有為法如夢幻泡影如露亦如電應作如是觀所以人生喻如風中之燭還同水上之漚一日樂一日娛一切錯一日了一日當所謂今朝不保來朝古人知其人命如呼吸之間後生尚不可延況於老者乎但以遇病則以湯藥不可信邪亂卜說起禍福引惹精邪殺活臨時自然分定也又示易仲能本光寂靜因妄識而發生了悟無生便回頭而警覺若不見普菴老漢幾乎流入毛群思量祇是自盲愚誰道凡情不作佛咦大丈夫休分別百億塵勞從此訣今朝酒醒何處楊柳岸曉風殘月述普光明殿觀夫普光明殿非假莊嚴淨土道場即心無別心淨則佛土皆淨身光則法界全光迷逐相而悟返真聖思修而凡不覺背覺合塵者輪回六趣背塵合覺者體用真如一性湛然自分迷悟心本無間空色相爭空本不空色元無色若了色空之不異受想行識亦如然所以釋迦如來出世蓋為一大事因緣唯以佛之知見示悟衆生故衆生知見皆是業識茫茫墮愛見網不得自在佛以無念而知名正遍知得大總持法身圓滿演說三身四智八解六通而知名異體同皆是化衆生事若會一合相理應物如水月空花未解三界唯心觸目則前塵萬境若非古佛傳住法如人入暗三僧祇劫世變而佛法不移凡聖混融本靜而妄自生滅直了諸行之無常便笑世間生滅法生滅滅已更無私寂滅光中常快樂咦實為萬古鎮騰輝堪化衆生作佛事且如南泉慈化不知幾代住持木朽像摧破瓦上年鐫景祐古佛腹裏爛帛遺彭氏之名皆此地上古之僧檀祝聖道場而建立是知佛假衆緣道不孤起某如雲橫谷似鶴翹松應無所住而生其心應無所得而得其法初居而不厭荒寂末後而一看無欣一心幻出於有無念劫圓融於無際以無量之三昧道化無方了凡聖之一源達有為功如夢雖然如是念窮子之迷歸止宿草菴方付本家之寶藏風幡動處直指人心柏子庭前全彰妙意又何疑靈山會上佛舉一枝迦葉笑時靈光續𦦨法身非相安可以泥像丹青法界彌綸何必造銀樓金屋達磨九年面壁果熟時處處道場靈祐踢倒淨瓶至今顯溈山天下佛祖究心而不在事天龍恭敬不為欣凡夫求事不觀心暗被鬼神妖魅惑但得本而末自至道德全而事自成近世道僧罕依正法未得先覺之心却作古人之用古德以智為體通於一而萬事畢以慧為用無心得而鬼神伏智本不空無住妙慧天網所以應物無心萬物而皆備於我觀根逗教反身而樂莫大焉是以華嚴論主云以法身用則萬象俱寂隨智用則萬象俱生見性成佛則一身多身解空實相則一相無相是謂三界之依師可作群生之導引苟或未然出家無益自己尚業識茫茫無本可據更教他失錢遭罪著甚來由休道佛法不靈自是非心罔措金剛經云種種非心皆為非心過現未來不見不可得江西馬祖云即心即佛非心非佛永嘉大師云是則龍女頓成佛非則善星生陷墜作是觀者名為正觀若他觀者名為邪觀天生萬物唯人最靈邪正是非何不體悉且不知四大假合身若浮雲外染六塵妄執顛倒十不善業百劫連綿愛禽獸血肉而互相殺啖樂浮利虗名而結業纏身忽然身壞浮雲銷業滿報流何處嚲某不因夙習般若安能智悟無師如今到裏許方知千萬中實難淘一二古佛今佛藏教顯然有大慈悲碎身難報東西二土得法祖師撮略玄機直明心印不立文字竪拂拈槌只蠢動見聞齊登正覺問聰明多智久參方而猶尚難聞豈可蠢動含靈一聞見而便能覺悟華嚴經云一切諸佛於一微塵衆生心中成等正覺而其衆生不覺不知又云一切衆生是諸佛之果源善男子莫作是說經云蠢動含靈皆一佛性耳所以佛說華嚴經云我初成道之時於自身中見一切衆生悉皆成道我入涅槃時見一切衆生盡入涅槃如一衆生未成佛終不於此取泥洹無非真得道人在處含靈獲益金剛經云在在處處若有此經一切世間天人阿修羅所應供養當知此處則為是塔皆應恭敬作禮圍繞以諸香華而散其處佛果有如是之言真實不虗業根有如是之苦如影隨形了道化百千萬人且不見有衆生境界無心受種種布施且不見外有一文施者受者光影一如有什無為皆歸實相以此功德贊歎何勞祝萬壽以無疆願天長而地久公清正而民快樂私孝順而含識安飛空著地而皆演說梵音大地山河而齊標心印自此即當處淨土一念而觸目西方無生殿裡悟無生本覺位中瞻正覺珍重化藏經語釋迦如來為一大事因緣故出現於世棄金輪王寶位雪嶺修行說法四十九年成五千四十八卷字字無空言言諦實只欲開化衆生元本是佛若無衆生顛倒何勞廣布文言蓋為衆生背本性而不覺不知念念循六道四生頭頭趣三輪惡報如來若不出世世界受苦何休種種方便利益述情若有衆生念念依經持戒永斷無明修一切善法即得無上正遍知與佛無二方覺衆生本心即佛心外無法可得善男子有念有知衆生境界無念無知二乘境界無念靈知諸佛境界開佛知見永不受生心則不滅以法為身常住世間猶如虗空包含萬有不即不離非色非空非有非無絶對待非形名先天地越古今一相無相真實相一身多身真法身身含萬有盡虗空塵剎而毫端普現是故經云佛說剎說衆生說三世一切說若能如是說能如是聞是真聞法是真說經經云如是我聞一時成佛更無二時經云無法可說是為說法有相有說不名說法若以色見佛則不能見如來若以聲聞經是人行邪道得意忘言了色通聲便知道摩竭掩室妙解正宗示滅雙林法身常住善男子佛是西天之梵語此士將覺義以同名心迷不覺屬衆生心轉覺時一切佛佛開口處為言教化導迷心轉覺心衆生開口成寐語沙魘群迷呌不醒迷悟不同希達者諸佛方便救迷情情忘想盡明心者海藏琅函不可輕在在處處堪聞演共祝吾皇亘古今臣忠子孝那邊靜風雨調和物物成是非一體元無二佛與衆生不出心我今圓滿如來藏唯願衆生發信心等與如來同受用一聞千悟永瞻欽這回針芥若不遇剎那失足墜幽冥閻公問汝將何答未免刀山火𦦨林地獄皆因心不悟一十八界杳難尋八萬四千城可畏鐵圍無間苦呻吟箇中不遇佛光照萬劫無由得出輪忉利諸天因業墜後聞天鼓復超升人生有限空花相光陰迅速豈堪停古人究道如救頭後士無依豈不驚一失人身難再復榮華富貴苦來臨如今自有非他事性水澄清理甚深海印森羅融萬象湛然無古亦無今化無所化知無二自肯隨心了此經化藏經語結般若因度有緣衆一卷一千共亦不共才出頭來便得受用此經無價擬議不中除非自肯破塵了夢見佛不空塔成無縫半偈捨身古今尊重劫火不燒魔不能動佛祖皆宗天龍普供萬莫放過千億珍重切以般若彌綸法界唐言智慧以無邊寶積曼陀任是千賢難插足涅槃自性不滅不生廣佛華嚴妙行無住一百十城而不動遍周十二頓漸而該收毫末塵塵剎剎佛意全包迷悟不同故勞演說大解脫不立文字二乘學則執滯空言如如方契色非空若也解空空非色十二部詮如說夢百千萬佛若空花涅槃生死杳無蹤本來面目非非相大開喜捨破微塵了取功勛無盡藏甚幸與易仲能化經咦佛則自心光明遍照外無毫髮許堪作能為假使聚大地山林為筆四大海水為墨亦不能寫普眼經半偈經云如來為一大事因緣出世唯以佛知見開發一切衆生心中同佛知見不同凡解若無衆生妄想裡許安用教詮是以藥山不看經達磨不立字儒教詩三百一言以蔽之三門則似網求魚達了者忘言得意普菴老人畢竟這邊了方向那頭來梵剎則樓閣新嚴徒集而無可塞目古德云今人看古教未免心中閙要免心中閙應須看古教驀地裏撞著千萬莫辜負老僧假使轉念精勤明朝也有飯喫珍重示小師圓契修袁州浮橋語寂性普雲遙書寄頌只會得箇昭昭靈靈向野狐口邊邏𬅿骨頭喫了又東覷西覷你且不知化城共南塔鬪額集雲與鳳嶺交參若不是南泉種種方便也不免墮坑落塹龐老子前日又到院中重舉公案又道空手不把鋤頭步行不騎水牛橋上無人過水流橋不流這老漢當下被我拽定老大鼻頭手出了也汝諸人十二時中且不知有恁麼奇特以平報不平事又聞道百鳥銜花人天設供當下著語云蒼天蒼天誰敢擔當然雖然如是且好生造橋大要平穩堅牢更加疾速水漂不動風吹不移度人無礙諸佛歡喜天龍守護到處無礙全不漏泄通途無阻郭匠圓契快著力歸來與你三十棒教你一生起不得作箇無事人好歌曰間步遊南陌惟便野興多傍花看蝶舞近柳聽鶯歌且照顧莫失了髑髏精示李老人道絶浮言法無可說只為衆生喪本受輪溺於邪見所以諸佛慈悲方便於諸衆生自心中密說而顯演流通一大藏教隨利鈍根機廣垂接引遂致祖師機緣諸佛法教盈布於天下只欲標心所以經云諸經皆以心為宗無門為法門若了於心無法不備奈何如今去聖時遙魔強法弱正信希有棄有著空南北分宗頓漸說教棄本逐末競是爭非說正說邪顛倒四起所以普菴老人忍禁不得不免出頭露一心光含融萬有非心非佛即心即佛妙用縱橫隨機自在言語詮之不及情量莫測其端不立是非坐斷聖凡便是釋迦佛親現丈六金身也與三十棒趂出為什麼如此祖禰不了殃及兒孫善男子若宿因無分沒溺邪宗實難提拔賴得曾親正念遭遇普菴依正念而心無亂惑汝今投誠求語咨決大意實言告汝諸佛法道絶象忘言無證無修非迷非悟汝但十二時中莫存情想莫生住著即境即心即事即理間緣不繫心識俱停常於行住坐臥中妙聲妙色浩浩現前根塵意識了無所得若是如是信解受持不虗平生親近知識所以甄叔禪師云群靈一源假名為佛體竭形銷而不滅金流朴散以長存性海無風金波自涌心靈絶兆萬象齊照體斯理者不動步遍歷沙界不用力而功益玄化如何背覺反合塵勞於陰界中妄自囚縶依此勤參必不相賺因求決意漫筆如此善自護持珍重與顯首座顯老明禪入理深淵文殊為體妙用普賢鳳山得旨妙契南源三株樹下坐斷雲烟金剛作眼鼻孔遼天言談諷詠草木皆鮮欽風久矣偶覩惠然如天甘露沃我心田希有希有世外金仙老婆心切示我窺鞭自知本有久被塵纏普光明殿海印俱全彌勒閣中了了何言常在不缺觸目無邊一毫頭上妙絶偏圓含融法界本體現前示圓應行者看牛圓應牛經劫沒人收若不遇人虗度春秋如今橫穿鼻孔水草皆休有時放有時收隨分納𬅿𬅿自性優游獨奈何勞別討混跡應不迷流不許犯他苗稼也不犁他田丘飽飲雪山肥膩一頓更不他求眉毛眼睫動轉綢繆試問溈山水牯牛有甚風流向左膊上書字著甚來由任你千般引不肯回頭不如臥雲枕月運氣常周假使銀蹄金角氣射斗牛居吾腹內不得出頭吞底乃刀山劍樹業到解散枯髏誰知體如巨海妄起浮漚風擊漚生漚滅何愁湛然智海喻真牛圓應頭頭豈用修咄示何美佛與衆生是三無差別美與普菴豈有假虗說三阿僧祇劫因如來出現而幻假名七佛然燈蓋接群迷而演唱故知諸佛不出世亦無有涅槃佛真法身十方常住一切萬物皆屬無常不變不壞者為正遍知心故權名佛出生入死是生滅妄心喚作衆生所以如來為一大事出現於世說法四十九年成五千四十八卷顯無量神通蓋為此也此經是一切含靈之本萬法根源凡夫久習我人樂著聲色逐境背元使之流浪四生輪回六趣猶如夢影又若空花設有求靜樂善探宗不遇本分真正見解之人反成大咎過在邪師便是千劫萬劫不了公桉若是宿種曾會實相之士一聞便肯其人永不變壞縱然體用未全正因不變事理意通豈似依邪道魔王執空頑匠親近正法之人誓不信邪師謬解那更三界之中受一法之所瞞一心無相不隨妄念有緣生只這光中空不空亘古迄今無生滅咦千億珍重示弟子易元逸優曇花三千年一度現大善知識五百生許相逢且道曇花作麼現知識作麼逢滿眼烟波無極岸釣竿未舉好先知莫道凡夫名利欲於中也有謝三兒留田易元逸宿習般若一聞斯道而便自肯心直入南巖發願持齊而深究本事普菴點首知是再來許你從戒定熏修久久當明理性果從因有事豈偶然如今五百半千依實印當堂非自誑既知如是豈可緘默哉時乾道戊子仲秋願求少語以記宗風而老僧信筆書付劉待詔呈頌求語覺中體幻如月印千峰幻中思覺似雲點長空若得月輪遍照而非礙可謂心月孤圓含虗寂用未見本來面目不知弄影漢行履之處安可自恣迷妄不實之心向外卜度久久證想發揮不逢真正見解底人邪魔入心墮在魔境失萬劫之正心作三界之魔族若得一念不生萬法無咎道若太虗而無跡心如湛水以澄清須還絶待忘軀默契普光明妙了知生死涅槃猶如昨夢豈用探文字說知解而得者乎既蒙彭城老丈以三頌誥豫筆苦不能到而加寐語以警動寂常真不勞外覓應用自然莫執文字若要得快疾麼只這是千億珍重示衆法語示衆顛倒夢想忽然破直入孤峰常獨坐不曾相見與相親祇麼巍巍迎達磨東西露柱滿添湯南北石頭快推磨到與不到俱喫茶萬里清風同唱和快活快活也大哥達磨達磨真老婆多時尋覓覓不見却來草裏念摩訶幾年相伴急走過新羅低頭覓不見舉首又蹉過今日無知知不是強揚播若有知知者未免番成禍咦四七二三不立形歷劫三祇祇這箇從古迄今食不餐肚脹氣均常不餓傷嗟捉月夜猿癡往復疲勞多退墮不知古佛只傳心除了此心無別可師子子不消多直下無心唱哩囉拈却眼來作鼻孔呵呵大笑探禪河無量劫來風泡子至今汩沒和巴歌稽首寶積佛敬禮阿彌陀普菴此來無箇事大家相勸演若多元來不識頭依舊何須苦苦更波波示衆善者多魔自古今佛魔一體只空心心迷不覺慳成賊心悟回頭便捨金莫怪迷心心怕賊賊心對面也難尋三途地獄因斯得奉報須防仁不仁不是道人先注腳免他來喜去沈吟一年三百六十日夢想顛倒不曾息耳聞眼見普菴名更莫邪言喧戲劇思量生死大驚神唯了本心稱第一暫時忽聽本無心解脫沉淪千萬億寄語諸人莫蹈虗勾闌不穩莫相依莫令墮入深坑下未免先當說與伊來往任觀心不住聲香味觸且隨時孤峰獨特誰為伴塵世忙然我道奇不是打齊趂會只欲真心不背也不燒供神依佛無相三昧悟談字字明心迷說如盲踏碓粗粥淡飯虀湯但願精專不退不知再會何時達道心空無對寶藏論離諸名色相實見如來藏能轉語成經本心非榜樣說有即是無說無無伎倆不會自轉經依語成妄想夢裏推木輪信施誰酬償不出牛馬羊入他闌圈養一文四箇字還足連他喪悟者發真機迷者墮鐵網佛教空無相妙契合無上天鼓解說經懺悔罪無量有無空不空真實不虗誑圓信六神通不刻天龍像只麼轉心經箇中誰擬向為小師圓通入涅小參小堂云生死涅槃猶如昨夢衆生諸佛恰似空花了本解空方能如是未明體用聞見差殊藏教顯然疑情難透蓋緣生死不破如來所以現世為一大事因緣廣彰教網譬喻凡情若解佛說譬喻便知本自無生既達本以無生如是我且何滅先宗後覺意總如斯只是後學不遇真正導師少成多敗某宿習般若親受正因所以今時無師自契若無宿慧那信其經自有生來常知此事雖在塵而無染時節到以自通及住此山十有六載終日不離華嚴境界法喜禪悅之樂如度一時近於五六春秋隨機引接雖然檀信百亂修造千忙於我本性湛然如空含境如鏡中像所以妙應縱橫全無漏缺此處化緣修造彼方教設建橋不斷宗體而普應十方不著名相而頭頭指印只患末法邪盛真信者稀而有小師圓通俗舍不遠父母皆存初年十二依壽隆老和尚出家未果周年老師遷化父母送至回禮老僧便肯遵規學華嚴教然後混同良友日與進士互參朝夕不忘微通消息為僧六載年雖幼而智似古錐行住坐臥語默施為不破老僧之教一二年來不耐邪魔幾乎漏逗賴遇老僧心能轉物忽從正月入室焚香殷勤作禮而告師言圓通宿福不廣雖透未全積病時生身多困倦緣事雖多不能為一欲求度寂皆賴師慈老僧叱之遂不復語師良久乃以指畫空云這箇為汝為病什麼物為汝為病乃禮拜無言而歸寮又於二月二十七夜以空幻雙舉再告師云初三日求浴可得否師不答果至初三日晚索水浴身換衣求竹椅儼然安坐良久復謂行者圓清云請師到房中我書偈而長入寂光可麼行者依之師既到師子無言衆徒皆默索紙書偈云夢幻空花相豈可認作真如今不被使逍遙無外塵乃合掌請師歸方丈然後付囑弟圓智莫令母親喧哭閙混老師法會委弟圓融等告老師只求一桶火化為妙不消棺木諸般有費十方檀信施物只得了當便休一切事皆如夢幻畢竟悉皆如是即便閉目不復語寂然不動直至如斯爭奈何老僧一時不免依圓通所願更不勞煩近遠檀那涅槃道友助度俗儀修齊設供資化亡僧一文以上竝不敢收如有小師行者私自留一文一香一花一果三十拄杖即時出院去老僧拂袖入南嶺石窟裡打坐永不出頭也若如老僧所告千萬莫勞神只要信遠長存僧真不朽寧可別有施奉還了自心老僧即不敢阻節一任如常伏望衆信委悉千幸萬幸珍重示李昭文海性湛然獨鑑萬像以無心風擊波騰真體不動而不變自古迄今萬化歸元者只宗自心心外有求背覺合塵故循業道且如諸佛說法蓋為衆生天下祖師亦復如是若無衆生無法可說得見自性清淨便覺一切衆生本自不生不滅一體清淨如幻見彼塵流以貪嗔癡殺盜淫而造後報苦業不停遂假名字妙有為無妙無作有廣設建化之門門門皆善是故金剛經云修一切善法即得阿耨多羅三藐三菩提心不從行惡而獲來生善果諸佛了悟實見一切衆生心本如虗空湛然不動因妄發起從十二因緣出生入死直至如今夢趣六道汩沒四生不知元本不生逐愛貪生不知本源不滅妄想怕死得聞善知識直指人心不立文字言下開通自性目擊道存不見有世間往來之事何處立父母生緣是故華嚴經云若人欲了知三世一切佛應觀法界性一切唯心造若歇妄心真心自現真心普現則照了三世非生滅故自性與佛祖同源問色身含法身乃父母所生未離五行四大假合病苦煎煩如何得與法身無二答佛說經云佛真法身猶若虗空應物現形如水中月法身者乃非相也色身者色即是空也色既還空因何不合法身只為一切衆生貪著我人造惡不息不信佛說自心自身真如太虗一向苟色為活著言語道不見自己法身所以眼光落處盡同暗室才有思念便變地獄餓鬼相現才出頭來又入披毛戴角而酬前殺戮之債更有三生九世無數無量缺負不可說古人云了即業障本來空未了應須還宿債是以佛念一切衆生念念作種種苦因將來一失人身萬劫不復故廣建道場演經設像多立教詮曲為含靈早見自性別無他事珍重與彭應求為母病請藥語太虗日輪連晴塞身到裏舉似便打折玄沙一足如今且道目連救母還復母救目連若於這裡下得一轉尖新之語便見萬物一母病從何來妖從何得可以轉世間幻化渾真心指太虗日輪為母體正當恁麼時周氏百劫千生之罪垢斯來應念以銷鎔妄心悉滅以無魔入普圓而成正果別無他囑唯但順心逆則便凶順之則吉假饒尋釋老看經亦不離自心開豁任意迎扁鵲盧醫皆除妄想今再發藥幸跪獻於尊堂直待正春恣情調理恐聖善別立妄心逐一為他對治開解珍重普菴老人特為應求拯救尊堂普說十二月二十五日參普菴老僧就書頌與周氏脫塵警心妄執迷流不肯休所以今生逐女流如今眼界渾塵染幾時安穩見來秋莫誤前途成業網目連成佛已綢繆開心放曠依兒得不著高峰見毗丘除夜示衆臘月三十夜髑髏自相罵閻老索飯錢汝等怕不怕龜毛敲兔角五彩虗空畫正當恁麼時摩尼誰著價大年初一日道間却成急自拜夢中人妄想從誰立唯我知不知今古希相識張三李四歌草木空祗揖日月轉眼睛歷劫不曾停三賢與十聖枉費苦精神常思達磨老九年守少林如今意不盡瓦礫即真金𡎺墻衆信助力壘三身之寶塔結萬載之良因不妨運水搬柴步步皆修十善近遠宗祖因你信發各超升後代兒孫不出自心今合佛佛是衆生之慈父應無背子之心法即衆生之良藥一服心清信心清淨則早見世尊隨分助緣必招樂果千差修道只恐不遇明師一念發心便了普菴即我奇哉淨土彌勒樓閣大家下手莫遲遲廣𡎺戒墻堅本智工工計曆所設不虗將來名榜示江湖無限人天不如汝人財未卜來朝塔在心存不朽再來相會宿時因脫却布衣披法服只因正法一光全普度河沙無逆順因以法韻成臨江仙警世化迷不見本來真面目恰如窮子迷途東西南北覓工夫被人穿却鼻生死不能蘇唯有寶陀人失笑拈來放去毗盧空花不實汝休摸慈悲來不住開口應南無示普圓二字道友出家無易事了道亦非難各自要努力如人擔上山纍劫負償命此生莫等間遇時若不順展轉落讎關佛與人方便度人及登山布身而填險為衆代艱難荷擔如來者莫道不當番汝逆和尚順明朝報愈艱汝見有福者擁從物如山在處皆如是因修得世間若爭人我相不如快下山若酬自己債豈用學燒丹相逢無別有動不是風幡前後都還却獨坐大雄山如遇官客欲人送過不問多少便差圓普二行將錢米重雇覓左右作如不奈雇覓須是多方計較無有空過者觀急緩隨宜不可執一只要了利慈悲結緣歡喜來意無錢雇覓一任將道具索質當之物仰僧行自己身命施扛搬往彼岸亦不致勞也何怪乎何羞乎皆我一心耳時人須警覺應道不癡顛苦牛并急馬也只少他錢今生還不足來生又喫鞭道人雖無事不忍哭蒼天今古論如是豈可向愚言無我無錢質此處靜悄然顯跡靈光在夢然一炷烟普菴何處去分明在目前須當如是體可學老婆禪莫住空花相謗佛結深冤以善能銷惡以順和逆顛以道資頑狠以心助普賢以師為心本以念於無緣以身如父母以力報愚賢出家為佛子動靜自光鮮超凡并越聖真實不堪言曾經千萬劫碎身報未圓我今排次定更莫聽胡喧順我大家吉逆我衆無緣孤峰無覓處三千遍大千此時思一偈虗空應不得非是我做作真如體自然
