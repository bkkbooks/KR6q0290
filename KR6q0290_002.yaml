body:
  text: 普菴風水禪夫華嚴經云衆生未離幻了幻非衆生圓覺了義經云依幻説覺亦未離幻直至諸幻盡滅覺心不動始解般若堪為説法之師喚作獅子之哮吼群獸腦裂天龍寂聽皆生歡悅若不大用現前鑑覺未破由是生死岸頭事且與菩提有何交涉普菴老人偶因賢士設拜子前云賢士也不識叩問一切世人各有罪福吉凶皆出自先祖會擇陰地能擇陽宅有所招感遂獲兒孫富貴榮華此理還是真實可信否普菴唱言不也善來善男子善哉善哉汝能如是善達塵勞故有此問敢不為説我聞諸佛説法深嗟一切衆生於無生中妄見生滅妄認四大為自身相以六塵緣影為自心相將虗為實認無作有不知四大本空六塵非有迷背真源流轉於三界火宅之中雖遭大苦不以為患念念生死無求出離所謂我生則煩惱俱生我滅則煩惱滅以妄求妄二妄相依生妄業道總由不知乾坤日月大地山河色空明暗種種物類剎剎塵塵皆是自己心地妙明彌滿更無纖毫外物可得無名相非形質無大小無長短無邊表無變異無有無離言説不生不滅真如不動雖無形無為而靈通萬有雖不動步而周遍十方於微塵中現寶王剎猶如一顆摩尼寶珠圓淨無瑕充塞法界無針鋒許空缺處照古照今永絶塵垢色雖有異珠體無變安可於生卜擇葬骨埋尸貪圖後報蔭益兒孫顯官耀族永固長存豈不見垂語云兒孫自有兒孫福莫與兒孫作馬牛若達斯言乃真出世人也莊子云天地為棺槨信知古賢救世誠不謬矣然而吾教學道之徒得正法眼藏者蓋為古佛有此一大事公案未了無能報效若不度衆生無因酬佛德是故阿難得法之後與諸菩薩説偈云將此身心奉塵剎是則名為報佛恩所以各各不違實相權施引接應物隨機略露箇消息皆是不得已而為之喚作第二門示境明心西天二十八祖以至天下傳燈古德各立建化門庭隨機接物不勝其數不可備言且如司馬頭陀得無心之妙用合無心之陰陽權指溈山之寺基堪安海衆要以達本明心建大道場標宗設教即非妄想顛倒誑惑王民如我世尊為一大事因緣故出現於世示衆生見性成佛若得成佛德及萬道含三界豈小補哉今時世人不知所以被人誑惑不肯自修心行幸有安樂法門只欲著相貪求謬理信邪倒見力用無涯廣殺含靈虗費家賄祛役衆生造無量業望求一葬永益兒孫損衆利私無有是處如今凡俗尚言有福之人不葬無福之地若人不修福德安可逆造化而背陰陽者無心得其造化自然無功之功也無功用道者乃得正心也正心者無心也無心者道也道是本來自性天真之源若能一念返本還源一多互用智體無方可謂通於一而萬事畢無心得而鬼神伏無作而作無用而用無向背無年月無日時是故華嚴經云一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力豈可逆於正順於邪逐妄言而尋風水哉風水者空也楞嚴經云性風真覺性覺真風風者四大之一也無形相而能動大千九萬里之鵬程皆風在下也藏經云風輪其力無邊廣大能乘水輪水輪能乘世界動靜自然與道亦爾何可尋求捉搦水者百川一性也能利萬物而根通法界豈獨江河也但隨順濕性而已經云性空真水性水真空亦可喻道周法界安有朝富而背賤乎風水二名皆得性空安可逐凡情而尋究然地水火風權名四大順天順道和會萬機古德云四大未嘗不周遍周遍何曾有混融以要言之只是自心一體心外無法可得今告衆等但自回心向善慎勿貪求濟老憐貧方便救物護善遮惡離過絶非念念回光行陰布德諸惡莫作衆善奉行設有施為不用求報惡果善因自然當報何必憂慮幻形不貴安勞繫念兒孫自作自當他為他報且以夢而説夢談人之生死者各各逐妄迷真觸境而心起愛憎念念遷謝不停常趣黑業淪墮中陰悟心之士常以白法現前故經權名如來藏取境著相凡夫經標為阿賴耶識藏常著於物物則終歸變壞物無自性物壞則成黑業趣入中陰受陰既盡隨業受報古德云其形也形其寂也冥轉變天地自在縱橫恆沙妙用法混而榮誰聞不喜誰聞不驚如何以無價之寶隱在於陰入之坑若不識寶徒入荊山眼見似盲口説如啞此無依之類永劫貧窮不得受用豈不見古賢云吾有大患為吾有身又云朝聞道夕死可矣何況凡流乎古人求道如救頭然如今世人將為末事近日佛日杲禪師嘗示衆云一切慢事人將作急事一切急事人將作慢事又云生處放教熟熟處放教生深思此語乃真老婆心切蓋為一失人身萬劫不復不是小事果報歷然佛語不虗誠當熟覽終不相賺若能諦信萬無失一不信者隨業招殃信者悟心即佛金剛經云信心清淨則生實相實相者乃清淨法身也圓滿報身也千百億化身也證道歌云三身四智體中圓八解六通心地印説什麼三千大千世界山河大地有情無情一印印定更無別法喚作一生補處充滿法界一相無相一身多身華嚴六相總別同異成壞一門超出一成一切成一壞一切壞如如向上沒可安排恰似𦦨爐不藏蚊蚋不生不滅亘古亘今靈明烜赫永絶名言超過數量既達此理無不是自心一體孟子云萬物皆備於我肇法師又道至人空洞無象而物無非我會萬物為自己者其唯聖人乎何可將自心求自心將自己埋自己立境迷真生死不破妄談風水人故當辨拆擇其善者而從之其不善者而改之有諸衆生念善持戒看經禮佛欣善厭惡不退初心者喚作二乘聲聞獨覺緣覺此是修功次第階級雖未至佛地亦得出三界火宅離粗重業免墮三途且約人天福報隨業輕重而生雖未離生死輪回於天上人間受大福不行善因復入地獄餓鬼畜生諸惡等報不可具陳修禪定菩薩聞生天果報猶如冤家所謂諸佛猶是冤家自己那堪覷著金屑雖貴眼中著一塵也不得如斯見解豈由風水哉次有一類衆生口説善心行惡豁達空撥因果不識理義毀謗正因瞞聖欺賢作不善業墮無間獄百千萬劫無有出期實可哀哉延壽禪師云諸佛出頭來也無救你處豈由風水也以道眼正觀茫茫宇宙汩汩紅塵無非六道四生皆二十五有六塵十八界十二緣生無不被輪回經塵劫不息佛詮教網撈摝群生闡大慈悲設多方便所以西天二十八祖達磨大師為此一大事遠來唐土傳法救迷九年面壁誰敢承當直至二祖大師為法忘軀立雪斷臂求正法眼藏達磨猶未可信在二祖告云請師為我安心達磨道將心來與汝安是時二祖曰覓心了不可得達磨云與汝安心竟二祖便悟從無始以來所有至今生死不絶皆是妄心過去未來現在皆不可得便知即今真心遍一切處更無一法可當情當下忽然大悟以心傳心作第二祖以心傳心至六祖大師之後方始天下聞知得者不少如今悟無我者便契本心冥合一體遍一切處一剎那間圓成八萬四千總智法門永不變壞受用無窮若人不信永不能契反謗正因一剎那間便八萬四千塵勞門墮諸惡趣永不聞法永不見佛實可哀哉豈由風水也佛觀一切衆生世間本自無名姓無男女相貌無貧富貴賤一物也無一性無性耀古騰今堂堂獨露無髮毫許間隔不肯自認直下承當作箇無事人供養十方諸佛普益法界含靈且作麼生是供養十方諸佛普益含靈維摩經云法身流注五道名曰衆生衆生現時法身不現若得法身名供養諸佛假使七寶滿恆河沙世界布施供養不明於性終無利益不如見性識心頓悟圓覺妙體今此識神種子從無量劫來根塵不脫慳貪嫉妬作業受報死死生生無休歇時若到這裡更有什麼處風水也且略舉世間夢幻顛倒花報之相便可驗之且如張三家富貴具足忽生下一子便喚姓張隨宜立字漸長成人所有財寶親眷奴婢莊産牛羊田園皆悉委付盡是他有不從外得都不費力思惟此子過去生中若不作纖毫福善何因果報而生張三家如是受用如是富貴如今世人但則見果不見因所以不念修行作諸惡業受果貧窮轉增煩惱墮畜生身因者因過去生中善果習氣修福修慧或得塵勞業銷悟得法身見性成佛或得慈悲習氣不造生死粗業雖未見性習性已定所作所為皆屬善果與不者逈然不同果者只今此幻身行住坐臥受用者便是也更無別人相待只是自性作自性受如影隨形不相舍離分毫不差唯自定心自覺覺他真實可驗凡夫樂果而不修因有智之人修因而不樂果所以聖人無己靡所不己神人無功至人無名隨機應物金剛經云應無所住而生其心心者正遍知心也經云菩提心生生滅心滅應如是知見父母未生時都無名姓但是世間妄想隨意且有何真實而妄生執捉焉若能於此富貴家為人知因識果向上增修定生天果報若生天界遇菩薩説法悟無生理便證佛地若有乘福果生天受天福不習善慧畢竟淪墜豈不見證道歌云住相布施生天福猶如仰箭射虗空勢力盡箭還墜招得來生不如意爭似無為實相門一超直入如來地又如李四家貧窮下賤困苦無極衣不蓋形食不充口忽生一子屋漏壁穿殊無遮掩赤子初生之時業風吹體過如刀山冷水澆身勝若寒冰未言終久成人才出千般痛苦亦便喚作姓李更與立名父母飢荒不已孩兒飽暖何來仍且氣力未全早供奴僕恣意鞭撻任意嗔嫌日夕煩煎便同畜類雖然如是猶賴不失人身且得主世國王以法護念勿敢殺戮乃至食啖毀傷設有加害王法無恕官吏不饒未離人形所以如是愚人不知天地陰陽造化發生萬物為主主者道也天地之先萬物之母一生二而二生三三生萬物萬物歸一元也道佛心禪涅槃名異體同一法之中更無別性若於人形眼見耳聞俱不稱心所以貪嗔癡愛妄想顛倒作諸惡業欲於此貧富二家出頭終不得何謂也現今迷妄識根業性逐波散亂隨所貪愛變成異類之性死墮地獄畜生餓鬼經云三惡道報如在人家還債出頭便喚作牛畜稱呼失却前名姓也畜生異類不一皆是負債辜恩失了人形披毛戴角負鞍銜鐵拽耙拖犁生燖活剝斬斫煎熬千生萬死無有休息實可哀哉何由風水也故永嘉大師云即業障本來空未了應須酬宿債李長者云不若一念緣起無生如今若得妙契圓常巍巍不動若談善惡東報沙數難量略舉前項二因果皆如是更無別法喚作中陰所以玄沙大師云真如凡聖地獄天堂只是療狂子之方都無實事虗空尚無改變大道豈有升沉悟則縱橫不離本際迷即是夢悟即是覺迷時不知是夢忽然夢覺始知是夢古德云在夢那知夢是虗醒來方覺夢中無迷時恰似夢中事悟了還同睡起夫迷悟本無只是諸佛悟了對治而説故有言章方便利生依覺説迷而稱藥病相治若人既悟本無病何用説藥所以證道歌云夢裡明明有六趣覺後空空無大千是也悟達之士明了自性清淨一體圓明周遍法界方驗一切有相皆虗故曰衆生迷失本源隨情逐業改頭換面出入生死不曾停歇故諸佛以方便出世説法顯邪歸正指妄返真權標佛性化誘衆生衆生佛性名異體同必須離相絶名方堪學道學至無學無功用智道非常道心即佛心大用現前不從外覓直下承當故裴相國云血氣之屬必有知凡有知者必同體所謂真淨妙明虗徹靈通卓然而獨存者也是衆生之本源故曰心地是諸佛之所得故曰菩提若悟入此法門豈獨一名而可稱歎但隨機應物無離實相而各得解脫三昧故佛稱種智修假多聞至其報身圓滿一塵不立六祖云本來無一物何用拂塵埃若有微塵未盡終成窒礙所以未離學地假饒此生未悟亦不失定性當生定得佛語不虗要人堅信信深不退無不悟者只恐半途被邪師説法誑妄發疑返性顛倒撥無因果毀謗正法如飲醍醐翻成毒藥更不可救永劫沉墜所以證道歌云欲得不招無間業莫謗如來正法輪圓覺經云邪師過謬非衆生咎佛説有外道邪魔種族假相形於人間天上外現法相而心行邪道或現神通種種變現口説人間禍福令人取信或説飲酒食肉不礙菩提行盜行淫不妨般若剃髮披緇取貪資財要世名利誑惑王民擾亂衆生破滅正宗妄立邪法至使一切淺學不求智者善男信女殺生害命不可勝數要積資財作諸善事廣建香燈循行數墨喚作看經不知經是常也常者正心也正心則一餘二非也何可害萬物而利自己乎自己一性一靈也萬物一性而萬靈也經云蠢動含靈皆有佛性一佛性者一身多身一佛多佛千百億化身只是一法身也豈不聞永嘉大師云諸佛法身入我性我性同共如來合衆生諸佛唯一法性更無二體所以未了人將心求心使佛覓佛無有了期殊不知一切含靈皆共一箇真源因迷妄而現形逐物迷己而不能返本辨察自性與他性亦復如是又何可殺諸無量佛而救自一性佛是何道理苦哉痛哉如何自取冤債萬劫難酬君不聞吾佛釋迦如來於過去生中舍身飼虎割肉濟鷹遇歌利王割截肢體萬死萬生舍命舍身舍財國位妻子眷屬內外所有一切皆舍他舍一幻身利益一切含靈衆生所以成佛廣度衆生獲自法身靈明遍照不生不滅直至如今天上天下獨稱世尊為群生之父作群生之母衆所依向世界壞時渠不朽莫是喚作小事麼莫是寡聞淺識到此麼莫是無活計麼善男子大事未成如喪考妣真實為此一段大事如何別用妄心妄有何益你自一箇性不能修行自求方便更枉殺無量生靈要作預修望後世福報福則遠之遠矣禍則不求而自至善男子你要後世福却教他無限生靈枉遭一人殺戮銜冤負屈向什麼處安著精魂你舍自己而利衆生方合諸佛因地事你害衆生而益自己合三途報修諸佛因得佛果報造殺害因得地獄報如世間人念念偷盜行劫奪行非理事不久入牢獄受王法各隨輕重如世間人念念修善戒惡憐愍衆生與人方便於身命財常生布施與一切含生不生一念惡逆之想孝順父母兄弟親族不談是非好惡行住坐臥不離善心此人永不見枷鎖永不被人苦惱煎煩説有過去未來惡果亦成一切善因而變凶為吉雖有相干亦自聞其善而不見其形耳陰中常有護世善神遮護所謂人發善願天必從之善者居正惡者還邪只是其邪如氷其正如湯湯雖銷氷不言我解銷氷氷既已銷唯一水也遣邪歸正亦復如是本無邪正人自執捉以虗為實實相法門無一字可説如此分別世間善惡夢幻華報纖毫不差何況此身遷謝金光明經云心識二性躁動不停隨業受報墮於六趣無知無覺業識茫茫無本可據以何為依以何為主雖妙性湛然不生不滅不覺悟且不得用實可哀哉莫由風水也豈不見裴相國云及其斷言語之道息思想之心忘能所滅影像然後為得也故不在言詮表耳嗚呼生靈之所以往來者六道也盡是一念失真皆從無始以來直至如今相淫相愛相殺相吞妄著諸色聲香味觸法萬劫千生結成業網閻魔無有出期今此道人家既到這裡皆是不得已而為之方便分別似乎知見學解未脫相似明眼人相笑不少只是觀從上古聖人所説言教也只曲為今時迷人開發喚作教化衆生以為佛事法則是空事則是色若不權色明空如何明佛理心經云色即是空空即是色受想行識亦復如是是故馬大師云凡所見色皆是見心心不自心因色故有又云於心取生即名為色知色為空故生即不生也若了此意方顯今古思齊焉華嚴論主深歎法華經中露地白牛及以是法住法位世間相常住以此顯露明白所以數貫入於一部華嚴之教欲望學者於斯信入不費程途豈不快哉又云以法身用則萬象俱寂隨智用則萬象俱生起為法起滅為法滅故祖云境緣無好醜好醜起於心心若不強名妄情從何有妄情既不有真心任遍知即名常住法身六情諸根得相者蓋為識不破所以不脫故論云得相者謂之識不得相者謂之智若得六根返聞自性以神聽為入道之意者便合楞嚴經道旋汝倒聞機是也故永嘉大師云六般神用空不空一顆圓光色非色此理分明作家念者甚多用者罕有無異魚在水中不識水若是伶俐凡夫一聞千悟道本無名故得者標名為母所以善財參摩耶之理其義亦爾且道摩耶夫人即今在什麼處有麼有麼試道看師云你諸人在裡許得多少時也速道速道玄沙云切忌知有之人見這裡若不會便喚作西來意未明徒學多知見不識本性契道則懸遠是也殊不知古聖先賢所立教法經書一文一字唯歸一道也三教該通更無別法達者當下忘言即得其意也更不滯名著相明知覓魚求兔而必假筌蹄學道參禪須通教典典是故圓覺修多羅了義經云修多羅教如標月指若復見月了知所標必竟非月於此二事且要識權名實得失自知若還緇素不分未證實相不明道眼所有見解都成妄想所以我佛世尊於楞嚴會上詰問阿難及諸弟子愛小乘不求正覺乃云如何世間三有衆生及出世間聲聞緣覺以所知心測度如來無上菩提及用世語言入佛知見譬如琴瑟琵琶箜篌雖有妙音若無妙指終不能發阿難汝與衆生亦復如是寶覺真心各各圓滿如我按指海印發光汝暫起心塵勞先起若到這裡須是決擇身心分明見解始為究竟所以得兔而忘蹄得魚而忘筌得意而忘言若三者未有所得即不可忘也忘必落空空即未有所得未有所得則是空花之相故同安大察禪師十玄談詩云祖意如空不是空靈機爭墮有無功三賢尚未明斯旨十聖那能達此宗又云莫謂無心便是道無心猶隔一重關故圓覺經云彼知覺者猶如虗空知虗空者即空花相亦不可説無知覺性有無俱遣此即名為隨順覺性以要言之迷時以覺為空悟時證空成覺故圓覺經云成道亦無得自性圓滿故圭峰禪師序云成就慧身靜極覺遍百千世界佛境現前所以道信禪師為牛頭禪師説心要云百千妙門同歸方寸河沙功德總在心源一切慧門一切定門一切行門悉皆具足凡是真正見解之人應有言句舉措動用無不是道都在裏許不可離有為而談實相佛祖所出一相一言一拳一指拈槌竪拂指東顧西無不示物明心喚作不壞假名而談實相豈不聞六祖大師云不是風動不是幡動是仁者心動為什麼印宗法師一聞便悟方知此是盧居士即便禮拜衆立為六祖大師若有依本分真實得法之人不似名相利養及自稱能所接人應無所求應無所住應無所無心應物隨機方便華嚴經云吾觀世間無一可樂若聞有樂樂是苦因終不可愛迷風水人不知道了悟道人無風水若不解道者不如順生順死順時順理古人云逆則凶而順則吉所謂擇卜吉地者乃是順也順則不逆於心心是天地陰陽造化之源不假外求應有所作而隨用之用而無用作而無作隨時豐儉所以應自然之分定也又何可逆之逆則凶凶則定禍生禍生則必竟不利也不若依道六合通明亘古亘今光明炬赫不著問人求覓本來不欠少許古德云有物先天地無形本寂寥能為萬象主不逐四時凋古人恁麼道莫是相賺麼今日普菴到這裏恰似不會往往這箇老漢只是破一作二教壞人家男女平地起土堆普菴蓋為從上古人公案未了如此敗闕一場思之正是破二作三却來淨地上放屙這兩重公案還有人斷得也無以手指主丈云是他却解斷得驀拈主丈卓一下云勘破了也歌曰雪人通身却喫罵兔角拄杖三十下龜毛索子釣虗空道理本來非晝夜元不借寶所誰知價一道常光即我心逼塞虗空無縫罅且如這裏風水又作麼生斷重下箇注腳大家同受用此且富貴不妨普菴一穴真風水乾坤巽本無位二十四向絶遮欄非舌頭人云心地也無賤也無貴眼耳鼻舌通身意無限山人不識龍從前總是虗勞費千峯萬峯連不斷左右逢源無別水榮華富貴幾遭埋益子蔭孫無變已驀直下無忌諱司馬頭陀沒意智隨機設化謾留名箇箇趂獐失却麂更迷己寒靜清明爭挂紙豈知空界現圓融不顧淺深撈水底吉凶禍福一切不問忽遇司馬頭陀又作麼生道彈指一聲云髑髏盡入黃金窟法界全彰解脫門伏惟珍重釋迦文普菴法供養大道充虗而亘今亘古凡情劫滯而不覺不知唯心開達本以談經萬事千機而顯化五千餘卷為化衆生達磨西來當為何事塵勞六趣百劫不休戴角披毛互相苦擾雖有出家千萬何異衆生自己業識茫茫那更利他解脫殺含靈而修福果大似顛癡飽酒肉而道修行蒸砂作飯饒經萬劫不出三途心淨性明戒珠朗耀在家菩薩豈礙參禪經書便是真言依信永無誤賺自是隨塵起業自墮而亦墮他人若肯信心自悟而始令他悟悟則處處不迷迷則處處落劫如今布路修橋豈比衆生作用信心除殺盜淫凡夫作佛知見箇中無知識轉凡萬劫難逃出離在此見聞入佛境界與心齋諸道友造橋澄輝入嶺不異化緣一合心齋敏求好禮元老通同莫生二見易陳道友且奈勞心丁熊諸人於緣加力晏李二丈般若行深爐鞴完全鉗鎚快利當頭大器只許一槌餘二則非細攪不住且有圓徹不離慧觀普鑑無私心勤普壽陳劉諸道友吳許衆知音一切在裡許之人恐老僧口大筆尖説寫不及之處汝一一相饒放過老僧一著子便顯慈悲光生法界莫只一似人家屎坑邊小神罔兩一般稍不呼名便生憎妒缺𬅿供養便以為讎日劫自欺永不堪用作大人相善男子汝等纍劫曾熏種智今遇斯光照地獄作天堂轉凡愚為聖種稟齋奉戒作衆善之橋梁行道諷經揚諸佛之古道豈不快哉莫道我苦他樂我動彼安究竟一如空花夢影本不修行常居幻化知如幻者幻滅覺圓不入斷滅自家體取舍短從長經云左肩擔父右肩擔母繞須彌一萬匝若不了心亦不能報父母之深恩又粉骨碎身未足酬一句了然超百億此事更奇且約諸人未到此田地老漢也應不教壤人家男女一面打起精神乞錢掠飯做者浦橋汝等切莫道著教化二字恐十字街頭有一人半箇問你是如何教化你應他不得不能走歸趂得老和尚來此處敗缺好又聞再索挂子今寫二落三胡言亂語楊州夜市裏也要知用不著雖然如是當覓箇會唱舉者全披普挂法不沉埋心齋如是如是衆等珍重勉前人等幹橋資深未舉老漢亦如大抵利順無能妙通業識若覺識煩動則靜慧發生業識煩動則魔境現前覺業二因皆心識變大凡為事不若順和順之則吉逆之則凶小輩無知所作無不是逆所以凶多而福少智人百順一體無私縱有纖魔如湯銷雪凡見雖有定慧何干見怪不怪而其怪自壞聞見不知而無所不知知見本誰唯佛與佛所舉導化浦橋三一幻用共成斯事甚如本願人與非人性相平等時節不差自然如是若因未合緣求之則難若果熟現前應無窒礙輪次上街由衆歡喜而化緣易就三日一次諷經也只如然城內恐周回步濶可準糧而安下不妨想料韋公能知好惡舞罷之人金無重礦更加密囑普現如斯斬釘截鐵做箇大漢圓契切莫胡走胡言一味埋頭藏角只露眼睛堅固慈悲事成身了圓震心病燥焰難消汝加息滅心猿牢關意馬村人行動束足顧危靜行清心不退無返只在橋成別無他事勉心齋監衆造橋不求諸聖不重己靈唯大解脫人若出一字一點於十字街頭早是敗缺不少若更依彼凡流所説者皆是邪風扇動損折真機箇中密護深藏一任魔説假使鐵輪頂上旋定慧圓明終不失莫更換機添語我這裏只是即心即佛莫管他非心非佛如今人只看成望敗誰人知道心齋有此地位方敢為野老承當這事且據心齋日用隨時治彼衆幹以慈悲力廣大心匠人此中未可用欲遣只與之十八問與藥隨時應幻了彼空花應有所談普菴唯十八問耳向道別無靈聖只是村僧但得橋成救取一半孤峰絶頂良由話會恐有無用人或懶惰發回補洗一應道友只可精進不奈何莫更放退公私一任時宜大悟不拘小節此方不比他方珍重與弟子造萍鄉通濟橋木公自至會同契書通濟大事不急不遲道應則一物無殊假幻時草木相祛於中意氣不離知縣樞機公理私成何須苦況疑老僧若枯木應不發花枝有應則作無應自知幻出本無塵銷覺定化財不及身命布施亦無妨佛事難成蓋汝因緣未合古人捨頭目髓腦如棄涕唾為求了心度人汝等若見世間有難作之事不肯舍命向前永不解脫若自求利則不可也若利衆又何患哉今此遠方道友雖衆而奈春布在即路途遙遠動經五日方到地頭果足則一人一千未審歸去平善欲利彼而患於此亦非道人之用不若逗機應物隨處轉人善化則有信自來公用則全威急速諸事既成準則只思木料艱難正若放過一著處處春務在時必竟有妖農事可告宰公大士指司分引具申保長名目取木匠應有現存熟料計數均分各立嚴限日下便到橋所即速用工不日而成若更擬議則不可也直是放退至秋月去此料不到其匠亦不奈施工化士亦無手可措老婆之意語亦如如汝告心齋故當善巧以破邪疑與心齋和光幹橋事封機備悉讚歎莫窮無限心齋本末如是和光為伴須知毫末不遺慈氏圓融反見文殊初友方是法界純真道場周徹箇中幻事一任方便饒益嶺南人可將𬅿果足遣之老僧勘破了莫與他再來令他速遠去你自心知更莫待我説破此筠陽漆道友亦可便遣不消留他各家有事恐有人要來且放退別後却來而今暑熱百里之音已聞夢幻空花臨時殺活諸寺官疏如之奈何故非我咎焉彼自紜紜宿興因果十方折九也管一分不妨別無事老僧某和尚心齋和光衆等寬回且喜且喜咦更照顧末後一著造通濟橋信勉心齋及諸弟子普雲回備悉通濟浩渺只賴心齋以無功之功功不虗棄力用遍周與佛無二向夢室中聽衆寐語自知點首有時語言相似成句及乎連喚又不省教我向誰道恰似覩索抽木象轉動音聲是誰措乎得恁麼久遠塵劫唯佛與佛乃能知之蒼天蒼天與麼舉話好沒交涉十字街頭且要腳跟不點地正好著力説與圓契汝且一心堅實此事不虗忽然自有了當圓信千萬莫失却那箇當為老僧猛烈不退表初因入果圓定前日若回如今恰在野狸口裏了也又且慚愧救取一半圓德你向縣郭心裏弄箇村田樂獻他我只要橋成莫管人笑韋公萬回二道友且子細照顧左右若得橋行心亦行莫教孤負見貧僧不因通濟何如此暗室千年忽遇燈諸道友在者我無不知之一夜念普眼經無數遍乞保各人安樂老人和尚與弟子造橋亨老能人宣風有幸諸大賢長者福應橋成為千古之宗標作萬年之佳瑞道安人樂旅快輪輕出自衆心如是圓覺道濟昌榮立道李公加之諸公道友用心者皆不可説必竟祿壽增高道行深廣捨不斷命之財布不煩惱之力竹木全機成大佛事廣度有情同登覺道捨多福多施少福寡泥多佛大水小源微此心公正智不可擬多虗而少實不可口説而心瞞直是如平等盤不賺銖兩那頭欠少稱尾指天這邊稍多稱鎚墮地又怎奈何中心把紐子人教他添又不肯添教他減又不肯減致令主人難為喝斷還有人喝得當麼良久云除非臨濟出來始合得老僧話圓證汝性顛倒且更琢磨堅善淨諸普字及在此中道友且一一耐勞順善慈悲打供助發本光都料衆心早速成就別有好生好活我等你成若遲機誠當自墮耶珍重與亨老造橋叔且到聞疏未發取在有時此中江夏族屬皆承善知識前已經過只驗其事略不知理所以正法遠矣邪法敗闕於中未識其理不辨邪魔字義不通機輪難透且互換臨時隨宜妙應有無俱遣實不空空又談此中古岸一事若無纖毫之窒礙令俗無傷觜之談與匠橫鋪可謂道無間阻行無怨惡若也未圓種智不然只就如今饒木力以無言表造物而普順人心不一佛行皆如打過一番清風明月誰能向無明階下口説驚凡那肯於盲目童前示明無暗不因來命安可倩伊珍重佛恩振緣如是再幻一疏可表威嚴聞道普菴疑斯未實亨老珍重靈濟橋語此渡若非橋不放衆生過過去現在佛并西來達磨皆是接群迷直指人這箇如今人不知顛倒成患禍堅執有為功善惡爭揚播學道不識心所以塵不破若悟即本心永劫無退墮説法非干舌山河大地和行腳不曾移舉步無空過如斯妙性空方與人擔荷大用這無心非福亦非禍於中無妄作不異阿彌陀法界無別物一菩提為座修橋布路為含靈轉凡成聖如行貨遊戲菩提誰得知只恐迷情却放過大丈夫莫放過提起眉毛來繼和大家拍手渡橋來方笑普菴只這箇咄開口全音只我聞桃花含笑亂紛紛心非遍界真成妄意淨情忘法法真造袁州浮橋語普菴教化修浮橋信心自肯大豐饒解脫皆因不思議度人無量永逍遙秀江千古源何極非干今日與明朝一生補處誰知有萬德咸歡寂體寥蛟子眼中藏剎土紅燈焰裏爇眉毛毫髮虗空全不漏海山相擊浪滔滔石牛喫盡張公粟木女垂絲釣巨鰲新羅國打西川鼓東震旦拋北越刀孔自孔毛自毛針劄不入大雄豪妄想顛倒蘇公盛未解撑船弄竹篙豈在文言多卜度德山拄杖不敲槽萬載縣橋疏萬載洪機一發直得耳聾眼瞎放身通濟仁心度盡微塵佛剎勸英賢須特達百億龍天齊鑒察大開寶藏施珠珍箇裏無私一毫髮修城東合浦橋自性圓融不礙為浮雲枯木任風吹莫怪道人無伎倆猶如浮木歇盲龜應化非真不逆心有無俱遣道須成相逢便肯無空過合浦橋邊驗果因答心齋居士布橋某啓定應心齋無心如是實謂希有希有老驢應動唯風風可名乎杜門三昧通濟一如黃面老師云三千大千世界一滴之雨猶如目覩所受用物子細勘會亦未是大出脫底末後一句請心齋道若道得只合喫取一碗飯若道不得只合飯喫取一碗更恐無人相共倩圓契亦得來歷分明驗取好書勤足認於宗濃意寬弘而備悉主伴互融雙彰本末悲智同運心境無差不因孤露妄難休大既成難悉婺江煙梅雨却知音出頭人有何極師子兒無畏力滿目相知不相識枯木寒灰唯我知浩浩資深源汲汲翹松野鶴表吾師吾師心兮心常寂常寂光中饒益人不然且道乘誰力得得仲能口吐萬載光鮮盡出心齋等一切道行辨自己大事度濟含靈古人云學道如鑽火逢煙切莫休直得金星現歸家始到頭再發一緉穿靴幻力繩索堅牢回罷將歸皆如佛事若更無人擔板何不用密迹金剛揚眉早似過多努目則一時周匝切恐百里好事來命老僧四天門王扛也不動圓契當知無令惱我我於初九復入南巖鼻孔撩天雲騰致雨露結為霜末後一句秋收冬藏老人寐語取笑珍重加頌蜀僧雪頌并序蜀僧道存於紹興十九年七月謁疏山得悟特往愍道者處印證蜀僧存公生緣受業及得法之師始終詳悉後人未之知此但據普菴所録云耳遍歷諸方求友其人希有後辛巳冬月節忽到南泉與普菴契合祖道説見無有二解各以無相三昧重相詰問直得心心相印法法融通針芥相投毫釐不隔忽有行者請益蜀僧乃指雪書頌一首普菴隨後一句加三句遂成八頌遊戲法喜禪悅二人相笑不覺到這裏敗闕一場頌庭前雪子落紛紛妙觸靈明應普門不是藥山無用處權令龐老警兒孫總是吾家入道門無説説中聞不聞步步透關田地穩須彌𨁝跳撞崑崙行人到此宜回首此物元來處處有除非自己肯承當方信境緣無好醜免使從前業浪奔直入圓音普眼門賓主歷然誰委悉不是通方莫與論三世諸佛同此路天無門兮地無戶森羅萬象一光吞歷劫不曾少鹽醋百千方便一乾坤得者還須皂白分珠體未明成五色舉頭子過羅村淨人若信平常事穿過髑髏連孔鼻多中一了一中多城東老母難回避自有山翁樣子存家傳祖代沒分文南北東西無別有光明遍照獨為尊頌三門從其文殊門入者大地山河助汝發光古寺香華寂寥焚修報國化迷流英賢到此須回首撥草瞻風笑點頭從其觀音門入者蝦蟆蚯蚓助汝發光此舍絶邊無壁落充虗露地真寥廓往來只道主人寬爭似永嘉一宿覺從其普菴門入者不動步而到道人活計若虗空應物無心世豈同假立化城標寶所暫時指客懷寰中既到這裏方知往來悉皆不異釋達空空遍覺華到無高下淡渾茶和雲假宿煙霞榻明日東西處處家化齋糧語古寺香華居無常産今則化緣不斷由茲法會闕莊嚴卯粥辰齋有四來無可薦若得妙嚴施主廣發大心令他一飽忘千飢鼓腹謳歌而樂道僧行不念衣食而擔化檀那土地山神不受香燈而提凡接俗設有一粒所施永不落空那堪價值廬陵必無外物若肯信自心不由他悟去年不背三方今日法無門戶幸勿見疑卜度從教殺活臨時向道不讀華嚴經不知佛富貴化彼三千七十士唯恐迷流增嫉妬不患寡而患不均後代綿綿常貴富我道無心粥飯緣飢餐渴飲全無措一家有事百家憂心淨還如佛淨土廬陵米價也尋常一粒破時全體露珍重化無盡曆化城立有誰知意普雨調和潤萬機大根枝節全體露何殊彌勒降生時石兒拍掌連雲指木女含笙和水吹試問燈籠誰解舞知無我者快拈鎚咦楞嚴行道法語切以白銀世界觸目而不出普賢法悟真如動靜而無非佛事七處九會徵心大要於八還妙湛總持不動洪音而普應箇中智用慧體無私三千道侶果今圓寶所樓臺光普現當現當斯慶懺共遠彌陀龍神共贊道無功帝釋欽聞佛莫比奇哉如是三界縱橫一道該收功成不日伏願皇圖永固佛日增輝郡邑臣僚護民樂業當山土地時聽梵音遍界含靈咸承般若歷代非心未證今當隨智同輪古今捨地創山盡入普菴三昧現在法子究竟菩提海會信人皆歸實相燈傳無盡法慧何窮妙應水月空花純熟衆生覺路仗皇覺以證明仰龍天而洞鑒萍鄉縣丞求頌杜門終日不通書得意忘言總不拘舉向世間人不會妄談生死事區區信香不昧和光爇禍福皆心豈有殊心本全真含萬有只緣六處起諸愚眼耳舌鼻身意靜箇中何物礙明珠照天照地元不壞非心貪妄命須臾天命五旬當見覺從其耳順縱心如老人百出光無變休將庚申叩文殊了道即心含法界心無應物合菩提但勸諸人心莫怕豈勞心上外求諸為君一念真空體肯信無心道不虗謝戴安撫書院額普菴以此香回向大居士幻盡覺圓者妙意難遮覆惠我二筆端三昧非迷悟世間豈識知何處尋門戶六字光慈化千古人欽慕象出普菴名天龍常守護法本付賢侯利益何窮數傷嗟逐末流忙忙失元路千里萬里體無間世出世間非我所唯野鶴自得無心應故如是謝安撫雲軒密布巴陵時願垂青眸垂一顧珍重咄萍鄉縣宰差淨樂僧首求語修宣風橋店宿希雞唱天明眼未開丹霞沒火炙木佛化成灰院主眉鬚墮寒山呌善哉木人無自性機關拽線催淨樂無箇事金弦彈子來孤鶴翹松頂得意懶相陪倫搦筆端口披雲帶雨回維摩詰有問搖手指天台標羅漢法語千燈一室萬象鏡涵佛化一身多身法演多法一法聲聞緣覺六通本末同根宗標迷悟或現天台南嶽往還天上人間指體則未悟全身行解則慈悲接物須陀洹著枷杻斯陀含釘橛虗空阿那含雪上加霜阿羅漢鹽添海裏半千八伯如恆河沙主伴交參幻如佛事佛祖不欠羅漢無餘普光明殿妙難窮信士隨心而布施觸目常在應不落空是故標名永彰不朽題三門玄之又玄衆妙之門空之又空一法常存要見本來真面目除非直入這三門又道無門為法門無入是真入君禮信佛心有為皆不及舍財離相契無生天耳廓通塵不立為彭褒標法堂語伏以芥子納須彌針鋒收剎海三萬二千師子之座維摩方丈尚猶寬一百一十寶所之城善財不動常周遍是知百千世界佛境現前法體堂堂豈干修造只為執心成境背覺勞生智者權設標宗信心便能頓契以褒念父想之罔極恨報芥子以無門憂母患以有身憑何功而慶永是用捐輸金穀大竪寶坊妙音圓徹鎮敷𫾻天地同根如一體即心是佛佛外無心含靈盡入於光中父母緣生而俱寂父寂滅而為樂母生法以無生季昆萬行以圓明九族靈蹤而含識正當恁麼時將此深心奉塵剎是則名為報佛恩同輪歌師乾道四年佛生之月書于東井以益參徒之知而不昧也應機互換不空同任運隨時轉此公豈用千尋麻索拽指端輕撥滿寰中活潑潑耀玲瓏相繼聯綿不斷窮誰識那邊關捩子間搖取笑各西東能應也資慵無求不得此輪中墜石此時猶拙計力多功淺衆難供斯用寡意豐濃八萬塵勞一點融飢渴永銷從此脫兒孫代代得昌隆不費力實從容超彼迷流摝井中莫令繩斷沉泥底手腳茫然杳絶蹤謾道同輪歌表裏到來觀者莫儱侗知道本來無可説屈伸俯仰示宗風讚三十六祖頌第一迦葉尊者師子體無二拈花應笑時然燈從此焰不斷至今輝第二阿難尊者誰易阿誰難多聞不透關忽解空無我內海更藏山第三商那和修尊者無事商那和翛然了義多是法不可説轉念摩嚕陀第四優婆毱多尊者優波耶鞠多三昧力降魔法傳香種子意氣尚周羅第五提多迦尊者提多迦初生光超日月燈山頂泉迸涌此路少人行第六彌遮迦尊者大士彌遮迦憶昔阿私陀邪正通一道無法不調和第七婆須密尊者針劄不入婆須密正念何勞多氣力往劫親獻如來座襄王國裡逢知識第八佛陀難提尊者佛陀阿難提放光從肉髻逢師論義得入三摩地第九伏馱密多尊者伏馱密多惺惺父母與佛非親五十不行不語一見本人清淨第十脅尊者脅本號難生泥牛入海耕隨機千萬轉無上亦無行第十一富那夜奢尊者咄哉瞿曇氏唯富那夜奢不抅有無種遍地法蓮華第十二馬鳴尊者馬鳴分身百億論數玄詮無極六通三昧降魔不用色聲氣力第十三迦毗摩羅尊者迦毗摩羅師外道成正真了斯第一義非故亦非新第十四龍樹尊者龍樹非形相獨現圓月體説法如虗空非舌談真理第十五迦那提婆尊者迦那提婆針投鉢深契無相心解脫辨因木耳再來人巧幻不虧於毫末第十六羅睺羅多尊者過去娑婆樹如是羅睺羅師子同坐食付般若摩訶第十七僧迦難提尊者莊嚴聖王子僧迦號難提棄國避世榮便入三摩底第十八伽耶舍多尊者伽耶舍多人再來常持圓鑑離塵埃風鈴非響我心應一返常光更不回第十九鳩摩羅多尊者降生月氏國名鳩摩羅多宿乘尊者記不二阿彌陀第二十闍夜多尊者闍夜多因地昔為自在天一契無作性大用得言前第二十一婆修盤頭尊者婆修盤頭尊曾禮大光明以杖畫佛面悔過復天真第二十二摩拏羅尊者國名常自在王子摩拏羅化鶴成菩薩動止湧禪河第二十三鶴勒那尊者鶴勒那有智光大包天地五道貫色日月時親禮第二十四師子尊者真師子法身究竟無頭尾賺當盲眼人華空疑不是第二十五婆舍斯多尊者斯多婆舍擔板重鍊出金剛眼正法不動纖毫越祖超師無間第二十六不如蜜多尊者德勝王太子號不如密多指山還梵志魔群不奈何第二十七般若多羅尊者般若多羅法非廣亦非狹翠竹與黃華長松并短柏第二十八菩提達磨尊者菩提達磨大醫王全持正法度南方粉骨碎身應未報至今不離此心光第二十九慧可大祖禪師直截猛利立雪斷臂千古萬古丈夫意氣咄第三十僧璨鑑智禪師精通無説説本地亦無生無生花滿地本傳無盡燈第三十一道信大醫禪師破頭山下起清波流注黃梅不奈何四度勑宣端不動尊威妙湛灌娑婆第三十二弘忍大滿禪師百鳥㗸花未足奇直須透過始方知五百衆中誰委悉碓頭私許老盧錐第三十三慧能大鑑禪師曹溪一滴水周匝無餘欠孤峰絶頂浪滔天大洋海裡金剛焰南嶽懷讓大慧禪師馬駒踏殺天下人且有什麼相交涉雲作枝竿雲作花妙光圓寂含空劫馬祖道一大寂禪師一口吸盡西江水子細思量未足奇身含無盡之虗空箇事元來非擬議非心非佛又較𬅿即心即佛猶寐語溫州永嘉玄覺無相大師十方諸佛入其中十波羅蜜一光同十世古今無間隔十身千億法身通百寶光明青黃赤白異塵寰知音希得似寒山豐干未辨爭饒舌光明不遍道應難一一光明日月燈光未足奇若逢肉眼轉迷癡恆沙眷屬光無二萬億龍天守護持皆遍示現春有百花冬有雪夏有涼風秋有月若無一事挂心頭箇裡無私真廓徹十恆河沙塵塵剎剎號南無末後收來付老盧結果傳燈周法界誰人肯辨此工夫金剛密迹牙如劍樹目如燈電爍妖魔法不生千聖出頭難插足普菴也道我無能擎山持杵擎山抱嶽疾如風持杵拈槌解脫空世間有相非身大須彌總納一塵中遍虗空界和風周匝萬花開春霧濛濛鎖緑苔世人寐語不知意黃鶴樓前不賞梅大衆仰觀多身一體少人知不體無空自執迷除非妙達斯三昧箇裏圓觀始不疑畏愛兼抱南山有條鱉鼻蛇雪峰往日鎮常誇喪身失命知多少滿地如今號菜花求佛哀祐母子相逢幾萬年夕陽夢斷豈堪言多時不隔如今見趙州勘破老婆禪一心聽佛不聞聞了絶狐疑三界浮囂總不知泥牛入海通消息木馬橫嘶貫紫微無見頂相無影樹下誰相識琉璃殿內絶形名千巖色祥光現萬壑松風和沒人放光如來主伴重重絶世倫今朝即是舊時人迷悟是誰堪話會姚黃魏紫一般春宣説神呪癡人著色又扣聲豈解圓音不可聽自古迄今宣不斷到家方覺少知音題鐘樓語伏以鐘須含響假玄懸擊以方通聲色全真非色非空而廓徹但以衆境總標心只欲識心而成佛隴西族屬樂善歸心報先祖之英靈續兒孫而久遠七寶樓臺充法界欲令剎土足圓音何災難而不消何冤讎而不釋理含諸佛智納萬緣一聞千悟妙難思透石穿雲千百億題寶塔塔本無縫真如不動説此經處涌出虗空釋迦多寶聽説如夢東西無二見見不同無剎不收無色不融層層落落光影重重恆河沙劫盡入其中三世諸佛一法身通針劄不入壽量無窮目連舍利常隱於中阿育王像妙色金容天龍八部萬億靈通擎山持杵遍滿虗空護持禮塔摧滅魔蹤顯正寶塔八面玲瓏水火不壞障毗嵐風衆生見者永脫樊籠信者施者功德不空無住布施福德無窮住相布施猶滯途中諸佛子等無功之功成如是塔標指宗風空劫壞時此塔不鎔劫火洞然體若虗空究竟涅槃應時體用逗機應化無法不同皇圖永固舜雨堯風郡邑宰僚祿位高崇萬民快樂五穀盈豐狼煙自息瑞氣和濃性相平等含靈體同世出世間色不異空稽首和南禮塔事終乾道四年戊子季冬南泉慈化肅老遺風法界有情一切珍重題經樓語伏以般若貫華嚴涅槃通寶積迷則龍宮海藏悟則一字不識教演三伯餘會度人無數百億如今滿目放光明十二部經詮不及崔田彭族祖墳林無欠無餘樓獨立大千沙界納其中無説無聞真利益遠祖近宗無不超得意生身乘此力現存一族福綿綿世出世間福何極李總幹遺詩十四句師於一句之下加頌七句僧家起大屋枉費他金穀不是明眼人真如大地獄黃葉止孩啼只要免啼哭不犯一滴酒不動一片肉簷棟如翬飛世間那得知不是風幡動如如應好機青青是翠竹孤雲無性馳頭頭垂示處子細好明知殿堂何所有夢幻非堅久竹木從何來箇箇人空手石人解綵畫木女添燈油此事誰得知真實泥牛吼塑箇泥佛兒肚裏藏深機聚沙為佛塔猶尚獲菩提父見諸子劣且教令讀書一日成名後天下總皆知朝朝去禮拜誰識丹霞在打倒木佛燒院主反招罪得相而無相參方會不會如來非大身老盧快踏碓便道福相隨生天果未遲力盡箭還墜來生不如意假施滿七寶不如發真歸布施有為者觀來真自迷問他怎如此日輪正當午鼻孔廓遼天我道無門戶唯佛與佛知有為無作做若問如何道瞪目不相顧我要警昏迷迷人愈見癡九年面壁坐不露一毫釐法説無可説機陳不二機箇中若不會學取須菩提昏迷曾未警勞我箇眼睛絲毫全不漏雲月事猶新達士知幾者常看無字經打動和山鼓舞起道吾神自家先已癡逢迷實不迷能令石人舞解使木哥吹寂寂孤雲裏逍遙勿我知萬億恆沙佛皆同一性齊不如茆蓋頭裹箇大枯髏鬼窟作活計閻公未肯休佛以法為身不可以相求一念無心者法界剎那周靜坐取片時妄想自家知心口兩不同修行不透機明朝與後日作箇野狐狸因果全不落百丈一言迷有人來問我如何向他道喪身失命處世人怕死到三界唯一心萬法唯心造不悟生死者輪劫空招報山僧總不知知不知實奇空知未達本不免墮頑機世尊拈華處天人豈辨知迦葉破微笑古今信無疑師又云普菴見一箇蝦蟇度日常吞鱉鼻蛇獨立卓然真可畏身和雲月粲星花太公一見便收釣謝三得意號玄沙幾多獨獸無藏隱不斷聲孤問水涯頌四賓主并序彭李二丈一日間訪普菴三人覿面直得無言可説無理可伸是知主客淵默同空一更無三身非別體言説強名摸到這裏學海乾見解盡獨露本源光逈逈臨行聊舉四賓主大地衆生無性命唯有資深與國英拈得老僧杓子柄如今杓柄在手本分事又作麼生此話放行三十年後好舉良久云却較𬅿子珍重次日資深出示四賓主頌老僧熟覽顯然句意皆到若不遇上上之智聰明達士祖道正當末法孰能顯露拯救迷途老僧再歎奇哉不勝悲感故知君達在不言之理用轉凡流未離離微誠當努力古德云學道如鑽火逢煙切莫休直得金星現歸家始到頭如今放散向後難尋大悟方知一切不著更問什麼龐老裴休達磨古佛成現只今更無別法老僧向雪上加霜於君妙意重頌正因無勞執滯之心但貫一門之用也普菴寐語賓中賓借錢沽酒設狂人常常負債無依倚謗教虗招地獄因六道四生同一輪見他生滅未為真直須打破獼猴鏡識取光中弄影人試聽無言童子説未徹還同第二月妙機普印絶思心六月炎天鋪大雪直須認得本來真智識心知外道人眹迹不留無對待乾坤無不是吾身賓中主日久帝家頻得書幾回客夢經秋雨直至而今賃屋居賊是小人君記取好手白拈猶未許坐斷聖凡絶見聞揚眉且勝拈華舉一揮凜凜劍鋒寒函蓋乾坤絶自觀堪笑天龍無可説示人祇在指頭端直下無君回避處聲色全彰第一義取相凡夫永不知頓悟圓音方了利主中賓近日門風革故新相見相聞俱不謬時時笑覺夢中神大地山河眼裏塵自古至今強立名祇箇絶邊無縫塔不曾來往逐人情要會箇中真活計釋迦老子不蓋被更尋祖意外馳求管取下梢落魔魅騰騰師子露全身吞却森羅萬象形頭尾也無常獨步眼光不眨大驚人主中主無相光中施法雨醍醐一味灌群機皆入無為涅槃宇活卓自由把不住正令當行無本據除非北斗裏藏身杳杳冥冥沒住處咄却在這裡又云薦無邊無表實希奇虗空為鼓須彌槌輕輕敲著作金聲試問同參知不知何處更容絲髮許脫體無依誰會舉玄玄玄了説玄玄究竟談玄猶寐語賓主互用動亦非動佛祖機關不妨重弄法共不共十八何用一相無相自知輕重信手拈來得時不會龜毛作過兔角受罪山河俱動此義失宗宗非山河俱動是夢動亦不動收來無用這回捉敗永不費功賓亦無賓道孰可名今父逃逝契悟方親主得真主佛祖共舉認賊為子不敢相許萬國來親唯一佛身血脈不斷得者欣欣更下注腳盲人摸索見中求見病消求藥和光同塵沒量智人有誰相識資深資深又云好與普菴草料咦彭心齋諱逢源自作頌呈師師於一句下加三句妙哉心齋淺入深埋欲識神通并妙用何妨運水及搬柴光大深淵匝地周天常憶江南三月裏鷓鴣啼處百花鮮中有居士吞光飲露無相光中有相身無明路上無生路左右逢源大目犍連猿抱子歸青嶂裡鳥銜花落碧巖前三昧諸頌心佛共衆生只此心悟迷不間古同今千名萬字何交涉達法圓光許一針神出生入死足通神全體三生父母靈不是如來知見力舍身財命卒難升和千光一合圓如鏡萬象森羅影現中此光大用如如體道了橋成風月同浦空色無邊際離垢摩尼圓能依實相用助發有龍天神神光遍界體若金剛威神力固邪宗銷亡佛裏許若無這箇何為古佛傳心我體不空無住用時越古超今會看木人牽鋸始令石女穿針百納骨董袋一切皆我入一切莫能入達此妙縱橫三世佛佛佛大虗塗毒鼓有病聞皆愈無病聞皆死死了却蘇來誰曾辜負你無底琉璃井忽爾墮其中勝修萬劫功跳出跳不出瘖啞又盲聾分明無背面相逢不相見年年桃花面臨州下水船梢公力方便獨腳老虎暗時暗殺人不識是眼睛與君無著力溪雲古城無根樹子混非出入頭尾應皆急妙了過這邊渡海何曾濕香積厨法語咦以此三法為三昧無量無邊世不會我今修供佛衆生萬聖千賢悉同共摩訶般若味真如十波羅蜜同受用大家著力要精專一粒微塵不許動為報龍天并八部莫入厨中乾打閧監齋使者在眼前守護普菴無罅縫針劄不入起馨香十八元來佛不共贊護教土地給孤施地慈化為尊護人成佛功德奚論二王仰山顯迹契會宗師一法性身利物宏慈南嶽靖王以南權正無心應物威德標宗不可輕忽關王困權反正辦道玉泉無相無空義足先天五通契那一通方全六用護持般若法身不動梵王卓立奇功回光識性宇宙彰一身清淨又普賢一成一切成一壞一切壞法身無二相總別無罣礙凡聖本自無性天真常在寄語住山人伊作麼生會移五瘟出市心助佛揚名化俗徒遣邪歸正沃心枯國風雅泰民歡樂只這和瘟大丈夫頌證道歌并引過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法諸仁者斯門圓明究竟如是且作麼生會我道釋迦掩室於摩竭子長家成達磨面壁於少林老婆心切佛祖未生法不剩佛祖入滅法不欠永嘉識破叩曹溪表夢再三留一宿嗟盲參者卜度邪因皆道一宿聞言熏天炙地如斯見解道遠邪深掣電之機何勞擬議如大王路新舊齊登作者忘機達人無證永嘉大師證道歌者釋十二分教為標指證百千妙門成現前我等欣逢重加頌贊大歲甲申隆興二年七月晦日普菴老人序證道歌普韻連天風月和大千沙界一音聞妙契非聲能幾箇君不見日面金仙如月面見非是見見無能霜天月映琉璃殿絶學無為間道人不曾禮拜不看經不動遍周塵剎海卓爾孤身混白雲不除妄想不求真大開寶藏施珠珍窮士未諳門外立黃金窟裡作貧人無明實性即佛性心淨還同佛土淨水鳥樹林聲色中殊無毫髮來爭競幻化空身即法身且無分別與緣情青青翠竹無非相黃花搭地靈法身覺了無一物入滅降生非出沒觀身實相亦如然究竟何曾離兜率本元自性天真佛一體無邊含萬物迷時只道有西天悟來當甚乾蘿蔔五陰浮雲空去來自是凡夫眼不開爛煮堅氷充午膳熟煎雪塊作油三毒水泡虗出沒將無作有埋深窟洛浦曾將喻色身誰人解語依靈物證實相無人法不用尺刀并寸甲魔軍盡總證菩提大地須彌一芥納剎那滅却阿鼻業閻羅共我休分別洋銅鐵汁即醍醐火輪便是禪心月若將妄語誑衆生永劫不來世上行無縫塔中非相貌劈頭坐却老盧能自招舌塵沙劫沙界彌綸唯我舌未曾停歇説真經惟願含靈皆廓徹頓覺了如來禪豈獨東方與竺乾充塞虗空無空缺一毛孔裏現三千六度萬行體中圓從斯更不少油鹽一條山杖挑心月逢人只好哭蒼天夢裏明明有六趣驢胎馬腹甚滋味負鞍㗸鐵償他錢何以今生早歇去覺後空空無大千今年不離舊時天春夏秋冬花木節皆標實相耀心源無罪福無損益不消更念波羅蜜念來年久却成魔返謗修行無聖力寂滅性中莫問覓恰似他鄉迷路客東西南北總無知祇箇無知大奇特比來塵鏡未曾磨多口雪峰大老婆漏泄天機光覿面癡猿猶自漉清波今日分明須剖析天臨日照融光碧擔板玄沙不許名從古至今無影迹誰無念誰無生過現未來心不停一念不生無我所即是彌陀親老兄若實無生無不生將無生更覓無生太似揚聲欲止響太陽𦦨裏點孤燈喚取機關木人問觸目菩提誰辨論亡僧可喻木人機玄沙直指何勞頓求佛施功早晚成一念無心道自明枯木寒灰渠自在無功用智等空平放四大莫把捉本無毫髮堪依托地水火風亦假名十二緣生如兔角寂滅性中隨飲渴飲飢餐無住著不患寡而患不均衆生和悅因斯樂諸行無常一切空一切空處合元宗如如莫作身邊見法界無他一性同即是如來大圓覺切忌將心重卜度鳥窠拈起布毛吹未透玄津休摸𢱢決定説表真僧處處和光勿自能有時鼻孔撩天笑箇箇衆生目患盲有人不肯任情徵大地山河發問情一指頭端無兩樣普天匝地一時明直截根源佛所印三界虗生失性命印泥印水印虗空盲參佩印成心病摘葉尋枝我不能和根出示衆生只這菩提本無樹撩天映嶽碧層層摩尼珠人不識師祖隨聲心未息南泉虗設一輪光千古萬古空相憶如來藏裏親收得隨時影現青黃白珠體元無一色同無端也被溈山索六般神通空不空眼耳鼻舌身同無皮鼓子教誰打古今分付與雷公一顆圓光色非色記劍何勞舟上刻色即是空空不空取相凡夫當面隔淨五眼得五力五通曾告瞿曇覓證知見覺不相干因邪打正連天碧唯證乃知難可測莫逐文章名利客聰明不敵死生關五蘊皆空何苦厄鏡裏看形見不難徒勞渡水與登山演若達多頭不失狂怖自歇快平生水中捉月爭拈得渠應不苟諸顏色吳道僧繇畫不成癡猿徹夜空拏搦常獨行常獨步步步不離佛國土不曾見有一衆生皆入無餘涅槃戶達者同遊涅槃路箇箇無衫并沒袴一燈相續百千燈傳燈録上名無數調古神清風自高忘榮傲世性堅牢示一往還無箇事見人搖手莫忉忉貌悴骨剛人不顧唯駕一乘稱廣度誰人肯上此蓮舟獨暢清風明月賦窮釋子口稱貧雪曲高歌和沒人往來問道無言説月在青天水在實是身貧道不貧七斤衫裏不容針搖頭只許無心得入水元來不動氷貧則身常披縷褐教化衆生求解脫衆生愈把綵紅纏見我如斯嗔咄咄道則心藏無價珍十方諸佛我同身一切諸法皆無相萬法無非是我心無價珍用無盡剎剎塵塵光逈逈超騰今古絶形名四七二三宗慧命利物應機終不吝毗耶假説衆生病衆生了病即通光領取舊持元本柄三身四智體中圓猶説三千及大千八萬法門從此出咄哉王子去求仙八解六通心地印晃晃非遠近六通八解者全彰念彼勞生提後進上士一決一切了十二時中常皎皎擲劍揮空大丈夫回頭自覺無邊表中下多聞多不信文章學解增心病閻公未肯便饒伊碓搗磨磨終不靜但自懷中解垢衣威音王佛汝須知已前妙得猶為二何況今時説是非誰能向外誇精進五千退席聞無信我寧速入於涅槃莫教墮落聲聞性從他謗任他非體若虗空物物齊無異孩童爭瓦礫更加黃葉止伊啼把火燒天徒自疲堅持十力助他非煩惱息時全體是速令直下發菩提我聞恰似飲甘露非自非他誰作做纍生未了此真身致使同他入夢戶銷融頓入不思議子細推詳我不是無相光中古佛傳盡被真空穿却鼻觀惡言是功德妙明豈假旃檀刻一言一喝徹圓音不用耳聞須得得此即成吾善知識道有説無真利益眉下縱橫放白光不動分身千百億不因訕謗起冤親斬却貓兒不作聲尤賴趙州收得橛草鞋搭腦笑欣欣何表無生慈忍力洞庭撞倒虗空喫不留絲髮與人知摩訶般若波羅蜜宗亦通説亦通兩處由來劍刃鋒八還要義漫天訣七處徵心理一同定慧圓明不滯空黃幡直下起清風當時不得印宗老盧能有過且無功非但我今獨達了萬古宗心應不少皆從非相入無餘未離形名終莫曉河沙諸佛體皆同如今端坐大雄峰森羅萬象無藏隱元來只在一塵中師子吼無畏説巍巍不動威光攝十方法界現全身且無伴侶相交涉百獸聞之皆腦裂穿山透石魔群折夜來依舊卓長空飽清風漱明月香象奔波失却威木女來呼呌阿誰普賢露地空彈指一場敗闕少人知天龍寂聽生欣悅來散仙花巖畔列解空沒量道無能動地雨華重漏泄遊江海涉山川披雲帶雨足連天道得亦來叉下死三千里外為君傳尋師訪道為參禪先將鼻孔與人穿大喝一聲三日困塵毛猶挂曲牀邊自從認得曹溪路鳥道征空步坦途攫霧拏雲風亦怕降魔事畢念蘇盧了知生死不相關却把虗空作鼓鞔打者甚多聞者少禾山老漢實無端行亦禪坐亦禪面壁淹淹過九年失錢遭罪神光駭分皮分髓過西天語默動靜體安然謝三拋下釣魚船剛道參方不出嶺癡人猶尚走如煙縱遇鋒刀常坦坦只因得隻金剛眼一相光中無二形劫火洞然無退返假饒毒藥也間間一吸西江尚不難達磨曾經無損缺後遺隻履葬熊我師得見然燈佛歷劫有為從此沒心心相印了無生為君幾下蒼龍窟多劫曾為忍辱仙未曾頓悟此心源遭人活剝如斯苦學者當同救腦然幾回生幾回死汩沒海中如泡子猛風擊浪了無休風靜源平非我所生死悠悠無定止改頭換面嗔復喜何如識取本來人只這喜嗔全是你自從頓悟了無生動寂無非共佛行人問正因無可表揚眉之外更無能於諸榮辱何憂喜金輪寶位瞿曇棄舍草負金永不窮大地生靈扶不起入深山住蘭若離色離聲無晝夜撞鐘擊鼓不知鳴地轉天回全不怕岑崟幽邃長松下月朗風高寒溜瀉潺潺古韻實希奇賣向人前誰著價優遊靜坐野僧家懶出廛中露爪牙莫怪道人無可有清風橫點白雲茶閴寂安居實瀟灑拄杖撑天猶懶把興雲布雨濟含生試問乾坤誰渴者覺即了不施功繞旋三匝叩盧公雖留一宿非他得自己靈光本廓通一切有為法不同百鍊精金勝赤銅自持自用應無盡濟老憐貧透日紅住相布施生天福不用鑽龜并買卜分毫不賺自家修如影隨形皆具足猶如仰箭射虗空力盡無功到底空如何得似三平老聊聞看箭劈開胸勢力盡箭還墜依前六道無回避升沉不離法身中自是頑癡無智慧招得來生不如意得少為多兒子戲廣大門庭不肯遊銜鐵拖犁泥裏睡爭似無為實相門朝歌暮拍整乾坤東邊打著西邊響到頭只用一光吞一超直入如來地自是衆生不了利行住坐臥總皆真逐末興心成執滯但得本莫愁末遠遠尋師多賺脫君子務本道須生不用牽麻并拽葛如淨琉璃含寶月昔時未悟今皆徹只有此心更沒心不覽邪師文字訣我今解此如意珠貧兒衣裏爍光輝行行到處不曾失再逢親友始無疑自利利他終不竭一華五葉分別森羅萬象影居中自古至今無漏泄江月照松風吹不是渠儂更是誰參禪學道波波走豈知自有顆明珠永夜清𫕟何所為遼天寶月共相輝泥牛入海無消息一聲木馬大陽隨佛性戒珠心地印淫坊酒肆光逈逈寶壽見他打一拳從斯脫却勞生病霧露雲霞體上衣何必緣塵百衲披太庾嶺頭拈不起盧公冷笑秀公癡降龍鉢解虎錫也是如來隨事立顯權就實化衆生究竟皆從定慧出兩鈷金鐶鳴歷歷大似簷頭雨滴滴試問參方什麼聲迷心未達菩提力不是標形虗事持釋迦老子要人知拈來放去非他物運水搬柴事事宜如來寶杖親蹤迹莫比世間間戲劇有時喚作沒絃琴忽然又道無孔不求真不斷妄自古迄今無兩樣真妄猶如六月霜杲日炎天唯妙相了知二法空無相泥塑金裝為佛像日日香華夜夜燈誰知在一毛頭上無相無空無不空拈槌竪拂警盲聾解道狗子無佛性焉知全體與空同即是如來真實相閙市卓牌標榜樣子湖狗子咬三關未透玄機招業障心鏡明鑑無礙十方剎土無邊背打破鏡來相見伊祇這圓光會不會廓然瑩徹周沙界言語難詮無可解別傳一句了非言妙契圓通觀自在萬象森羅影現中無頭無尾耀玲瓏常光運運從何起始覺渾身赤撻一顆圓光非內外鎮海明珠今尚在仰山不敢自埋藏問著靈知常不昧豁達空撥因果不著片衣愛向火見他富貴使嗔嫌業海深深何處莽莽蕩蕩招殃禍佛寶金輪翻鐵磨十波羅蜜變洋銅飽喫多餐應不餓棄有著空病亦然却將陰入定安禪阿賴耶識崑崙藏萬劫頑癡被業纏還如避溺而投火兩處未明令法墮速須親近正知人如常處此菩提座舍妄心取真理猛火聚中求冷水勝熱婆羅請上山須臾便入三摩底取舍之心成巧偽夜枕髑髏渾説寐與他南面樂非輕不知自己無心地學人不了用修行只應步步踏陰坑大光普照盲無識非時不共野狐爭深成認賊將為子可惜祖宗田共土如今敗缺卒難收浪死虗生長劫苦損法財滅功德寧作常貧岐路客身雖能觸不能知只為前因無準則莫不由斯心意識三尸六賊空相逼一似龜毛縛猛風凡夫不體無消息是以禪門了却心心心心外別無心如今只是舊時底不換源機放曠吟頓入無生知見力不問晴乾并雨濕逢場作戲弄心花彼自紛紛非我急大丈夫秉慧劍一掃邪魔如掣電金剛三昧獨威雄不是觀音誰得見般若鋒兮金剛𦦨無説無聞非頓漸倚天長放白毫光祈雨祈晴無不驗非但空摧外道心人天歸仰至今求男乞女頭頭應動樂歌歡用我聲早曾落却天魔膽添不添兮減不減凍死不著賤人裩餓死不喫鬚邊糝震法雷擊法鼓針鋒剔發千鈞弩大地山河失却威獨坐雄峰孤眼普布慈雲兮灑甘露潤物沛生無伴侶廬陵米價沒人酬窈窕冥冥自相許龍象蹴踏潤無邊騰雲駕霧謁諸天帝釋驚惶無處避尋光燭理扣金仙三乘五性皆醒悟方知自有珍珠庫臨時分付與兒孫不勞更倚他門戶雪山肥膩更無雜純一摩尼相間夾珍珠寶網影重重頂禮歸依無縫塔純出醍醐我常納露地中兒標白法潦倒溈山獨自騎暫借鶯歌胡蝶拍一性圓通一切性觀君莫犯西天令至道無難嫌簡擇杜口毗耶元不證一法遍含一切法風飄飄兮雨颯颯一聲漁笛晃春光浪打孤舟聲自拍一月普現一切水四處分舟同一體多中一了一中多莫學癡猿撈沼底一切水月一月攝翳眼盲夫胡指決都盧只這一心光年年來呌桃花月諸佛法身入我性狀似千燈含一鏡重重無盡意重重絶待靈明無可證我性同共如來合莫怪山僧情義薄與君相見不相知自脫方能解彼縛一切具足一切地凡夫不了爭名利名利何曾得到頭空能夜壑勞關閉非色非心非行業休指黃花并緑葉説時似有證時無從此家大安貼彈指圓成八萬門有無無有豈堪論假設千經并萬論直應迦葉不聞聞剎那滅却三祇劫更無絲髮相交涉無名天地亦非先有名萬物光重疊一切數句非數句你玄言并好注靈明烜赫塞虗空不住色聲光布施與吾靈覺何交涉雲門有客三機接語論千春不昧真深明此性無時劫不可毀不可讚邇古迄今光燦爛鎮州蘿蔔大三斤桶裏水兮鉢裏飯體若虗空勿涯岸通身是口説得半三種病人也會醫燈籠露柱常相伴不離當處常湛然神光也不往西天德山話墮龍潭笑忍氣吞聲更不言覓即知君不可見穿過髑髏無不遍舉頭子過新羅失却桃花秋月面取不得舍不得自是眼盲心裏黑居大洋海口焦乾兩手問人覓水不可得中祇麼得更無魔黨相欺嚇狂怖自歇即菩提真淨妙明無間隔默時説説時默佛祖妙機無法則除非親到此門中棒頭取正參方客大施門開無擁塞何須遠劫方修得只要無心直下休一顆圓光非異色有人問我解何宗只堪搖手報伊聾靈利衲僧須瞥地何勞更説五家宗報道摩訶般若力是境是心全不識凌雲謾道見桃花月面依然言不及或是或非人不識是非不到休疑憶他真不若自家真推倒繩牀何損益逆行順行天莫測鄧隱峰破禪規則叢林動念幾千般倒立歸真誰勝得吾早曾經多劫修大通智勝本因周因何佛法不現前為伊不薦混迷流不是等間相誑惑一失人身難再得善根微細惡因多地獄阿鼻無間隔建法幢立宗旨語默風雲處處是莫言止道有曹溪失汝元常何益利明明佛勑曹溪是曹溪一滴周天備法海澄清潤古今飛空著地誰知貴第一迦葉首傳燈百萬人天聳耳聽金色頭陀聞不會拈花起處笑尖新二十八代西天記祖祖相傳無別智唐朝八定四空禪有為不達真空位歷江海入此土萬水千山同一路來時無物去時空稽首牟尼悉加護菩提達磨為初祖梁王未契如聾瞽廓然無聖尚求名拂袖魏無處所六代傳衣天下聞參禪學道紛紛爭似丹霞燒木佛傍觀赤爛墮幽昏後人得道何窮數萬別千差同此路成人者少敗人多達理契經無作做真不立妄本空勸君賊過莫施弓越古超今無可有纖毫窒礙不能通有無俱遣不空空空本無空針不容阿彌陀佛真金色相好無邊我等同二十空門元不著三乘五教都拈却指頭消息甚分明病愈何須重點藥一性如來體自同聲聞執相有西東忽然撞出來時路九萬鵬程頃刻通心是根法是塵根塵覩對轉迷情以火救火方為妙燒却從前業識心兩種猶如鏡上痕直達取嶺南能便顯秀公無跳脫徒勞四句語言爭痕垢盡除光始現照見不似娘生面無頭無尾一般般千眼大悲也不見心法雙忘性即真夜來夢見一天星南曹北斗無藏隱箇箇含光映法身嗟末法惡時世心若利刀稱善慧却來林下閙喧天反謗初師全不是衆生薄福難調制度日爭名覓利千萬之中沒一人且道乘誰光出世去聖遠兮邪見深祖師肚裏覓知音兩箇禪僧相借問舊時佛法不如今魔強法弱多怨害跣足頭陀頂蓋舍身求雨赤天晴凡情見此生輕退聞説如來頓教門便將毒藥與他吞老胡被折當門齒任彼魔多體自存恨不滅除令瓦碎百計千方來逞怪熙怡端坐古峰頭設若歸依還自拜依在心殃在身汝身非與我同真臭爛腥臊無用處識神沈劫墮迷津不須怨訴更尤人動是洋銅鐵汁淋更入火輪并銼碓牛頭獄卒臠肝心欲得不招無間業對境無心心自歇何須苦苦外馳求靈光獨耀如明月莫謗如來正法輪我師纍劫究方成然燈王佛親傳受後代兒孫萬莫輕旃檀林無雜樹庭前柏子非相戲小中用大一時平大中用小無邊際密森沉師子住野干狐狗難逃駐橫吞碧漢體堂堂無位真人何處去境靜林間獨自遊端威無動體皆周元來不管他人事任彼橋流水不流走獸飛禽皆遠去知道本來無住處空無鳥迹地無蹤碧眼胡僧面壁覷獅子兒衆隨後何異趂麞諸獵狗挂角羚羊何處尋莫教回首連天吼三歲便能大哮吼文殊也道難征鬪遑遑權託罽賓牽如今脫體無人守若是野干逐法王未曾舉步早郎當貴價精神賤價用渠露全身汝急忙百年妖怪虗開口五伯生親狐兔走百丈峰前一句新不昧光中猶未了圓頓教沒人情集雲峰下四藤根天下大禪誰識得荒茅野地少人耕有疑不決直須爭強把磚磨馬祖前牛行不在車心打當時鼻孔廓遼天不是山僧逞人我此事元來無兩箇教詮十八不共法共不共時是什麼修行恐落斷常坑説有説無只管爭教體未全言句落意識心隨聲色行非不非是不是是非不入三摩地一念普觀無量劫無去無來亦無住差之毫釐失千里掣電之機休擬議不在低頭與別思普光即是無師智是則龍女頓成佛一顆明珠非外物南方無垢息光親見靈山分皂白非則善星生陷墜廣説不明宗正理名聞利養接群機業滿生沉無間底吾早年來積學問衝風冒雨多迷悶一到曹溪更不疑方知往昔虗勞頓亦曾討疏尋經論永夜清霄習見聞只道多聞便是真誰知萬法皆方寸分別名相不知休陽𦦨空花豈可求龍舟舊閣間田地一度贏來方始休入海算沙徒自困無本隨商過海門眼覩千珍并萬寶歸來不得一文分却被如來苦訶責爾我真心何間隔貪忙只欲外邊尋直至如今連眼塞數他珍寶有何益倚門傍戶癡心急被伊輕賤且無言衣裏明珠猶未識從來蹭蹬覺虗行不辭山遠與深坑一擔須彌難放下愛觀峰頂秀崚嶒多年枉作風塵客不問東西與南北只應好住便安身聞舉汝身心似墨種性邪錯知解不體玄機持五戒行行坐坐執空觀見境見塵增鬼怪不達如來圓頓制丈六金身即我是離知名相更無知日夜燒香空自禮二乘精進勿道心南宗北祖亂紛紜雖是善因招惡果幾時解得見天真外道聰明無智慧養生只欲貪名利燒丹鍊藥學神仙有為不了終歸墜亦愚癡亦小騃五百三百成團塊太公發願乳香燒蛇行鼠步終須壞空拳指上生實解巡行數墨看經快圓蟾光體指俱迷枉入三途虗受罪執指為月枉施功一處明時兩處通月形兼指無交涉十方剎海性含融根境法中虗揑怪見説是師便禮拜汝從甚處到其間且作街坊兼化菜不見一法即如來萬機頓絶笑咍咍將軍戰馬今何在野草間花滿地開方得名為觀自在豁達靈光非內外野橋村店混塵流乞我一文充布袋了即業障本來空兔角主丈擊狂風龜毛索子穿雲鼻理會乾坤空不空未了還須償宿債這箇冤家何日解得休休去且休休莫入他家饒了賣飢逢王膳不能餐百品千般耀目間將謂君家親用底誰知益我自生難病遇醫王爭得瘥盧醫體貌殊嚴怪我見堂堂心膽驚不領仙丹從此壞在欲行禪知見力活計千般全不識十波羅蜜鎮長存龐公老漢通消息火裡生蓮終不壞念念勞生不自在彼既丈夫我亦然舍短從長無罣礙勇施犯重悟無生挑起三衣即便行逢人指出無心物當下回光似不曾早時成佛于今在瓶傾不出周沙界妙音遐暢廣宣揚念者念兮拜者拜獅子吼無畏説直言恰似翻成拙問渠何處住居家遙指前坡無處訣深嗟懞懂頑皮靼只道無人來剔撥我今年少或龍鍾胡亂度生管廣撻祇知犯重障菩提彼者堪修我不宜龍女化身來警世畜生驢馬我同伊不見如來開祕訣過現未來冤重疊罪性如空法亦然罪法俱忘心瑩徹有二比丘犯淫殺自嗟自怨無覺察遠棲林野望成真自業茫茫誰擺脫波離螢光增罪結却把小乘文句説疑心到此轉懷惶莫怪經非人自拙維摩大士頓除疑離四句兮絶百非實相門中非我所一輪心月鎮光輝猶如赫日消霜雪逡巡業海皆枯竭露出毗盧體不分別無藝解堪施設不思議解脫力不是思量心外得一句當天八萬門野橋金柳依依色妙用恆沙也無極豈吝參方來問詰何勞舉指與言詮杖頭一眼明如日四事供養敢辭勞自有摩尼價最高任君寶滿三千界性無利益漫豐豪萬兩黃金也消得道人有甚相交涉家中祖代沒分文廣度河沙三界客粉骨碎身未足酬念渠多劫力勤修如今分付無人要放體間眠百草頭一句了然超百億如如不動纖毫力普眼當觀如春晴曉霧連天碧法中王最高勝一微塵裡光無盡無邊身相入微塵轉大法輪常普應河沙如來同共證光光相徹無餘剩各申右手摩其頂龍天萬億咸歸命我今解此如意珠不論貧富灌頭舒出沒往來無欠缺四生六道入無餘信受之者皆相應不落有無凡與聖八面清風宇宙寬日月從他渾自性了了見無一物唯有天真一如佛普賢腹裏接觀音善財稽首稱奇特亦無人亦無佛廣大樓臺彌勒宅豁開門戶接群生一念無心全用得大千沙界海中漚何必春風更點頭雪夜一枝渾漏泄速傳驛馬進王侯一切賢聖如電拂智尊不動琉璃色紫金光聚沒遮欄説甚寒山并拾得假使鐵輪頂上旋萬里神光體自然邪魔似雪飛湯裏安能驚動老婆禪定慧圓明終不失天回地轉光澄寂却火洞然轉轉新箇事如如誰委悉日可冷月可熱凡夫倒用成磨滅大道圓明一性通春夏秋冬誰辨別衆魔不能壞真説真説無言光廓徹包含萬有不曾生天地亡鋒并結舌象駕崢嶸謾進途氣沖牛斗耀昏衢日月失光誰敢顧萬邪氷爍絶名模誰見螳螂能拒轍螢蟲七夕吞明月織女心寬不作聲牽牛一棒和空折大象不遊於兔徑針鋒頭上禮觀音百尺竿頭猶進步十方沙界現全身大悟不拘於小節猛𦦨爐中撈霰雪石頭垂足示長髭修行有甚相交涉莫將管見謗蒼蒼井底蛙牛逞巨江乾坤大地一隻眼用來還似一毫芒未了吾今為君決一字不留無可説耀古騰今徹底輝不離當體常光潔普菴歌祇箇普菴純寶貝妙慧莊嚴真暢快無門為戶到人稀萬里神光圓頂蓋非相身無不在體露堂堂聲色外世間夢幻曷能隨超出世間那肯愛絶意識無眼界淨名臥疾矍曇解指權就實度衆生勿謂古賢來揑怪悟普菴本無壞空劫有窮渠自在四生六道豈相干物我兼忘心唯最無有無內非內海印發光誰敢對森羅萬象普菴收絶待靈明全體會忘能所勿知解瓦礫真金誰敢買若還不是老胡來覿面難逢輪劫肯雪齊腰求教誨得旨忘言轉不退百鍊金剛無孔鎚要斷龜毛兔角罪如意珠我今解剎剎塵塵鋪障昧一毫端量大千輝爍破無明生死袋顯元歌不識本家元寶貝汩沒緣塵生死快阿賴耶識藏無明十八界纏繒網蓋貪嗔癡常在在心鏡空花分內外不知四大假成軀妄執六塵增渴愛迷此心有三界大地茫茫誰曉解依師戒定學看經聞通真空即生怪世間物無不壞唯獨法身鎮長在毛吞巨海有誰知芥納須彌實奇最本無外亦非內心法無形無可對假施七寶滿三千道眼未開心不會莫説知休談解自驪珠不著買用無盡處示衆生識不破人還聽語言為教誨不脫聲聞生進退剎那一念入魔群萬劫虗招無間罪本無傳莫求解祇這靈光終不昧大無邊表細無塵圓覺一輪如意袋摩尼歌一顆摩尼非玉貝不動隨機方便快無邊無表實先天亘古迄今無覆蓋六和同心不在放蕩汪洋塵世外箇中無可表真如不滅不生誰不愛卓頑空立世界非界非空有誰解返己回觀一物無光大圓融含百怪珠體堅百怪壞幻化元空靈本在三十年看水牯牛祇箇溈山實奇最華林子通非內踏倒淨瓶絶待對天上天下獨玄靈直至如今少人會老南泉逞見解提起貓兒人不買一刀兩斷不曾分主伴重重元不背了非言聞妙海鑽火逢畑莫放退忽然杲日爍氷霜不立微塵誰受罪天網非結解遍布彌漫這三昧堪笑衡陽沒量人彌勒光中拖布袋十二時歌志公大士遺十二時歌警二乘著相馳求提沉空滯寂不了普菴老人於斯誠言百匝千回絶妙在無言之説得意成無盡之意往往玄通斯人鮮矣哉誠既夢覽之為美不妨寐語續其宗須還鼻孔遼天底點首知空與我同志歌曰平旦寅雞鳴犬吠足圓音祗這圓音無二聽何勞妄想別求真擊鍾鼓了無聲了本無聲真好聽聲錧無體門前客體合聲空箇裏人日出卯齋粥無心覺飽鉢盂洗了自間間方信趙州機便巧師子兒金牙爪驚殺百年老虎豹揑怪文殊劈腦騎二乘皆道莊嚴好食時辰金牛作舞笑欣欣漆桶漆桶喫來參方誰識老婆心佛祖意只如今且無自己及他人雪峰指作一面鏡輪劫獼猴佩苦辛禺中巳報君學道無門戶佛語諸經標此心此心現時寂滅度本無迷曷有悟真我非身誰作做貪嗔癡愛屬衆生達者無非涅槃路日南午大地元來沒寸土天上天下獨為尊耀目連睛無可覩石鞏癡逢馬祖自己如空誰射弩三平了道劈開胸不拄箭鋒徒自苦日昳未擔板玄沙愛鱉鼻喪身失命幾多人張口送睛何處避不通宗渾寐語業識茫茫無本據盲參不體弄蛇人常被弄蛇穿却鼻晡時申衙鼓鼕鼕妙意新括地該天人不會如飄野馬入迷津不取相勿踈親露體堂堂絶翳塵屠兒一念無諸業龍女逡巡作佛身日入酉萬戶千家無別有相呼相喚去還來誰識一身非妍醜也無頭也無手劫火洞然渠不朽豬羊牛馬化為真毫髮不留無可守黃昏戌更點分明黑如漆一道常光絶世倫來往不通金密積知不知識不識自古至今非外覓木女清宵何所為混月間吹無孔笛人定亥墜石癡人猶搗碓忽然舂出古菱花照地照天無向背今時人會不會未了先須除渴愛情忘想盡至無依體若虗空非內外夜半子萬事無心誰到此一毛頭上了遍圓永劫不遭邪魅使升高臺撾大鼓努目搖頭如老虎豬羊咬盡更傷人自己不真長劫苦雞鳴丑飛空著地波波走演若達多再得頭依前不換舊時首無不無有不有有無不到休開口拈槌竪拂有誰知逐迹尋臊真獵狗頌石頭和尚草菴歌石頭和尚草菴歌試問參方會也麼千萬莫將茅瓦比離鈎三寸綽清波吾結草菴無寶貝日劫相陪誰曉會只緣窮子不歸家未免出頭來揑怪飯了從容圖睡快杲日麗天無可曬薄輕霧沒虗空飽塞虗空全不奈成時初見茅草新權披百衲強看經賴得藥山重決破別傳一句醒人心破後還將茅草蓋雨過風吹無罣礙垢衣那肯便拋遺切恐衆生難理會住菴人體露堂堂非故新毫髮有差魔道種一塵不立妙通真鎮長在不是坐禪并禮拜實相元來豈用修越古超今含法界不屬中間與內外獨臥孤峰誰作對龍天百萬有誰知金色頭陀笑裏會世人住處我不住布施生天終陷墜靈光獨耀更無餘未達凡夫開眼睡世人愛處我不愛樂是苦因宜早退六道四生何日休唯大丈夫能氣槩菴雖小寂寂寥寥勿邊表於中獨有一天真透色融聲常皎皎含法界大地須彌藏一芥外道聲聞永不傳究竟不如心自解方丈老人相體解一默全包無小大曼殊贊歎實希奇問疾不任知自敗上乘菩薩信無疑為法忘軀世所希粉骨碎身應未報聲聞小果卒難知中下聞之必生怪泥有著無生死快改頭換面者還來歷劫茫茫虗受罪問此菴有誰直下肯承當不假良材并巧匠重重帝網妙嚴莊壞不壞百鍊金剛充法界微塵不立似虗空始得名為觀自在壞與不壞主元在得未拳拳應不昧淫坊酒肆轉光明絶類離倫何窒礙不居南北與東西萬法無生何所疑巖樹庭莎標妙相猿啼鵲噪應真機基址堅牢以為最百億輪鎚擊不開定慧圓明非我所方知達磨不曾來青松下珊珊遍地誰知價無限聰明只道空問説真空沒命怕明窗內晃晃絶塵無覆草指作菩提却不真白頂門開全領會玉殿瓊樓未為對引慈衆生增渴愛放出溈山水牯牛露地難遮蓋衲被蒙頭萬事休九年面壁為迷流神光斷臂何希有薩埵投崖飼虎求此時山僧都不會猶若太虗無內外臨時應化即非真取馳求還自背住此菴不曾焚爇有為香終日示君君不見更無餘事可思量休作解衆妙玄玄無管帶文殊仗劍逼如來五百聲聞心豁解誰誇鋪席圖人買不用文章兼學解打破虗空歸去來離世界兮入法界回光返照便歸來鼻孔遼天眼豁開元來佛法無多子連𡎺三拳打自呆廓達靈根非向背不關南嶽與天台父母未生前一著香嚴擊竹始迷開遇祖師不契玄機道愈疏靈知不是目前法目前無法可名模親訓誨鈍斧開山百雜碎不求諸聖入玄宗雪點紅爐方稱對結草為菴莫生退百鳥銜花也不來花開還被風吹落不得春風花不開百年拋却任縱橫隻履西歸表不生來往本無常湛寂心心相印號傳燈擺手便行且無罪汝等參方莫錯會千古萬古一光明不動遍周塵剎海千種言修多羅教沒蹄筌魚兔得時非在説商人到岸不須船萬般解筆寫石鐫處處賣不將一字與人依露逈逈兮赤灑灑只要教君長不昧觸目無邊無對待行住坐臥是誰來提却蔓菁覓菘菜欲識菴中不死人幾回昏暗又天明明暗不來渠不動周天匝地等空平豈離而今這皮袋心法無形如大海汪洋不宿死尸骸萬古騰輝無變改活人歌大聖靈驗普菴圓廣施含靈遇有緣信心清淨通靈感萬病俱銷釋業愆文殊體用普賢活人歌裏現金仙藥王藥上非他術扁鵲孫真共一言分三服淨水煎莫將血味污心田萬物有形皆我體但行慈德解讎冤內無想外無緣何必神方肘後傳身心本是金剛體不解觀心被業纏藥病銷心月圓信時佛豈獨西天在在處處人皆有世間無比這靈源除罪垢脫百冤解使昏朗義天信知非我誰為病大士維摩笑裏眠衆生病我不顛體沒衆生我病痊不二法門誰敢道金毛師子露身全速投藥解塵緣莫學群迷眼似聖隨機應感非難易信手拈來不用錢洪鍾歌因李昭文施財鑄鐘作昭文昭文施一鍾懸空隨叩警盲聾圓音不斷周沙界純體金剛空不空雖含響擊即通十方諸佛應聲中天龍八部生欣悅外道魔軍失却蹤此圓器大神功上祝皇王壽不窮日月長輝國靜臣忠子孝續堯風昏者醒愚者聰民歌鼓腹意和濃地水火風同一性剎塵無間體含融包聲印頑空鳥樹巖巒風月同秦時何必驅山鐸大振金鈴總脫空時節至自相逢肯信無心達本宗和同一族輸金玉回向南泉鑄此鍾黃昏裏五更中下下無空徹底通近祖遠宗迷識解聞歸淨土禮金容涅槃侶契心同箇箇全音讚此功顯理揚真無二聽含靈蠢動一時通受者法施者空且無地獄與洋銅孝子順孫光遠慶昭文千古振家風開鍾示衆法語總中有別異中同成壞非干這一鍾收拾油鐺并火𨫼圓鎔法器隮盲聾以手指鍾云大衆還識此物麼良久云不可以智知不可以識識要得真實見解麼這箇不從天降地降亦非妄想發生孤標越劫不曾生獨卓超功不曾滅夢見衆生背覺不免敗缺一場拈黃葉而止孩啼立假名而標佛性會萬物成己而不著諸緣用大冶一烹而鑄成全體若到這裏且不用三乘爐鞴又豈消十聖鉗鎚自然一氣遍周羅金汁融通無間阻若遇知音之士何須剖擊始通真箇中未曉之人不妨下手善男子無奈下手處諸佛護持龍居無頂而牙爪森羅八角橫彰而金文歷落既到這裏不可埋藏大家聞了莫生疑只這無聞全自己遂拈鍾鎚驀顧視大衆云諸佛子切不得錯會各各運心諦聽遂擊一鎚放下鍾鎚云欲解不思議鍾聲裏薦取珍重學無學頌一十五首嘗聞學道不依形道不依形不離形不離不依猶寐語尋思寐語本天真休道這邊與那邊得時何更有枯偏有為皆是夢夢中明白體如然莫向人前説是非是非不到實希奇假饒講得天花墜大地山河總不知戴起枯髏撞眼睛燒香設拜甚精勤一盲引衆誰人會賺誤世間多少人病在己而過在師脫師離己悶胡蘆從前學解皆忘却撞頭磕腦愈心粗實見菩提説甚禪大家打開過殘年相逢道伴何言語無價真珠不用錢達磨西來腦搭披少林久坐若頑癡如斯顯爀非今古唐土生靈誰得知老盧得了不傳衣後代兒孫切莫疑衣法親傳兩不是心心心印了無知五家宗派亂縱橫未到玄門語默爭誑謗自招無間業直須全體墮深坑奪下生機不作聲耳聾眼瞎妙明生隨流只欲傳心印豈是緣情粥飯僧昨夜三更日卓中滿天星斗雨濛濛三門佛殿相携手要去西天路不通翠竹山茶映落霞猿啼鵲噪道誰誇一葉墜時秋遍界春風微動一時花悟人寂寂心寥廓迷者忙忙到處錯普觀迷悟實無因祇這如來大圓覺周歲孩兒八十翁若觀老少絶宗風衆生世界本無有妙在當人一性中十方世界口相吞不斷圓音説普門唯有普菴知説處一箇窮人不著裩天龍巖寐語天龍寂聽魔族魂消塵剎毛毫普菴不二為什麼開菴來至於此是故水月空花現形應物若得學無學士臨機而不著言詮一悟普聞妙解而豈俱聲色老莊之言不到佛祖之句難傳應如是知權名實相實相無空無不空將不空執尚違宗一多無位誰分別萬象森羅一鏡中菴本非菴開不開靈知自性即如來尋源窮處煙霞伴南嶺風光近日回上無片瓦下無錐被喧卜靜了無依多求欲叩無心者既了無心豈是非若將色見普菴人未免隨流不契津千里無來同受用縱橫妙用自家珍莫怪渠儂不出頭了心非相永無求相逢誰覺夢中夢浪靜間乘般若舟頌十玄談并序至人無己神人無功雖無己而無形不己雖無功而萬化皆通道法自然唯靈獨用用則非用通則全通若未全通疑心未盡心外餘絲髮祖道豈能全夾山聊顧存師德絶勝華亭下水船如今要問西來意深知寐語落頑禪同安大察禪師遺十玄談詩於世嘗覩處處開彰往往究其味者斯人鮮矣可謂字字透宗不留迹言言見諦以無私同世回潤之言談入俗轉機之撮要不遺平側韻對無枯文章不立事理皆無十題豈似於世間紙墨不傳於耳目除非見解可覽金章多學強聞伊渠無間者方信普菴老人寐語非虗唯心自肯今於一句之下加頌之三今古混融成八十首頌既已畢猶恐學者未察於題二十字為十法界三因八十句為八解脫之藥病因藥瘥敢問其方救未來之衆生起河沙之妙慧是故先題而後誦從本而顯末本末雙彰唯其察禪師也普菴向頭上安頭須還知之不知者即道如如頌題心心非不心未得印時生死侵除非一搭無纖翳六道皆標我相形心印也祖祖如鍾鼓未擊有意周天普虗幻形聲本自無如如不動亘今古祖意也玄玄不用言機鋒相拄箭頭連達道無機玄不滿儱侗真如有萬千玄機也塵塵背覺勞生地獄因鏡寫異形分皂白合元一性自天真塵異也演演莫執文書案上展教人戒定慧堅牢知見解脫堂堂顯演教也還還不消下水及登山左右逢源名實相從斯周匝臥雲間還源也達達遍滿河沙微塵剎本來無語似陽春雨過花枝連夜發達本也回回目擊心通處處開機深體淺無人會滿天風道我如來回機也轉轉兩頭不著中心選無位真人是阿誰佛祖鼻孔穿成串轉位也一一恰似太虗經鳥迹色即是空空不空度日長吹無孔笛一色也頌詩心印問君心印作何顏影現千潭印萬山夜靜畫樓吹玉管聲聲相應絶遮欄心印何人敢授傳無師弟子佛衆生幾多妄想成怪覺執境迷心拜衲僧歷劫坦然無異色東西何立誰南北若言別有一靈光認子不真元是賊呼為心印早虗言滿目真如自現前十二時中無不應金鶯頻道柳含煙雖知體自虗空性如理深淵融一鏡萬象森羅沒處藏摩尼離垢常清淨將喻紅爐火裏蓮精金百煆轉光鮮居塵不染隨宜用始覺松風解説禪勿謂無心云是道龜毛兔角非堅寶頑空作境是誰安不體十方源浩浩無心猶隔一重關滯寂沉空也大難啼問阿娘誰是母間雲溪水笑潺潺祖意祖意如空不是空鵬程九萬力唯風若非風體空何用體得無空道自通靈機爭墮有無功色空猶未達空空空色本無權立號無名全體露金風三賢尚未明斯旨羊鹿牛車孩子戲數墨巡行枉用功假立名為乾慧地十聖那能達此宗要須歷劫道方通飢寒不認燈為火空守門前草屋中透網金鱗猶滯水識神照覺非知己肯心鳥道即菩提三文買竭廬陵米回途石馬出紗籠嘶起寰中雨後風吹散暮雲孤月朗危巒煙寺一聲鍾殷勤為説西來意得意忘言真不二昨夜三更穿市過只聞米賤油鹽貴莫問西來及與東焉知佛祖一空同四維上下皆如是爭奈凡愚執相容玄機迢迢空劫勿能收非相非名觸處周罔象無心珠自現何勞汩沒外馳求豈與塵機作繫留有為何日得功周除非無我無人見體用全通得自由妙體本來無處所超聲越色非今古詮題不及議難思莫怪道吾頻作舞通身何更有蹤由三十年看水牯牛鼻孔無邊難摸索醍醐常納混春秋靈然一句超群象不落聖凡無伎倆長笑一聲煙霧寬含虗寂照亡思想逈出三乘不假修別傳一句普天收揚眉早是相輕忽妙得無心了便休撒手那邊千聖外見知不與凡同會高峰絶頂棹孤舟海裏爐焚煙自在回程堪作火中牛一葉才凋萬國秋月朗浪平無別事此心只在朝竿頭塵異濁者自濁清自清一輪堅白不容塵鏡中妍醜誰分別水月融光淨法身菩提煩惱等空平色裏膠青用始精鹽入水中尋不見舌輕點笑欣欣誰言卞璧無人鑒但辦肯心終不賺燎却眉毛尚不知詢岐欲往西天探我道驪珠到處晶包含萬有獨明靈同光索價遭人問兩手張開帽帶陳萬法泯時全體現大似金剛經百鍊定光鎔爍絶纖埃隻眼圓明何用見三乘分別強安名愍念群生習氣深寶所到時城假化何曾動步早觀音丈夫自有沖天志不著形名非與是交徹輝光意氣濃金毛師子真堪畏莫向如來行處行一身墮落萬尋坑人神百億扶難起耳不聞聲目似盲演教三乘次第演金言義體周天應自連黃葉止啼兒不呌方知纍劫困如眠三世如來共所宣至今不斷少人傳塞鴻非是人驚起風擊蘆鳴寫碧天初説有空人盡執未明理事虗勞力念來年久轉迷情心不負人徒面赤後談空有衆皆捐字字無空透色鮮八萬法門從此入如今喚作老婆禪龍宮滿藏醫方義藥病相當除五味攪草耆婆也大癡胡言亂莖莖是鶴樹終談理未玄口中吐露白如蓮一花五葉親分付只恐衆生眼著攣真淨界中才一念未離學地終須欠今生努力絶名言永劫不遭塵垢玷閻浮早已八千年朝夕忙忙被業牽一夢不驚塵劫苦何如領取現光前達本勿於中路事空王鑽火還須金色光燒却三千并世界死中得活也無方䇿杖還須達本鄉未曾舉足見娘娘多時不隔如今面子母連天笑一場雲水隔時君莫住橫吞碧漢包天地任他物變景推遷獨我真如全定慧雪山深處我非忘百一十城印普光彌勒樓開通線道方知臘雪似春霜堪嗟去日顏如玉常和白雲空裏宿千回萬匝只如然寥寥獨唱無生曲却歎回時鬢似霜眉毛眼睫放毫光從前無理今皆道笑指泥途七寶裝撒手到家人不識明朝更不分南北逢場作戲弄孔魂反指牛兒是彌勒更無一物獻尊堂剔出銀盆耀雪霜箭既離絃無退轉洞山收悔不思量還源返本還源事已差輕羅不著外尋麻勞慮即真猶未信忽然解道見桃花本來無住不名家唯有西乾路不賖三度他心通敗闕國師猶釣死蝦蟇萬年松徑雪深覆水泄不通無入路解脫門開一步周喃喃寐語分緇素一帶峰巒雲更遮倒騎鐵馬過流沙東西南北中央佛共飲乾坤一碗茶賓主穆時全是妄相逢迎送分階巷老胡不識警梁王寶積摩尼歡喜藏君臣合處正中邪名相和同體似差一二不成三不是八還要顯我無瑕還鄉曲調如何唱蝶拍鶯歌大道場唯有禾山解打鼓金牛作舞也尋常明月堂前枯梅華太陽門下雪交加寶樓閣裏多怪敗達哩摩尼吽𠷑吒回機涅槃城裏尚猶危親到靈山未足奇見佛忘知無我所六根常動轉阿彌陌路相逢沒定期蛇婆來命怪誰知四十八人成鱉鼻急喚頑禪草裏歸權挂垢衣云是佛釋迦也似偷空賊忽然捉敗不相饒丹霞火裏純金色却裝珍御復名誰更展琅函耀本輝了道不除權立一切元體是無餘木人夜半穿靴去得意生身無住處妙用難傳妄想心知君未解通方句石女天明戴帽歸一身渾著六銖衣喃喃解説非聲舌生得兒來呌阿姨萬古碧潭空界月猿啼徹夜何曾歇幾多孤負一輪光唯我同輝誰辨別再三撈摝始方知捉影逃形也太癡千眼大悲分得半維摩老漢始全提轉位披毛戴角入𢌅來水底桃花幾度開世界未生唯此性任他遷變豈輪回優鉢羅花火裏開方知達磨不虗來夜來一霎清明雨萬卉千葩勝剪裁煩惱海中為雨露窮坑變作珍珠庫可憐不識夜明簾打破畫瓶無作做無明山中作雲雷閃電霞光爍不開霹歷一聲山嶽震曼拏大士笑咍咍鑊湯爐炭吹教滅一日三餐飽便歇獄卒牛頭惡夜叉同氣連枝應不別劍樹刀山喝使摧十波羅蜜印靈臺光輪無盡奚邊表不是貪嗔根得來金鎖玄關留不住穿雲透石充寰宇四時不語信寥寥萬劫超然希伴侶行於異路且輪回百億分身撥不開地獄天堂非別有相呼相喚隱天台一色枯木巖前差路多不行鳥道轉誵訛狐狸引入豪豬窟不久成團被死魔行人到此盡蹉跎一指頭端不奈何毫髮有差千萬鷺鷀立雪非同色鏡裏色空誰間隔不是青黃黑白紅上下東西及南北明月蘆花不似他於中一氣逼天羅涅槃影裏無相識鼻孔遼天笑大哥了了了時無可了乾坤道我無邊表夜摩宮裏混金風兜率殿中明皎皎玄玄玄處亦須呵喝斷烏江返碧波寄語東吳諸父老不如聞早念彌陀殷勤為唱玄中曲澗水相和音韻足唯有伯牙欲露機斷絃深意無人續空裏蟾光撮得麼待風列子已蹉跎須彌無縫徒伸手任是先天不奈何以垂世立教豈曰乏人顯本標宗莫偕斯典實藏經之耳目誠佛祖之果源寶劍而瑞氣莫渝粲粲明珠而清輝難掩以彭逢源彭褒彭大霖李實李觀國等親聞如是敢不揄揚共施家珍命工刻木用廣發揮於後世庶幾有補於將來為萬古之徽猷作吾宗之真宰知普菴之應世乃古佛之再來可謂千載一遇也得不志之于後時歲乾道二年季春滿日參學弟子和光應世拜題化米當關擊破黃金鎖佛與衆生無兩箇全提吞盡十方空萬億龍天為護佐雪歌獨唱古峯頭風月溪山同讚和從來弘闡在當人密賴知音共揚播共揚播非彼我一鉢千家崇善果直叩維摩不二門狹路相逢休放過買油三百六十斤油何須苦苦問他求心光廓徹燈何用水草無心若畫牛五味舌頭無足日煎熬煮炙幾時休功辨斯成無點染西江一口絶纖流行童搬土童子聚沙為佛塔而今搬土豈無功忽然覺後知非土當處回頭識本宗老僧念你善根微所以教伊不失時朝歌暮擊三摩地不久迷開解我機普請道友搬瓦當時驢覷井如今井覷驢酒醒溪邊思往昔至今方覺彼區區空花解弄兒路蝶引癡蜂入網蛛誰是那頭能警叱回光返照越賢愚雲蓋瓦鋪須子細筆端有口顯文殊咦珍重鐵竹歌普菴和尚鐵竹歌十聖三賢不奈何九節玲瓏通法界不由籩筍自嘍囉從百鍊已經磨能障狂風止海波惡龍攝毒皆由我猛虎歸降豈是他世出世間無可比非凡非聖力摩訶莫耶劍比天戈生滅勞形費氣多只這一條剛不壞撑天拄地應三摩身瑩淨意曼陀非眼耳鼻六通和肉眼那能堪作見二乘天眼尚誵訛德山老漢却老婆橫竪宗風般若多罕遇其人難措手至今獨卓立巍峩君不見莫蹉跎點石為金也是他即栗橫肩千萬箇解吞鐵竹可相過未動口時百雜碎豈同狐族唱巴歌順天助道功非細只欲令人脫死魔喃喃解語非關舌入水何曾動碧波鐵竹自歌如是唱海潮音徹笑呵呵拈碁遊戲三昧禪這箇初因戒定然後觸目涅槃當觀妙用縱橫蹊徑權分四九一白二黑無名天地之先落二落三有名萬物之母玄之又玄衆妙之門何窒礙迎之隨之自活方能無失錯為什麼如此雙闕難破抑亦須成一道常光隨精明密釋子道狐孫展腳官人於象鼻藏機癡人徒闊角偷欣然則終無解脫智者存腹寬海量快活無憂傷嗟拈子細包覿還如不識破籠輕不覺不知只欲打劫逃生多虗少實有忌有諱怕人漏泄頑機磕額撞頭到處離披裂瞥君不見爛柯仙一局知他幾度年自出洞來誰作對未曾舉手早贏先高不高玄不玄默然輕轉不能言得失都盧無箇事一時收拾華堂前若人要問消息落落真風印碧天數珠歌如是數珠祇一顆離垢摩尼光不破佛説剎説衆生説三世一切説這箇未了人休將過成佛人希念佛多却將妄念數如麻念來年久却成魔假慈悲當什麼順時吉逆時禍行住坐臥似風牽誑謗佛法如行貨木槵子麻穿過假名一百單八箇和酒和肉耀心光誰覺死來連汝墮心念肉口波波業識如是怎奈何靈府未清徒念佛身心淨土自彌陀旃檀成來惠我拈起連天笑一和自家不比這般人黃葉止啼元是我聰明人猶較可二乘聞説心如火幾百劫中用數珠今日教人都訣破善男子不恁麼法無斷滅言無過一人道假百千虗何不學西來達磨不立文字無唱和寂滅光中神護佐九年面壁沒人知直指人心少林坐雪齊腰割臂墮猶自惺惺不放過徵詰神光勿得心忽然解悟方擔荷報參玄休懡㦬決擇身心是什麼虗空何物可相當體得一如間打坐十方諸佛念珠同法界圓明無兩箇引彭仲和心齋二居士拈永嘉證道歌夫證道歌者實諦難思議妙契不可説大好取不得舍不得是什麼不可得祇麼得得箇什麼若有所得然燈佛不與我受記汝於來世當得作佛號釋迦牟尼若實無得然燈佛應與我受記作佛如理實見我道然燈佛不著兩箇頭是一箇人是知百千萬劫過現未來一切諸佛皆悉知是除一心法門之外別有得者盡屬外道邪師聲聞緣覺有為著相泥文字求知見妄取殊勝欲現神通貪名苟利能所不脫目前鑒覺未破不契宗元忘前失後住有為而説無為著有相而談無相見箇真實人略有一言半句面便紅赤口似啞羊手若風牽無本可據業識茫茫擔定一百二十斤屎桶擔子不肯放下道我學解超過人法自埋自蔽我慢增高誑妄無知令他邪見永失本心我佛門庭誰曾踏著所以永嘉大師與十方諸佛無二説無二見無二心無二佛無二法一切不二究竟如是便道諸佛法身入我性我性同共如來合一地具足一切地非色非心非行業彈指圓成八萬門剎那滅却三祇劫若悟自心是佛更説什麼佛及時劫剎土莊嚴名相學解殊勝知見此心法中若有一塵許未是本心不為法身喚作心外有法未得圓覺圓者無漏覺者無空無漏即無為有漏即有為無漏無為真實相有漏有為凡夫法覺真毫髮不成空妄覺頑空陰間夾終日圓覺而未嘗圓覺者凡夫也凡夫不知自己身相從來以來唯一圓覺廣大清淨法身妄認四大為身六塵為心惡死好生迷背本心不得受用成佛永劫不壞之身若聞見性成佛便興妄心別求知解豈不是騎牛覓牛將心覓心使佛覓佛無有是處何如直下承當全不費纖毫之力所以道終日圓覺而未嘗圓覺者凡夫也凡夫是假名以要言之將妄顯真令歸悟體即一切佛一佛一身多身一相無相方可一了百當如今出頭分疏不下設言言見諦字字歸宗早落第二機明眼人聞豈不相笑哉何況未得謂得未證謂證瞞昧凡夫自欺佛理萬劫千生墮此惡轍誠非小事佛語不虗果報歷然信者信自心清淨即得作佛不信者背失本源永沉苦海生死何休我説本無説君知本不知如如方合道合道不思議蒙妙意為拈出永嘉大師三關不覺潦倒哆哆和和又與麼去也示弟子彭資深心齋居士靈山話月曹溪指月禪可禪而成大過一念頓超沒量人六月雪哥向猛火參方侶休打坐學至無學得什麼自從打破趙州關收放縱橫句不墮這雪曲誰解和舉意萬機無兩箇拈題頌古若河沙須是金毛師子子這資深被誰苦夢中踢發千鈞弩射過山河石壁空枯髏爍盡無纖阻希奇希奇誰得知心空及第心齋子古賢無限學無為罕遇明心輪劫苦聞不聞豈小補識破天下老婆子箭鋒相拄道應難針芥相投萬事間不知佛祖只談心悲愍盲參往別山沒絃琴誰會彈盧公便就指風幡直饒不是風幡動不識真心轉見難我意無盡非言説離百非兮四句絶首觀梁武夢胡僧未達修山龍濟決一百一十四重玄大冶爐中撈片雪生不生滅不滅萬法千機誰透徹普菴不舍一微塵本末雙彰無説肯將法界作紅心一箭虗空渾漏泄行者圓通求法語師云諸法從本來常自寂滅相常聞楞嚴會上我佛垂言阿難當知妙性圓明離諸名相本來無有世界衆生因妄有生因生有滅生滅名妄滅妄名真是稱如來無上菩提及大涅槃且夫涅槃者寂靜常樂真如實相除非真正見解便為妙會佛出世者元無出入名相無體道本如如法爾天真不同修證只要虗間不昧作用不涉塵泥箇中纖毫不盡即為魔王眷屬所謂等妙二覺羅漢辟支緣覺聲聞削髮披緇頭陀苦行皆是權接迷妄衆生令歸正道設有顯現神通百千方便故得一相無相一身多身以法界為道場化群迷而為佛事是故法華經云唯此一事實餘二即非真普菴老人自解活計之後了本無為日用唯以佛之知見示悟衆生以為佛事十二時皎皎地無絲髮許作得間隔不動道場遍十方界忽因憲公禪匠全道智人夜參之次告師云和尚抱道之士常不背於應緣往返辛勤孰可忍乎可以告懇十方檀信求化進納一人能了事者待充有請修奉祈禳庶幾參學者早晚得不空過免滯機輪可乎師默然不答良久噓氣一聲云不是這箇道理老盧得法非僧相龐老通明豈離家大事未成俱業網除非了本是生涯諸仁者此段大事從來千聖不曾踏著若不達本明心妄覓一片袈裟褁却一箇凡夫身剃了頭受却戒謗正法虗貪信施受人供養成諸大業永墮三途萬劫千生不得出離誠非小事老僧實不敢妄為大難保任大難承當又云好好這裏若是箇喪身失命自肯承當者出頭來對得老僧寐語者便可披衣剃髮了本有什麼交涉時有行者圓通出云行者呈似一頌伏乞和尚提撕師云速道通云和合無二相圓融大智鏡對機何阻隔靈光徹瑩瑩師云儞鼻孔只今在什麼處答云誰敢承當師云掠虗漢鼻孔尚不知却道要為僧且不管設若未透玄宗箇裏終須無別汝能如是不顧存亡日用自然即事即理都無礙普菴與你共一手作出一隻眼該括塵勞融通一性弄有作無將虗為實莫令撞著箇鼻孔遼天底人略有一言半句相問直得通身是口及乎到這裏也分疏不下汝還知麼有麼稜禪師云萬象之中獨露身除非自肯乃方親昔時謬向途中覓今日看來火裏氷應須與麼方有少分相應普菴即今不懼明眼相笑這裏下箇注腳心月孤圓時光非十五六迷者以圓觀智者應妙觸印危崖鑑川陸一性圓通無委曲了非心外逐塵緣下坂不走天然速誰道速有佛之處不得住無佛之處一時足時來鐵解放光明運至石頭成白玉幸逢施主大開張古佛慧命汝今續進納大道等虗空離諸色相諸佛不出世亦無有涅槃若不透達玄機未免拖泥帶水如今若要超凡入聖打鳳撈龍直須捋脫頭毛橫肩一衲造箇無縫塔子騎隻露地白牛休説飲水分河這裏要須明白圓通圓通當陽顯赫但存一片報恩心大施門開無壅塞袁州開元寺塑佛右伏以金身丈六應化非真萬德全彰色空不異兜率未下早降王宮未出母胎度人已畢雙林示寂而本光不滅法性常存毗藍現瑞而生即不生天真圓湛三十二相而非相不妨萬行以莊嚴八十種形而非形到裏許者解非非色無法可説而説法海藏五千道不可言而常言燈傳無盡是以雲門不肯放過且圖天下太平丹霞火煆無疑人人有分隴西達士重標立萬行圓明道果成舉目含靈俱是佛應無所住得其心與圓定書圓定不病此病非定斯有我名辨故如是我亦如是如是如是不可思議此中可理一目無漏故不可説幻在其中非妙明寂照體用雙彰智悲同運之人焉能信之應于觸目以此物祗待必無咎焉狗子無佛性打殺了也且作麼生分別趙州這一箇無字也常向諸人提撕早晚不可放過大乘徒侶焉比凡流顯則如杲日東升無物不照隱則如晦月在雲定知其有可以道化自然莫生私礙出入無非動靜一實慮有魔怪忽起好惡細微現量彼自銷鎔覺元不動三世如來奇特十世古今尊重究竟事成更察於中懶墮者遣歸亦不妨老僧近來杖頭生眼應不死漢知之全用心齋無心總攝於心餘無可道示彭升伯驪珠一顆印千峰越古騰今處處通元禪道貫纖毫絶方知佛法不曾窮孤雲片片標心法野鶴翹松表自容千眼難觀誰解見赤幡直下起清風妙覺十方無影像靈知三界絶行蹤所以不墮往來之機不墜中間之意真如凡聖地獄天堂須還了事底人眼前鑑覺自破一微塵也不立權法義修羅迷指不見月兩處大誵訛來叩普菴老真心豈奈何除非君自肯陽春白雪歌毛端如來識言説用間多情忘并想盡不斷這摩訶咦仁者且道這箇是什麼聰明不敵死生關乾慧豈免輪回苦到這裏更説什麼前程禍福身命因緣自性本淨妙圓於中且無別物虗空猶從妄生何處更有這箇消息雖然如是不妨隱顯其中道有説無也要君知落處色空不異智人應不他觀是以今時重加寐語頤軒頤軒當處湛然萬法歸一不勞外覓無心合道貫離微大用堂堂無不吉回瀏陽縣資福寺書某稽首瀟湘古岸徹底騰霞向蒙飛錫未餘旬一軸琅函空裏墜未展覩祥光而遍界金風深知唯有箇中人妙意筆端資福事古賢憂道豈憂末事難成若是當人何愁這箇不了某空花標相水月談禪以法界而為道場化衆生而作佛事君禮耳順而性純一雖為外道之所惑已覺其非明自心之所得而無所得而無所得出家漢但識取心無法不備既是得心而明本隨方而應法非真大事圓成不動而化周剎土達磨西來且不做屋普菴入嶺豈欲焚修一輪秋月映悲風數和松音標此意因緣究竟莫勞神時節到來無不備所有現在無不證明可宜自把釣竿免被小蝦戲弄經云雖是善因能招惡果木匠休愁無酒肉大家免得落群魔但管來年了應教不動波隨心做箇殿別事莫多羅更有一般好只箇阿彌陀化齋糧刊注心經摩尼無價希逢辨寶商人窮子背珍蓋為久迷歸徑若遇奇友指珠不離於衣中信善思修不日還家收寶藏此心經括大藏五千餘卷只在凡夫之心凡夫若解此經又更與佛何異須是依經契悟直截根源不可捋過數珠將為看經已了又更燒紙化疏虗誑作福招殃若會佛説處非有非無便解普菴解注若了自性如空無相生死喚作涅槃超他千古念文章當下一聞便解脫不可容易須當信施齋糧然後請經也要心經堅固甚幸達理歌普菴識心達理不是胡言亂語教化三千大千箇箇透泥入水應無所住生心更不祭神拜鬼時中淨念法身何假燒錢化紙不被邪魔所惑各各盡淘真理亦非夜聚曉散亦不遠尋山水亦不發願燒香亦不棄離妻子不啖衆生血味便敬六親九祖誓不飲酒猖狂不入牢獄苦楚見利便不干心處處如欽父母你爭無明人我我自無可作做修橋布路隨緣身作山河國土供養大地含靈上願皇圖永固時時風調雨順日日民歌樂舞皆因自性天真永不入他門戶如今一物無求不著邪魔祛使不離當處湛然運水搬柴佛事何須打鐃擊鈸豈用槌鐘鐘鼓饒舌合掌歸依早被參方取怒只心普遍蓮花何異西方淨土自古本自無迷今本何曾有悟設有三乘五教也似添鹽和醋生死涅槃如夢佛説無所作做更問達磨西來他亦別無門路直指人心是佛不可更移一步才有絲髮是非便入魔家邪戶死中得活之人諸佛龍天守護斬釘截鐵丈夫這箇凡夫了事如今人贊神欽萬劫群靈仰慕到此若不回心豈識摩尼寶庫自利利他不竭經劫且無怕怖披雲嘯月吟古風透石穿山談正法只箇心如巧畫師只箇身如無縫塔東村老婆是我娘爺是南門張大伯
