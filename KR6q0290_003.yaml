body:
  text: 紙被歌訓行童佛以大慈悲示諸含識方便門蓋緣蠢動含靈皆一佛性耳只為情生智隔想變體殊流浪四生輪回六趣五百生死遇一聖人若契無生永超苦海遇之不識迷妄轉乖只欲惡死好生不覺披毛帶角才離人相念水草以逃生一失人身萬劫難復大若垂天之雲細若微塵螻蟻念念煩興剎那生滅是知佛説三界唯心萬法唯識識如夢幻夢覺真存今嗟汝等性本天真迷斯流趣今遇普菴出家求最上法乃是宿因亦非偶然便能割斷愛緣來親至理圓覺經云若諸衆生雖求善友遇邪見者不得正悟是則名為外道種性邪師過謬非衆生咎若見色聞聲而求我者汝自邪行豈干我過大抵只要超脫世人所欲之物指瓦礫墻壁為真斬釘截鐵猛烈漢出家那有不成時箇箇灰心人人寂照若得箇中與太虗而合一體且喚什麼作法身便能全己無私解百億化身為我體任他東家作驢西家作馬大笑高歌誰明雪曲死生不變越古超今為了事人出家功德非微直是這一般人與普菴少分明契作我弟子許他千劫萬劫説法不斷度無量衆永為天上歸依人間瞻仰苟或未然且與普菴沒交涉如今各人受三歸五戒了却與你覆蓋一鋪可與對人天大衆分明承當取早朝晚夕東蓋西包行住坐臥子細看是箇什麼物若有鼻孔之子不在言詮若遇盲眼之人死尸熏壞我被了也説亦不知舉亦不解攝自乖離父母相背六親入我精藍屎牀尿壁十二時中喫了十方檀信飯著十方父母衣道又不修業如海水無明種性發渴何休智慧慈悲且無毫髮如今且為行童向後復作村人念念自業纏身死沉無間苦哉痛哉復歎堪悲諸佛出頭來也無計度你處好好去他家受飽粳食斤兩不少一一還足又復細酬且無間人相待千萬各自努力若老和尚亂道承當不久入地獄永墮阿鼻若在這裏莫空度時日珍重歌曰一片白雲挂在身披時不許染紅塵輕羅細想應難比重錦尋思未可親豈非顏色白如玉成現都盧只一幅紅窗妖艷見低頭六賊三尸盡降伏日充衣夜得蓋不長不短也不大世人問我何處尋蔡倫弟子將來賣買得將來披不許邪魔罔兩知解向市𢌅遮雲雨要與間人隔是非縱顛狂任落魄披入村中人惡惡直饒紫綬與金章我也未肯輕輕博又曰皂袖寒袍入體儀霞光閃爍繞身飛或行或坐頻頻看或臥或眠每每披幾度入山遊勝境數回海上覓龍騎假饒千兩黃金貴難買山僧這箇衣大圓智鏡普菴非相亦非名達本忘情不見人孤月全收無意識桂輪獨耀絶纖塵三祗一念湯消雪萬行須臾火爍氷到此何勞聲色問共君本自鏡圓明若將銅器作天真背黑面青賺學人本性如空含萬物妙明寂照豈容塵山河石壁三春霧空色全彰六月氷智自圓明非我所不拘日月定光明與參徒辨事仲元亨老殷勤圓淨此中大事雪曲高歌騎白牛兒漫空唱唱囉這家也舂米那畔爭打禾且道乘誰力天真大老婆近日南方諸道友斬釘截鐵自降魔運水搬柴無不是神通妙用顯摩訶一人辦力諸天供一會修來爭奈何移根拔樹非邪作翻有為無萬事和樓閣忽然橫碧漢人人功德無空過香積味憑知道者須教不少亦非多箇裏不消重委囑分明只是這彌陀普菴因道友説陳摶打睡師警之日當午有巴鼻莫似這漢打瞌睡精魄沉滯識神牽墮入三途難出離我這裏不如是眼若不睡諸夢除端然靜坐沒牽纏縱橫自在無縈繫學道人生慚愧普菴萬劫眼不閉鼻孔連天叫大哥海納細流通大意勸君修休退志坐斷乾坤無別義一條脊骨鍊純剛撑天拄地更無二這光明全體是充滿山河崇富貴明月堂堂皎碧天絶待靈明撒手去一事無心了便休祖門一句普天收離相非空無別是無聲之樂響啾啾李光遠宅糴米堪笑南泉老古錐住山情況了無依解使木人來買米和光風月正先知奇奇柳眼桃腮總是機寸草不生千萬里出門春色共依依癡癡三千不惜換驪珠若問普菴來意處光明遍匝體如如與湯亨老居士香積厨中烹五味腳踏天兮頭頂地雖然頭角各分張未得箇人都了利不然亨老大慈悲一日無私和衆議南方道友不偏枯到裏許人皆具備直教塞口併咽喉消息出門無不是與李光遠化糧達空為實解境即心方能箇裏接群迷始堪表作如來用古寺香花住持無數只欠一箇眼睛所以荒蕪日久今日道場瞬目法指燈籠風幡不動仁者之心了針鋒而法身具足乃得高檀光遠儒風滿腹語默全通肯信無言如空入理覩山菴四來風合魚鼓難鳴欲得一飽忘千飢須會廬陵真米價求字與目共作緣馳莫令相遇本色人一簷須彌簷下動切希珍重小師圓通頌兩首此信寥寥誰得知風舞巖松千萬枝杜宇連聲聲不絶鷓鴣啼處緑楊垂閙市藂中全體露資深深入老婆機無心應物物非物如幻摩尼一顆珠通濟妙圓圓種智塵塵剎剎顯光輝方便一申非語句殊祥萬載不思議圓通又示行童衆行童諸佛子親近智人無彼此努力今生須了却萬劫千生從此止寧受山門一切苦得聞諸佛金剛髓金剛髓時時舉直教血脈通無底用無窮盡意周圓百萬陀羅皆出此布曼曼無住處隨時密用無他計入泥入水也無私轉不退輪三摩地寄諸萬行圓明精進奉持自心佛事諸頌贊贊三寶圓光應現無心物大地山河恰似無驪珠一顆非非相信者權將作畫圖直指人心親見佛何勞打瓦作龜爻一片白雲橫谷口幾多歸鳥盡迷巢迷悟本同光信時無隱藏幻空如夢體三昧覺華王贊達磨妙契觸目菩提誰觀達磨西歸只是老胡揑怪好與三十竹篦試問參方知不知狂書早自落便宜也好與三十拄杖還有人敢下手麼試斷看贊須菩提伎倆全無始解空雨花動地泄機鋒欲求靜坐無方所獨步寥寥宇宙中咄信士畫師真請贊非迷非悟誰強名模無相三昧不受塗糊越色超聲無箇事連聲不斷念蘇盧眉芒動處千光含自肯除非大丈夫持心應不失謀事便忘真誰識元明寶虗勞幾度春因見普菴老示我體皆純但依無著性性幻在逡巡咦普因乾坤非外物周聞法界祇圓音含靈入我身毛孔非相非名何處尋寶陀觸目無人見妙體端嚴不壞金如鐘含響隨緣應見我方知識自心釋迦佛普菴光不二如來體不藏香花供養誰知有只在衆生心印堂此法身無變壞鼻孔裏許藏三界水月空花點不成非相光中常自在法空為座金剛為體板如癡脫空無底信心無二吞山蒼天蒼天悟無生法談不説禪開兩片皮括地該天如何是佛十萬八千易盡世間顏色普菴頂相奚為等大虗空一體霧露雲霞表衣眼觀不見耳聽不知惺惺不昧了了何虧自解拈花知起處冷笑達磨更西歸用晦隱顯無勞失亘古亘今也大奇示衆法語礦去金存百鍊周自從索價沒人酬騰今耀古非聲色曾共溈山作牯牛身若浮雲心若風居常不定在虗空忽然風捲雲無迹誰人解識主人公大隱居小隱山了心無事沒多般休緣到此磨塵垢絶愛終須耐歲寒百草上參多寶佛鑊頭邊勘趙州關莫教一擊連天地震動坤維頃刻間示楊仲質誰識一微塵於中藏本佛時時常放光照燭一切物只許信心人在處無輕忽這回如未應不離金剛骨逢本分鉗鎚煆成非外物和光讀金剛經師以頌示之道人看經不識字剎那須轉千億部恆沙諸佛入微塵達本契經無作做何叔宜求頌十力功高誰履踐叔宜重叩普菴門玄玄衆妙靈知有自肯唯心聞不聞時信金剛通佛慧情忘想盡合乾坤夜月曉風消息滿希夷獨步道常存破屋頌示衆一箇間身穿破屋風吹雨滴轉光明燈籠露柱時時舉只道以平報不平琉璃殿上鞭金馬追風不及三腳驢咄氣急殺人良久云放過一著會麼平地起土堆大有人未許你在咦是什麼衲衣示衆一箇間身包萬有不能自把著針縫衆緣聚衲須微細妙相莊嚴一大通下下針鋒無不實條條線貫不空空連天鋪地山和水一合圓成始脫籠更有一般奇特處巖前枯木笑春風布衣示衆老僧一領布衫勝過趙州七斤大稱四天門王扛不動汝等謾下手看只是直下要成就不許粗疏須是出入處一切人見不得方是好手腳未審末後句作麼生道咦快劄示徒我有陀羅名解脫在在處處和塵撥莫令撥著箇凡夫何用剃頭并展鉢咦連妻帶子龐居士一時成佛都包括妄心不滅禍難除任向祈求卜大虗了道不消多語話當軒自有顆明珠半夜三更莫費油澄潭捉月幾時休冬年莫惹紅塵客家道安然體自周寄語門徒諸弟子得心安樂外何求未得塵勞息須依善知識若肯慈悲學發願施心力入泥并入水莫作間戲劇揚眉動目處法身無窮極於中習懶者管取沒飯喫趂隊只口飽披毛無了日不信佛乘經逐末本却失咄哉大丈夫你乘誰氣力當本無我人貪忙有何益何似歇無明聽吹無孔笛五音六律全皓月悲風寂一聲宇宙寬箇中聞的實和同為智身無物堪遮窒奉勸草木影間時急收拾與夏國舅白日上升非偶爾剎那成佛亦如然箇中逈超聲色外恩光滿目意連天好明廓徹非思量一受皇書遍普賢江西風月光無盡帝里真如萬法圓當處飲吞無不足護持祕密不休年與王巡撿號懶翁佛法從來付宰臣今朝已遇大心人透明幻住超生滅鑒物無私佑聖庭良久云會麼達磨非為後瞿曇未是先當來無量劫懶翁得自然與廖維高精通三教越禪機語默同風和者希匝地周天居士眼元來只在一毫釐又云且道毫釐有什麼交涉向道故非外物資深和光初參師求頌同心實步叩南泉雲飾空巖廓杳然一室清風千古意自非聲色問玄玄示行者絶頂無人處融會亦非難獨步依無住圓心豈往還深深妙在無言説莫教間指動風幡大事徹頭須進步白雲千里故鄉關師覩弟子作頌題窗乃續韻警之饒舌刀刀不透臨窗一語更離披儂家自有同風事千里無來却肯伊自云通身是眼見得一橛通身是口説得一半要會南泉親切意無過頂後著一鑽石人擊鼓木人吹露柱親聞腦搭披如是圓音無用處閻公未肯便饒伊自云蒼天蒼天敗缺不少時來節到自解了了切莫妄想不許夜行投明須到不妨試道著還知有麼不道不道死也不道鼻孔遼天是阿誰權將雲霧作衣披迷悟本無唯一性你全是我我無伊自云應如是還有過也無與你三十拄杖噓普菴三頌自連拈寄與提網本手鉗爐鞴穩時無鈍鐵何妨矢上更加尖拈云寐語一場老倒慚愧恰好師四字書窗以印實相得正無非離一安印空圓足寶瀰漫天魔外道從何有體若虗空世豈干佳乘兩口草標頭共見同看水牯牛昨夜牧人無被蓋今朝猶笑道無求實離貫穿理不俱一人直下體同渠久停頑坐邪思起返謗如來正覺虗田頭十字路堂堂鉗口收心便廝當領得摩尼真寶藏却來警夢表提綱普菴老人於一微塵中出此止觀定慧若人會得於此寐語有什麼交涉許他一隻眼若人不會亦許他一隻眼吽吽且顧污邊獨腳橋子好好好去蒼天蒼天又頌一輪心月耀昏衢夢幻吞侵誰得知幸遇知音重為舉息心回念理元輝一句當天正信希欲談詞喪懶投機高峰既遠休尋訪不惜眉毛為發揮一身清淨本無瑕了了歸家勝出家紅葉舞風須早覺莫將有限逐虗華一心圓持種種心信心諸境絶追尋此中無分應難到便好回光免陸沉頌斷觜瓶心法無斷滅踢倒一淨瓶華林不奈何不脫聲色名真如俱是戲心境一等平不落有無用三昧本空清咄重陽日頌去歲逢重九風流主得賓黃花談般若白法樂天真今夕當良會高峰沒四鄰孤笻挑日月何道不通津百丈先令慶上座禮拜求頌西川慶上人本來沒弟兄須知自性如空體水月之中未解真箇事不傳聲色句元來心法獨靈明送米與百丈頌百丈孤雲入道林真如不動意難尋道人相見非來往語默全彰亘古今近日廬陵親得價一時分付老婆心百丈回頌普菴標格出稠林千里披雲得得尋一見機鋒雲橫影再窮玄辨古無今更將玉粒米相惠正是當人鐵石心行者妙曉求頌頭頭相應人希會物物皆真體不殊但辦肯心終不賺情忘想盡入無餘自是出家無眼目只言苦行落空虗甘贄在俗猶通理妙曉無求自得珠紹椿行者求頌假使八千五百歲紹椿松鶴未為奇不若紹明光不變此中實應出家時念道何憂衣食事千光影裏聽鶯啼聞聲一囀渾消息滿目蓮花不見枝陳達獻菊花求頌滿地風光未足奇霜前秋後吐金枝靈山親舉唯迦葉今日陳來衆共知不獨陶生時節用轉為華藏供阿彌聞見定歸依彼岸方知此日獻花時行住坐臥三十二頌卯粥普目不拘開合眼意光何必待天明衆人未起我周布行益資他腹自膨辰齋瀾渾湯水熟淘沙不著油鹽醬醋茶飢渴隨時餐少許只思因甚悟桃花行住割愛辭親如是行豈求衣食及為僧步步澄輝無別想卓然獨立妙明生坐禪夜靜風悲人悄悄衆緣事辦寂寥寥趺坐結跏雲漢定誰知臥月忽明朝習聽生老病死苦相煎唯我能知速棄捐十二時中常念佛聞師一舉耳無邊受持聞道真空不著言信心清淨在拳拳只將此性光明遍語默行藏豈離禪澡浴了身如幻向誰言運水搬柴化有緣忽遇浴堂人指水輕清妙觸轉光鮮向火雲凍風彌鳥絶蹤洞山只道沒西東等間目擊誰相委賴遇丹霞作炭紅飯頭將勤補拙入廚中不問青泥事事充拾得寒山明此意如今成佛滿虗空香燈恆河沙劫奉如來功未全時眼不開自知本有靈光物香燈不絶警癡呆知客不虧掃地與煎茶門戶開關用法華雲迹雨蹤來不住箇中誰肯速還家掃地心地光明淨土圓一切人見我無言只拈掃帚東西撥震動三千及大千侍師百里千鄉信未圓到來空爇一尋煙我今朝夕時聞見粉骨碎身報未全茶湯主賓交接未開言便過茶湯應口邊察理聆音非外物結他歡喜萬千年淨頭護淨燒湯不離坑慈和三昧益群盲十方諸佛皆如是豈效披毛業報生浴頭衆生垢重汩塵緣豈自收心向覺源挈水拾薪時節至三通鼓罷物皆鮮柴頭千年枯木老縱橫鬼怕神疑夜叉燈不是道人誰敢動如斯應不是衆生炭頭火出木燼灰煙滅黑白無纖可作師喻若春風融臘雪普令冷暖偏枯席頭幾番舒卷濟羣迷馬祖升堂百丈知由是那時通一線而今收放莫令遲幹木引領搬徒訪萬山深明下手處艱難圓成滿目蓮宮現風鐸聲清意自間幹竹緑節間雲間古風茂林濃處沒西東子猷消息無人問鸞鳳飛來足印空幹瓦和泥合水實辛勤不遇明師事不成今已連天鋪滿地順緣無漏必通津幹磚密迹彌綸不露塵天龍八部喜還驚劫火洞然無變朽此中人轉普門經幹石歷劫塵沙積竇巖十方諸佛共同參多寶聞經親涌現故非柏梓與松杉合藥扁鵲盧醫速退邊大家飽喫普菴圓解冤釋結消諸病感應無方不用錢塔頭如今無縫古稜層透石穿雲度有生普納衆緣無住著狀如一室百千燈幹街黃金布地非為富白玉橫街惹寇徒心地平堅塵不入修羅萬億手難摸幹橋直截無根樹子鋪超凡越聖大心粗忘軀為法方如此擔板真如大丈夫填路轟雷吼電警昏蒙雨歇風清似脫空佛教衆生弘大道資家報國續宗風園頭千百年前老古錐鋤山钁圃示針規蛇兒挑起無人會直截橫拋更勿疑米頭靈源車轍顯來由一粒穿時快疾收莫待廬陵高索價臨機下口卒難酬庫司摩尼無價汝當收金玉浮財誓莫求戴角披毛從此入百千萬劫作驢牛右具足三十二頌以法報化普資衆行勤誠奉佛而求最上乘因成正因果必正果永劫不墮其宗過現未來普應普菴老人如是書示爾時百花萬柳蝶拍鶯歌共證此事無漏無餘直得三門佛殿一切相許露柱燈籠和南稽首末後一句作麼生道珍重造塔示衆求人不如求自己自己肯時無不成如今寶塔所將圓諸人盡發一輪心氣急殺人因悟道靈山會上沒間人大小不拘皆拽石高低齊轉普菴經山林巖谷皆微笑此是如來最上因若有癡頑撥不轉豬樓羊棬好安身老僧拄杖頭有眼不打披毛戴角倫如是斬釘并截鐵一人了事萬緣新回彭居士書某啓應求座右應目未嘗離左右扣宗差別風馬牛遲速不停俱滯學箇裏還須自肯休某土木怪形受恩非淺無心應物每悉意勤來書得味審惟尊性法我圓同太虗他家罕有得用迷因惑相乃屬識神妄認變為生死根元之幻本妙得一智不以色相音聲為窒礙乃識破了也不被世間幻事所惑權喚作超凡之士直須一性圓通一切性一法遍含一切法不動道場以自法身遍滿十方無盡虗空無針鋒許空缺處方契本佛與今應求始覺同源便解二空門元不著一性如來體自同却好於十二時中行住坐臥一文一字皆歸實相門中語默歌吟盡屬無性之用不見馬大師與大梅和尚云但識取汝心無法不備且如心又作麼生識古者云不可以智知不可以識識咦這裏著得一隻眼睛可謂識得無心達有心識心三界自平沉可憐迷望無心者只道無心境不侵故經云菩提心生生滅心滅若得菩提心生則都是你家中活計道有亦得道無亦得不被他瞞有無俱不到生滅豈相干得者隨機應未達莫瞞頇言語煩多去道轉遠且道有心及第與空心及第是義同別不然但得無心之用更説什麼及與不及觸目相應無有不是應求底忽然覷破當下瓦解氷消甚生暢快今日來書沒一字兩承光訪理非緣玉麈惠我耳中收光伴應求學秀圓語録并風水禪來晚令送時中非間千里同風萬億珍重答彭資深體得寰中物忘機自葆光老莊言不及佛祖句難藏稿木非成道灰心豈離忙資深無欠少本有不須忘某以此訥言表繼嚴韻切冀仁才勿以作詩解山僧某自愧宿習頑癡乏智慧種謬處此方披衣月頂表如來事幸於狂風之內針芥相投忽覺勞生俱為幻夢念念入華嚴境界步步登實相門中攝境歸心更無他物即心即物寂照忘知大用現前隨機應物別無奇特只自承當今究資深所為晦光詩乃超然見性悟彼塵勞且有漸覺輝華似乎於真空中所有妙蘊此念若口勤勤離物觸事圓通一體全收衆成虗幻所謂通於一而萬事畢去住自然生死輪轉延壽禪師云此理不可剎那忘照卒爾相違肇法師云至人空洞無像而物無非我會萬物以成己者其惟聖人乎石頭和尚一見便悟却乃云聖人無己而靡所不己所以訥句和呈云本有不須忘不見老子道上士聞道勤而行之中士聞道或存或亡下士聞道大笑之故有相告一味直言道無形視者莫能覩道無方行者莫能到在性之而已矣豈區區數萬言而可詮之哉此是圭峰草堂所示之言小僧了本之後常常味之不獨斯也自頂門一開應觀吾教佛祖所説經論禪句及先王之典今古聖賢一言半字無非是道何也金剛經云凡所有相皆是虗妄若見諸相非相即見如來如來者佛也佛者覺也覺者道也夫道通者一也然後通於一而萬事畢無心得而鬼神伏伏者休也休者不動也不動即是道有應即是定慧圓明悲智雙運故稱為佛性若人究得乃作含靈之主肇法師云天地與我同根萬物與我同體莫怪老倒語言三昧實謂無盡千億珍重此道又答前人南山北嶺如父母張三李四皆佛祖隨時只箇無著相許儞住山一鈯斧心齋與麼會更教老僧説箇什麼方便及乎到這裏恰如迷路之人欲問懶去欲去懶問問去不無通身全露畢竟見解人以這箇為體以萬法為用又不急又不慢時節到來非難非易大無妨小無礙只是於中有真實者可以本末究竟若於中無真的可信之物故不可亂道也具來毫楮無不備悉應有應無即事即理所抄隨未然之病患心齋所願我願亦如道化非凡豈偶然如是古德云此經不入餘衆生手唯大心凡夫可以流通為一切衆生作方便起信功德因了知釋老為一切衆生發欣樂而現世為一切衆生發戀慕故入滅一切佛法且莫説一面做橋要得寬打了官恐更彼中缺欠娘爺眼睛時一面多方打會𬅿小老者只管還更教化彭仁仲圓契圓信圓定普印萬道友及諸來道友韋道友朝夕一等與他雪山肥膩草飽料莫令他飢恐橋了又失却你眼睛也是一場敗缺令人取笑周念一道友不可得極荷他此信此中萊與我鄉亦如是且説及晏公諸友且慈悲耐煩別當面謝一切中只如是老僧和南與應求書某啓瞻應求眉宇昨來過辱寵惠厚勤言不可及假使百千劫贊歎莫窮盡實知應求昆仲所樂者皆可謂上士也凡俗安知之否老拙託熟敢以不避罪責而告於君幸以道義空心所交往來無所得念此一大事因緣出生入死汩沒塵勞無有覺者賴我佛釋迦以付迦葉轉轉相傳至今信入者一悟永悟更不復迷喚作無價珍用無盡利物應機終不吝此理非男女非老少究得者乃超凡越聖為世之尊永不避生死輪轉經云在家菩薩者是也永嘉云在欲行禪知見力火中生蓮終不壞只要識破世間幻境認取本來元性甚不廢力昨日令兄恰來所亂道拙墨往往忘前失後莫為怪笑甚不專切文字又在憲兄寮中他夜來方回今特遣人賫去幸見收若無事可以簡録早晚專附書問訊昨聞有往聽讀老拙將謂復往秀州恨恨而已復聞令兄云只在近處欣然欣然旬休不然得暇日千萬惠然再來可美雪堂信至其文未到往往遣下今文字你封角道體無間幸君不昧紙宀道廣勿可言之普菴云云金剛隨機無盡頌并序夫道用隨機機等虗空於縫罅言談無盡吞萬有於毫端除非到裏許人方信得及我佛以金剛喻衆生之性無可變壞一體圓明凝然湛寂解空請問誘進未聞而凡夫迷悶背覺合塵習氣冞深不能自悟若而契證者鮮矣偶睹賢士訪次出示前住木平亮禪師為頌卅四首標云金剛隨分頌五言四韻八句或以古詩貫玄機而非異或彰事理總法界以圓融字字歸宗言言見諦且道梁昭明太子具什麼眼便解如是分開歷落耀古騰今若還不得木平老也是一場虗設於中不見有卅一分卅二分兩頌往往寫傳遺落無因尋究印肅不昧管見無離實相隨經補之圓成卅二頌仍於一句之下不違其韻加以三句聯成一頌總成二百八十八頌題曰隨機無盡頌本無言説所以隨機法身非相故稱無盡是故此經離一切相則名為佛若人離文字語言及思量馳求而得者便解於中一為無量無量為一色空不異真俗一如萬法千門同歸方寸喚有作無將虗為實動靜語笑隨處明了更無少欠用處不換機心外無別法盡顯諸佛之妙道皆談不二之圓音唯信及者同途豈非心者能會成現而須圓至道弘闡而全在當人矣時隆興癸未十月望日慈化普菴印肅稽首謹述啓唱真乘稽首一切智圓通十方慧無上兩足尊法體含三世歸命萬德師與慈啓大悲溥度恆沙衆願力難思解空無比量世出世間上了義修多羅圓明真實相慧命久住持阿僧歷劫祇如今言下會碎體報難齊我欲窮真法法則非非法雖法非正固要會無法法隨文偈贊之標宗立妙機通方聞便喜聲聞應皺眉紅露穿碧海是汝心非綵不是風幡動如如無變改白日繞須彌只今是阿誰共君一夜話勝讀十年書標經題目般若真微妙無相為宗要無住元為體十方皆昭耀研窮理趣長堆卷積山岡言言不及一口吸西江方言稱智慧真人本無位出入面門間參方還了利喻法比金剛萬邪豈可當不壞超今古日久共行藏彼岸波羅蜜清光穿白日鏡中不亂光虗空無鳥迹經文華貫行破有作法王連年心苦念不悟枉時光誰知遠煙浪孤帆一片張穿却虗空鼻不著更參詳別有好思量滿目足風光釣船依舊放不見謝三郎法會因由分第一舍衛多精舍常光非晝夜波斯擁出世摩尼不知價祇園境最幽太子施功周本心無住著顯法有來由聖凡同遣日盡講波羅蜜唯解空知更不勞心力法會起因由平地起波流含靈同佛性忙忙不肯休食乞王城罷説箇無生話是法皆平本自無高下齋餘衣鉢收心外更無求法王灌頂子離相性優遊欲窮千里目野岸渾狐族大家歸去來莫道盆光覆更上一層樓清風似餌鈎纖鱗吞不得莫怪釣竿頭善現起請分第二善吉言初有樂欲聞初首不墮往來機中間無所有慈尊護念因曠大劫相親衆生皆我子豈獨出家人菩提無相貌凡夫多變豹不落墮野狐不昧猶成降伏在何人能言不能聲解語非關舌廓然風月清如是真如是無不心地觸目應菩提名標法身義諦聽須諦聽要靈山令迦葉以心聞達士宗禪定一堂風冷淡翠竹籠軒檻夜靜松聲清蟾光凝湛湛千古意分明萬國賀升平昨夜泥牛吼今早木雞鳴大乘正宗分第三欲説宗乘正不落凡兼聖有無俱不到截斷邪師柄宗乘正若何未了説誵訛要知三十棒趙州勘老婆四生空鳥迹六道無見覓十二假因緣了幻元無識三界蜃樓歌龍女念摩訶驪珠將獻佛無垢越娑婆諸法元非相示法明心量於一微塵中森羅及萬象無餘任滅磨應不唱巴歌真如法界內無自也無他富嫌千口少煩惱何時了地獄與天堂歷歷無人曉貧恨一心多此心却老婆打破關南鼓和起德山歌妙行無住分第四妙行無抅執三界非出入相對且無言巍巍獨足立諸塵勿易難那箇別歸關可憐迷妄者橫錫步雲山虗空無限量普光明殿量百千三昧門在一毛頭上福德絶遮欄生死不相關不住心布施越彼煉凡丹月浸巖松冷唯此身心肯衆生即佛性佛與衆生等霜凌溪竹寒雲外疊峰巒誰人知此意獨坐且深觀只聞風擊響圓通銷妄想旋汝倒聞機直下分斤兩知是幾年竿細察早顢頇一聲無孔笛寥寥天地寬如理實見分第五達得真如理三界唯心起如今心地也無六道憑誰擬方明實見身見身非是身法身無所得非相本來人如來非所説要解無説説將無聞為聞方達西來訣凡有即虗名恰似曉天雲日高風一掃萬里廓然明赤水珠難隱無限人撈捃罔象性無求得了何憑準華胥夢易惺盡屬髑髏精却將夢説夢何日得超升誰知席帽下今日猶疑怕獨有裴相知鼻孔遼天跨元是昔愁人昔愁元本真迷己為物者淪却受辛勤正信希有分第六戒福修持衆罕得無心用衆生肉為菜講論喧天閧於中正信希悟了始方知見聞如幻翳拈來總是機善根經遠劫一念還迦葉微笑領玄宗了本無交涉取相便成非窮子不曾歸寧自拋家業甘受野狐欺繡谷花爭發黃鳥聲清滑傷嗟今古人錯七更錯八棕林鳥共飛一道轉光輝癡人隨物轉悟者發真機青山無限好自是人顛倒四時勿變遷不著從人討猶道不如歸歸道不如如道本無象法無念契無為無得無説分第七菩提無定法一體常周匝箇裏了無言圓成無縫塔如來有説耶聲聞未辨邪返成非謗罪却業雲遮聖賢皆一道十方常浩浩當體即如來何須苦修造優劣見千差迷繩謂是蛇一輪明皎潔光分幾萬家朝菌榮非速一念無延促超過數量心智寶非荊玉溟鯤運不賒大地一微沙更有九萬里依舊入蘆花南泉中水草古錐更老倒放却鼻頭繩四天無處討隨處納些些騎牛已到家堂前無影木雪夜忽開花依法出生分第八寶施三千界住相終成壞離相達無餘此是空知解難齊四句功五蘊未曾空半夜作天曉不識日頭紅遍觀諸佛法不與群情雜聲色外威儀透過魔軍甲皆出此經中無法不通同夜來得一夢今日又相逢柳眼窺波緑豈是人彰目思量也大奇響應如虗空桃腮笑日紅蝴蝶趂遊蜂好箇歸期意爭似竺文公不能延數日盡屬天功力時節自推遷此性無拘執開亦是春風未免一場空明明分五葉結果自然同一相無相分第九不與諸塵入雨灑何曾濕八風吹不動卓然獨存立方能預聖流常在更何求逈然超彼岸莫戀涯頭舟一來兼不返我道也擔板超凡越聖時腦後方開眼三昧共優遊何處不風流見色心無二無二也休留離欲心無若藥病皆拈却眼耳有觀音豈用安手腳蘭那行自周空手把鉏頭人從橋上過橋流水不流牧童真可樂摘草吹畫角撒手撫牛身鼻孔難摸索歸去倒騎牛乾坤得自由知道江山濶圓成六不收莊嚴淨土分第十昔日然燈所見聞非我語方成授記因達道超今古曾無一法侵心外更無心月冷空當午松寒露滿莊嚴諸佛土我道無門戶清淨表莊嚴未達人多誤清淨自生心心生三界沈若心生住相依舊入稠林無住真難見見見非是見見不能及時頭頭隨物現非身大莫尋日落隔天陰露柱侵雲漢井是丈三深山雲昨夜雨簷頭滴滴舉寒山拾得知雙雙為伴侶溪水曉來深片光萬物新相識滿天下知心能幾人無為福勝分第十一四句難談説修多羅指月若復見時珍重了真歇持經不自誇白玉本無瑕若還更道會碓觜却生花施心超剎寶晴空日杲杲幽獨逈無私至今漫百草得福勝河沙這裏又勾加亦無所得故菩提薩埵耶萬物陳芻狗靈鑑無能守我尚不可得非我何可有諸緣眼病花長安幾萬家露地白牛穩休誇鹿牛車因遊樵子徑底事因緣定不唱葛藤歌打箇直截令誤入葛洪家説盡天涯話爾我無自性常光遍天下尊重正教分第十二正教堪尊重一法共不共十八不共時滅却南柯夢人天幸指迷初機但受持菴園無滴漏天曉始方知修羅皆供養天人咸戴仰不離此經中念念來還往塔廟比摩尼覺了不修持身中真舍利只恐自狐疑隨説功尤博何況精心覺無學人即是大圓覺能持行不低天龍守護伊中塗生告別拔苦與耕犁龍宮盈海藏金口親宣唱字字不違賢箇中絶名相但是此筌少室老狐癡九年面壁守梁王不透機如法受持分第十三善現重伸請妙悟心清醒實扣此經名豈欲談虗境當何奉此經直千金諸佛從此出十地尚魂驚金剛真般若默契非談寫教外別傳人世間希得者名字假宗乘宗乘豈立名得兔忘去通方萬里平既剖塵中卷三千及大千鼓衆看喧天休擎日下燈髑髏照路行一日皮相離零落撒荒坑欲知親切處必定無本據忽然言不會勘破面壁覷庾嶺問南能踏碓到三更誰知憨俗漢紹祖列傳燈離相寂滅分第十四慧命聞深義五體如山禮學海一時乾心空方及第欣悲淚濕巾憶昔枉精神今朝聞道矣夕死也甘心金佛曾忍辱樂處巖菴宿忽覩歌利王將直拗作曲支解不生嗔語默自欣欣深知無相貌木石表虗形道大言無妄佛誠説非誑如是接群生生滅心説謗心空行亦純轉不退機輪鄉關無異路花發洞中春千峰消積雪巖溜聲清切回首覩梅開疑是梅花裂萬木自回春向道無故新勸君休取相拈起轉光鱗持經功德分第十五功德無邊量不及如回向回向理不如妄想顛倒誑持經力荷擔忘機越聖凡深心奉塵剎古佛共同參施身空造作欲求無上覺勤苦歷僧祇對面還失却小法勿貪婪無二亦無三唯此一事實何用廣言談室內交珍寶方悔初顛倒白日上雲霄帝里風光好門前廢草菴平常不離方失却菴中主猶是雅郎當信心才不逆心外非他覓一體更無餘無餘也不識當處即瞿曇骨董兩頭擔頭長三尺二身著七斤衫能淨業障分第十六持誦心無輟不事間言説夜夜禮觀音水裡撈明月為人受困窮真金喚作銅棄之尋鈍鐵攬外钁頭空信知先世業淪苦於塵劫今日受持經我相漸休歇惡道自銷鎔因明智慧通久客還元舍不離舊家風氷泮春池日野岸花狼藉傷嗟今古人幾箇知恩力花殘晚壑風煙寺一聲鐘若能從此人直下悟心宗君看連出水萬物安堪比居塵不染塵欲界行禪理根在淤泥中花開麗日紅潔精無玷汙明月却相融究竟無我分第十七菩提真無我圓知見可可若言更不會丙丁來求火當生如是心絶待本靈明迦葉門庭廣直是不容針衆生非滅度説滅度成誤真如法界中你我何門戶承佛記堪任情忘境自沉解吹無吼笛彈得沒絃琴溈山牛加字鼻孔皆相似牧人執杖看免惹間公事雙林髻插簪實志共同參梁王宣命處一拍令通三經行誰得見假相天真現不得志公時也是深秋扇半夜老猿吟驚起木觀音拶著虗空背相打到天明一體同觀分第十八國土河沙數廣論無遮護窮間一箇人無裩又沒袴衆生種性深安可類圓心妄迷塵數業三界自漂沉直須全五眼私業無家産天地也不知莫怪渠儂懶不可得三心圓光得一尋成就一切義無古亦無今室內千燈晃佛有何形狀如淨琉璃中內現真金相潭容萬像沉識水悟心深堂堂空界月癡猿徹夜尋落花隨流水劉阮曾拈起喫了入桃源未是真如理明月尚孤吟松風似海音海枯終見底人死不知心法界通化分第十九福德元無實本光常湛寂圓明法界內杳廓無窮極方云福德多多數尚誵訛法身超數量菩提薩婆訶大千堆七寶不及黃頭老剎剎等微塵當日杲杲法界是檀那人天福德魔力盡箭還墜依前入愛河樵唱牽漁唱川陸無間障兩箇且無聲佛在舌頭上田歌答郢歌露柱中心和田郢本自無露柱是什麼不辭山路遠要見唐朝面對面也不識誰知者方便蹈雪也須過不是聽巴歌見本來人雪曲應難和離色離相分第二十色相因緣離須明真智慧古鏡復重磨照天更照地頭頭見佛身元是本來人棒打不回頭照靈非故新如來言具足切莫外馳逐當體即無餘曹溪留一宿非相即能仁莫錯認金輪行圓三十二慈悲普濟人榮辱空中響迷真逐妄想觀其所由來盡屬虗撈攘山河鏡上塵獼猴背苦辛參玄識得鏡了了見方親煙村三月雨物物皆相許只欠自承當顯露堂堂底別是一家春豈俱日月輪諸法不相到間身混白雲非説所説分第二十一無説名真説唯有迦葉無聞而聞聞四七當頭別真聞信不猜無去亦無來聲聞無見解人天幾萬回若言佛有説執指為真月月指兩俱迷昧修多羅即自謗如來何因得辨才和風三二月花發為誰開貝葉非文字決擇世間事義理妙難通假立多門路琅函訓小孩得了笑咍咍欲求天外事須棄世間財一條楖𣗖杖兩頭光晃晃打破須彌山挂在眉頭上南嶽與天台皆入鼻孔內試問野狐精你作麼生會無法可得分第二十二佛得菩提法然燈默不答無法可得耶妙理還周匝為無所得耶窮理絶纖瑕不可得中得無礙亦無遮信知如是是如是是非是真如無是非咄哉休瞌睡如是些些翠竹與黃花打鼓弄琵琶還我一會家迦葉金襴外多少人不會應以色求我不妨淪劫背相如玉片瑕翳眼有空花投機不施笏定動豈能差只知聞信馬髑髏遍天下是他無不知忙忙渾晝夜不覺誤隨車迷己為他家指南却作北妄意繞天涯淨心行善分第二十三是法無高下純一非晝夜無故亦無新非真亦非假菩提元等平摩尼一顆明非色非非色了自本無名我人消息盡忘軀失却命參方不遇人却乃成心病善道自然生萬里體中行慈悲兼惠施念念我無能暖律潛消凍萬國春風動柳上一聲鶯喚醒輪回夢春池夜長萍浮生豈暫停解説千古事到老也無成但知行好事好事不如無金剛元是鐵秋至鴈㗸蘆莫要問前程何方不現成動用語默處不欠一微針福智無比分第二十四世界須彌主法身遍寰宇拄地復撑天切忌知人舉三千等大千佛化進程言恆河沙衆義會底豈勞詮皆為七寶聚布施心所住人天小果因爭得入佛位廣施布無邊終不了心源於性無利益福盡果還偏未抵如來智通明成大慧用處不換機隱顯頭頭是無為福勝田頓覺如來禪阿鼻剎那滅八萬及四千海門風靜夜滿月遼天挂除非知不知實相憑誰話天際月輪圓澄澄湛覺源無風休覓浪説甚老婆禪化無所化分第二十五調御無他念萬行俱無欠只是老婆心三乘分頓漸凡夫有我儂貪嗔百種凶佛説多方便令歸此法中群情非外物萬莫生輕忽皆是自家心外心無餘佛不宰是真功色不異於空起時唯法起眼瞎耳兼聾飯湧維摩鉢聞香即解脫後來香積人到被他輪撥杯涵落廣弓疑蛇病腹中一切著眼壞誰肯學真空世間多少事千門并萬戶乞晴便得晴祈雨便應副總在不言中一默絶狐蹤若不是文殊維摩枉費工法身非相分第二十六法界全身量在一毫頭上西天牛喫禾東土馬腹脹如來一念周無盡意風流豐干騎老虎溈山跨水牛欲觀調御體窮源須到底不墮有無空何處不是你莫作轉輪儔用識不勞修眼前鑑覺破華亭覆釣舟色見終難見就裡明須現回頭徹見時不離娘生面聲求不可求見迹不尋牛迹在牛還在不求何自休臨崖看滸眼滸即是你眼眼裏有真心真心非滸眼特地一場愁角聲吹畫樓不因勉道者洎合一生休無斷無滅分第二十七趣向菩提道可道非常道無名天地先十方源浩浩當無斷滅心休將聞見尋一念無思體圓通妙智音法身元具足東君無私曲有木便開花有笋便抽竹境上絶追尋見境便生心踢倒淨瓶了溈山創佛林芥納須彌內萬卷詩書在須彌納芥子一字也不會毛吞巨海深一頓飽欣欣曹溪一滴水猶尚帶辛勤驢鳴并犬吠皆標第一義幪頭都不知一體包天地何日不觀音六窗一晃明十方俱擊鼓一處一時鳴不受不貪分第二十八法法知無我坐却聖凡箇德山拄杖親要打劉鐵磨心心忍最玄無中絶二邊南山燒起火北山得翠煙不應貪福德強接無生客聞聲恰似聾見聲非外色隨處示威權𣗖棘金剛圈世人吞得者萬古入燈傳緣岸嚴陵釣半夜守天曉及至日頭紅未免隨他照平湖范蠡船空恨萬波前不觀天上月徒撈水間天古今人易老無異霜凋草本根依舊青不解尋元討片月下伊川豈是別人源若還識得水性海量無邊威儀寂靜分第二十九無所從來去法身非住處充滿十方空言説非本據方稱調御師大願力弘慈含靈皆一體滅度行無私欲明三界主莫信邪師語説有有無時道在未相許莫認四威儀行住坐臥知念念皆相應珍重任時宜伯雪徒擊目失錢遭罪辱安心畢竟空一念無延促陶潛謾皺眉猶道得歸遲爭似龐居士心空及第歸一株庭際柏青青無變色不逐四時凋權指南標格千古任風吹明月最相宜寒鴻雲外呌此意有誰知一合相理分第三十世界元無實空劫那安石空由迷妄生大智安無識因緣本自虗六道渾如醉一翳滿空花便落思量句有為皆幻夢無為常不動可惜這圓光把與髑髏弄貪著是凡夫不著是老盧老盧今古在迷背自塗糊剎剎波搖影那箇明心鏡大海一浮漚漚破方消醒塵塵井覷驢莫怪目區區妄迷爭瓦礫不識夜明珠若能與麼解無買亦無賣問著不做聲咄他云作怪方得契如如倒騎三腳驢踏翻毗盧頂露出一文殊知見不生分第三十一真見實不見當臺鏡中面元是本來人不著求方便真如實不如萬法了無依鐘中無鼓響不墮往來機如來重舉問不是等間論衆生習氣深免墮三乘分慮恐後來迷黃葉止孩啼依前不是息間且伸眉法應如是解其餘休揑怪六臂任三頭一心無變壞有解却成非猶未盡離微一體含法界無知無不知洪鐘渾鐵鑄懸樓插雲勢搖杵一擊時此聲振天地鼓是兩頭皮禾山打不迷道吾聞舉笏能有幾人知應化非真分第三十二應化即非真高山水底行有情皆是妄無妄勝南能有為皆夢形顛倒執三生善財不費力百城一念登如如皆合道休向外邊討大地作纖塵萬里無莖草七寶豈齊經福多不離心心心心是佛何處更堪尋説時不取相相説却成誑不誑不謗時如如真金像無相中為人天鼓發音聲汝等諸天人昔為地獄身易開終始口會理休分剖照鏡失却頭引惹波波走難保歲寒心至道只如今知命愁難入無私禍不侵歎仰流通釋梵龍天衆憍尸加敬重悟佛了無生悟與含靈共欽聞如是經遍吉示知音天上及地下盡屬法王心同心咸信受萬行俱圓就一道灌衆生誓願弘慈救共喜免竛竮超越生死名將虗却作實以平報不平緑綺霜前奏妙音無不透凡夫入耳通禪家為有漏焦琴月下聽露柱却知音世人應不會側耳立松陰曲終人不見惟日面月面盡是龜毛布漫却琉璃殿江上數峯青露出卷心經明明沒箇字向道祗如今結實分主建業蕭梁子歷劫宗心祖志公一會人顯道騰今古能執般若鋒發信力難窮豈羡金輪位只樂佛心通劈開三十二金點琉璃器燦爛爍光輝誰解分明契削去百千重字字括歸宗達佛真知見不離此心中義寫非臺鏡廓照圓融淨當頭底是誰不識方稱定心傳靜夜鐘意在九霄中佇聽鐘聲響為人萬劫窮青山藏不得走殺參禪客拶破洛浦珠面前光烜赫明月却相容獨坐大雄峰三身與四智妙在一塵中統宗判元録并序解空全體得無相而普能入一切諸相者可以統宗了心如實證不二而普能入一切諸心者是謂判元苟或未然皆成妄想噫佛意玄妙非世間能直是六通正遍神用不空以無作智而十波羅蜜現前不妨下箇注腳以無量慧而百千三昧全彰一任舉古拈今既到這裏師子子須師子吼狐狸兒定野干鳴巴歌才舉世皆唱雪曲高揚和勿人莫怪佛法無多子大死中難得活身不因如是爭分別百則汪洋寫未真爾時大歲乾道五年解夏日序舉菩提達磨大師梁武帝問如何是聖諦第一義師曰廓然無聖帝曰對朕者誰師曰不識拈云世王共法王相見雪上加霜龜毛與兔角交加是誰親睹普菴則不然好問梁武帝陛下見箇什麼良久云只消一箇達磨不識周匝無餘不著言未離竺國意光圓廓然無聖誰饒舌萬古騰輝世莫傳舉菩提達磨大師神光斷臂立雪而問諸佛法印可得聞乎師曰諸佛法印匪從人得光曰我心未寧乞師與安師曰將心來與汝安光曰覓心了不可得師曰與汝安心竟拈云諸人道達磨面壁九年普菴道達磨一時無識是人道神光失錢遭罪唯我道二祖為人著力且道將心請師安者是什麼心與汝安心竟者是何物若道有二祖尋不得若道無達磨安心竟大陽正照凍釋氷消迷悟是誰先起立忘軀失命老婆心東西豈離摩耶腹南北彌綸針不任舉三祖僧璨大師四祖道信禮師曰願和尚慈悲乞與解脫法門師曰誰縛汝信曰無人縛師曰何更求解脫乎信乃言下大悟拈云者箇公桉檢點將來正是三祖不解脫我若當時見恁麼問便劈脊與一棒令使百雜碎成箇沒量漢賴得言下有省若不如是只就者裏縛殺諸人且道四祖得見箇什麼便於三祖言下大悟良久云不妨速道速道一念心開解脫門倒騎鐵馬繞昆侖一條脊骨純金打傳與人間蔭子孫舉江西馬祖道一大師有僧於師前作四畫上一長下三短問云不得道一長三短離此四字外請和尚答師乃畫地一畫云不得道長短答汝了也忠國師別云何不問老僧拈云馬師當時只具一隻眼所以費力於地上饒一畫更不得道長短子細思量來馬師亦不曾離此四字外答著這僧若教普菴見有此等精靈畫長畫短便向渠頂門直下一穿永劫教這僧動不得國師著語曰何不問老僧此義則不然設若問國師我也知你不奈何不奈何不奈何一長三短大誵訛當時不是江西老一口橫吞起碧波舉杉山智堅禪師一日普請擇蕨菜南泉拈起一莖云這箇大好供養師云非但這箇百味珍羞他亦不顧泉云雖然如此箇箇須嘗他始得玄覺云是相是語不是相是語拈云杉山普請大衆擇蕨只得一覺活玄覺要相見也也大難也大難徹見無私欲度人如張羅網飛禽千萬之中不得一好申供養老婆心舉百丈惟政禪師有老宿見日影透窗問師曰惟復窗就日日就窗師曰長老房內有客歸去好師問南泉曰諸方善知識還有不説似人底法也無泉云有師云作麼生是不説似人底法泉云不是心不是佛不是物師云恁麼則説似人了也泉云某甲只恁麼説師伯作麼生説師云我又不是善知識爭知有説不説底法泉云某甲不會請師伯説師云我大殺為汝説了也拈云百丈却知老宿房內有客老宿且不知房內有百丈試斷看百丈問南泉五千四十八卷之外一句南泉又道不是心不是佛不是物據令而行依欵而結百丈甚深南泉大淺淵澄不二無物不現未解空時決定疑速教歸去莫令遲諸方罕辨無聲句師子還生師子兒舉江西馬大師有講師來問云莫是師子兒不僧云不敢師作噓噓聲僧云此是法師云是什麼法僧云師子出窟法師乃默然僧云此亦是法師云是什麼法僧云師子在窟法師云不出不入是什麼法僧無對百丈代云見麼拈云是人傳馬大師即心即佛我見馬大師非心非佛學徒皆看馬祖弄師子唯我道馬大師弄豹兒不免弄到不出不入處直得這僧亡鋒結舌更和大地人失却性命噫慙愧一切在這裏又云百丈猶在潦倒禪和足指天被玄懸得到連顛隨聲逐色非明眼覿面全包更沒言舉石鞏惠藏禪師師問西堂還解捉得虗空麼西堂云捉得師云作麼生捉堂以手撮虗空師云作麼生恁麼捉虗空堂却問師兄作麼生捉師把住西堂鼻孔拽西堂作忍痛聲云大殺拽人鼻孔直得脫去師云直須恁麼捉虗空始得拈云石鞏十二時中幸然無事敗弄死尸當什麼奇特處雖然如是爭奈西堂不信有鼻孔我道石鞏一場敗闕非細教人夢裏撮虗空要顯盲參離相通色即是空空是色色空不異體還同舉紫玉山道通禪師于頔相公問如何是黑風吹其船舫漂墮羅剎鬼國師云于頔客作漢問與麼事作麼于公失色師指云這箇便是漂墮羅剎鬼國于公又問如何是佛師喚于頔頔應喏師云更莫別求有僧舉似藥山山云縛殺這漢也僧云和尚如何藥山亦喚云某甲僧應喏藥山云是作麼拈云紫玉喚于頔時清風匝地于頔應喏處體露金波莫道于頔未得千聖亦不奈他何藥山雖然如是爭奈這僧未辨吉凶自昧靈光怕黑風向他直道轉盲聾聲中露體希人會藥山紫玉意和同舉百丈惟政禪師師因入京路逢官人命喫飯忽見驢鳴官人召云頭陀師舉頭官人却指驢師却指官人法眼別云但作驢鳴拈云為口上身惹起埃塵若不到裏爭解驢鳴且道官人指與百丈指是同是別不妨法眼全收驢嘶馬喚不回頭古佛光中未肯休解道探機無別物相逢聊示指端頭舉朗州中邑洪恩禪師仰山問如何得見性師云譬如有屋屋有六窗外有一獼猴東邊喚山山山山應如是六窗俱喚俱應仰山禮謝起云所蒙和尚譬喻無不了知更有一事只如內獼猴困睡時外獼猴欲與相見時如何師下繩牀執仰山手作舞云山山與汝相見了譬如蟭螟在蚊子眼睫上作窠向十字街頭叫喚云土曠人希相逢者少拈云兩箇髑髏識破獼猴喚山山應作舞搖頭土曠人希雨泣風愁為甚如此併却咽喉舉得分明和得親通方豈欲自瞞人只要真底無絲隔狀若千燈一室明舉百丈懷海禪師上堂云併却咽喉唇吻速道將來溈山云某甲不道請和尚道師云不辭與汝道久後喪我兒孫五峰云和尚亦須併却師云無人處斫額望汝雲巖云某甲有道處和尚舉師云併咽喉唇吻速道將來雲巖云和尚有也未師云喪我兒孫拈云懷海清淨只不合許道將來與他兔角拄杖三十不圖打草且欲蛇驚五峰溈山腳跟不點地賴遇徹骨相救之人雲巖脫空用本道有則喪我兒孫語默難申意菩提本自圓若還更不會舉馬大師玩月次師云正恁麼時如何西堂藏云正好供養百丈云正好修行南泉拂袖便去師云經入藏禪歸海唯有普願獨超物外拈云馬大師無可做作遇便臨時斟酌西堂老也隨盤百丈故意顢頇唯有南泉大粗生受人澆潑未曾乾經入藏禪歸海普願靈正常在除非道滿月圓人共話同知非向背舉教云佛説剎説衆生説三世一時説拈云露柱聞者是佛説燈籠和身轉是剎説三家村裏老婆子呼豬是衆生説問如何是三世一時説答春到時萬卉齊開雲散時家家風月若更不會且歇一音圓遍未嘗停苦樂同資不得名敢借海潮千里韻與君助發沒絃琴舉百丈懷海禪師師與溈山作務次師問云有火也無溈山云有師云在什麼處溈山把一枝柴吹三兩氣過與師師云如蟲蝕木師謂衆云有一人長不喫飯不道飢有一人終日喫飯不道飽衆皆無對拈云百丈老漢拗直作曲十二時中更不幹當別事只怕兒孫暗歸夜去扶籬摸壁賴得溈山念念相應所以百丈開口道合口得而況大衆豈知有不喫飯者常常飽常喫飯者度日飢普菴則不然將拄杖一時趂散恐得一箇趂不動者請做粥飯主人也要知老僧拄杖頭具一隻眼百丈澄潭徹底妙高峰湧洪波溈山應不胡吹飢飽莫令放過舉教云關閉一切諸惡趣門而生五道以現其身拈云且道諸惡趣門作麼生關閉遂拈拄杖卓一下云無眼耳鼻舌身意却放拄杖於原處云且喜沒交涉而生五道以現其身以手指畫云這一道亦不消得更現什麼其身一中解無量無量中解一三千大千衆一箇也不識啼笑成梵音敲磕通消息色空明暗中摩訶般若力舉百丈懷海禪師馬祖上堂大衆雲集方升座良久師乃捲却面前禮拜席祖便下堂師再參馬祖見師來取禪牀角頭拂子竪起師云即此用離此用祖挂拂子於舊處師良久祖云你已後開兩片皮將何為人師遂取拂子竪起祖云即此用離此用師挂拂子於舊處祖便喝師直得三日耳聾拈云古人肯道千里無來説法升堂是何家具百丈也是生鐵作肝心馬大師又用渾金鑄額大喝一聲三日聾合口也道得得得臨時舒卷事幽微人天交集有誰知用處無心非即離一聲雷震動須彌舉僧問馬祖請和尚離四句絶百非直指某甲西來意祖云我今日無心情去問取智藏其僧乃問智藏云汝何不問和尚僧云和尚令某甲來問上座藏以手摩頭云今日頭痛汝去問取海兄其僧又去問海海云我到這裏却不會僧乃舉似馬祖祖云藏頭白海頭黑拈云大小馬大師被這僧問直得無言祗對及乎問智藏智藏不免以大慈悲為這僧摩頂授記與他同智海爭奈這僧不肯承當重申馬祖之前不辨藏頭黑白若不離四句如何絶百非直指西來意西來意是權教參智藏黑白轉狐疑妙得無非物如如道不知舉章敬惲禪師有僧來繞師三匝振錫而立師云是是其僧又到南泉亦繞南泉三匝振錫而立南泉云不是不是此是風力所轉始終成壞僧云章敬道是和尚為什麼道不是南泉云章敬則是是汝不是拈云這僧用處無異奈緣體理成虗若不辨寶爭識驪珠章敬是即非是南泉非即非佛法真子終始無疑有人勘得這僧破贈伊一顆摩尼珠收通宗透説魂飛識滅呈見無體如水中月金毛師子説無説説若人不會弄巧成拙舉鵝湖大義禪師唐憲宗皇帝詔入麟德殿論義有法師問欲界無禪禪居欲界此土憑何而立禪師云法師只知欲界無禪不知禪界無欲法師云如何是禪師以手點空法師無對帝云法師講無數經論只這一點尚不奈何拈云常無欲以觀其妙常有欲以觀其徼是知禪律相論名異體同妙有妙無禪宗第一執有執無律跳不出以手點空眼聾耳塞更問如何良久云且看客古鏡當堂不動光自是揩磨不得方一點明含法衆森羅萬象不能藏舉鹽官齊安禪師喚侍者將犀牛扇子來侍者云扇子破也師云扇子破還我犀牛兒來侍者無對投子代云不辭將出恐頭角不全資福代作圓相中心書牛字石霜云若還和尚即無也保福云和尚年尊別請人好拈云侍者當時只好向他道和尚於什麼處失却牛何必就我覓雖然恁麼賴得侍者未見其牛且喜沒交涉投子資福石霜保福一狀領過良久云勘破了也團團如月畫難成頭角完全鼻沒繩非是學人藏隱物雖然識破未通真舉教云當知虗空生汝心內猶如片雲點太清裏拈云以手一點云這箇假名太清雲在什麼處咄本自一身光大妄認虗空揑怪智者無欠無餘愚者輪劫還債舉鵝湖大義禪師麟德殿説法次問諸碩德曰行住坐臥畢竟以何為道對曰知者是道師曰不可以智知不可以識識安得知者是道乎有對曰無分別是道師曰善能分別諸法相於第一義而不動安得無分別是道乎有對曰四禪八定是道師云佛身無為不墮諸數安在四禪八定是道也衆皆杜口拈云鵝湖同誇大義只管與人寐語直得三更眼不開天曉大明猶瞌睡普菴一切不問只請問長老只今是第幾義願為分明演説我今要如是聞麟德殿光充六合君臣和會少知音老婆饒舌重重舉杜口難開意氣深舉芙蓉山大育禪師一日因行食與龐居士居士接食次師云生心受施淨名早訶去此一機居士還甘否居士云當時善現豈不作家師云非關他事居士云食到口邊被他奪却師乃下食居士云不消一句拈云芙蓉老人因行食次壓良為賤賴遇龐公清露白若不是龐老子時愛他一粒米壞却十年糧淨名也好喫棒愛弄心肝五臟除非到裏脫頑機不消一句超無量舉鹽官齊安禪師僧問如何是本身盧舍那師云與我將那箇淨瓶來僧即取淨瓶來師云却送本處安置其僧送淨瓶本處再徵前語師云古佛過去久矣拈云恁麼看鹽官答話全無頭尾又傷著此僧來往更不識好惡且作麼生判斷良久云古佛現在久矣本身盧舍意光周碧雲間舉幾千秋被人叩詰無私答山自青青水自流舉歸宗智常禪師問新到僧什麼處來僧云鳳翔來師云還將得那箇來否僧云將得來師云在什麼處僧以手從頂擎捧呈之師即舉手作接勢拋向背後僧無語師云這野狐精拈云知識勘辨不漏絲髮盲輩胡參如霜入焰歸宗問新到僧什麼處來這僧答處不別寐語將來伎倆虗呈野狐失迹披雲帶雨鳳翔來住色依聲眼不開那箇不曾通線縫徒奔南嶽往天台舉南泉普願禪師示衆云道箇如如早是變也今時師僧須向異類中行始得歸宗云雖行畜生行不得畜生報師云孟八郎又與麼去也拈云南泉道箇如如早是披毛戴角了也帶類歸宗也與麼去今時師僧且作麼生行好向東家作驢西家作馬得麼化身千百億不得箇相識傷嗟今古人誰是知恩力舉鹽官齊安禪師一日謂衆曰虗空為鼓須彌為槌什麼打得衆無對有僧舉似南泉泉云王老師不打這破鼓法眼別云王老師不打拈云莫道衆人不奈何鹽官亦自下手不得且道這鼓用什麼皮鞔闊多少鼓槌長多少東村王老師頗知消息此人不肯打這破鼓若檢點將來王老師合喫拄杖此鼓圓通普震不斷金聲本自圓成何曾破缺唯有禾山解打德山善歌道吾解舞雖然如是也須放過一著一擊聞中宇宙寬東西南北是誰鞔須彌無縫槌相應塵剎無空別骨圝舉歸宗智常禪師僧問初心如何得箇入處師敲鼎蓋三下問還聞否僧云聞師云我何不聞師又敲三下問還聞否僧云聞師云我何以聞僧無語師云觀音妙智力能救世間苦拈云歸宗巧盡拙出若問初心何須向末頭上敲打所以其僧將末聞和尚無我所以不聞初心入處不為難迷源逐境萬重山觀音妙智慈悲力連擊三聲體自間去今何處去悠悠空鎖白雲關舉五臺山鄧隱峰禪師一日石頭和尚剗草次師在左邊叉手而立石頭飛剗子向師面前剗一株草師云和尚只剗得這箇不剗得那箇石頭提起剗子師接得剗子乃作剗勢石頭云汝只剗得那箇不剗得這箇師無對洞山代云還有堆阜麼拈云鄧隱峰當時見箇什麼這箇那箇是什麼提起與接得是什麼若是鄧隱峰真實不虗之時合當祗對得石頭和尚洞山向平地上起土堆誰知幻化琢磨初機不是全通皆成差別仰之彌高鑽之彌堅瞻之在後忽然在前石頭重舉隱峰無言若更不會三千大千舉歸宗智常禪師刺史李渤問曰教中言須彌納芥子渤即不疑芥子納須彌莫不是妄談否師曰人傳使君讀萬卷書籍是否李曰然師曰摩頂至踵如椰子樹大萬卷書向何處著李俯首而已又問大藏教明得箇什麼邊事師舉拳示之云還會麼李曰不會師曰遮措大拳頭也不識拈云須彌納芥子泥牛吞雪芥子納須彌作麼生説只好向他道拈出芥子來若也會得全體受用苟或未然使君無別歎云這漢一粒芥子尚不奈何更問什麼藏教邊事直須到不會萬卷詩書難却易片衣口飯易却難説甚須彌和芥子堂堂體露指風幡舉南泉普願禪師因東西兩堂爭貓兒師提起貓兒云道得即救取貓兒道不得即斬却也衆無對師斬之趙州自外歸師舉前話趙州乃脫草鞋戴頭上而出師曰汝若在即救得貓兒拈云南泉作這一解險入地獄如箭射莫道貓兒喫劍東西兩堂一時失却性命猶尚不知賴遇趙州向頭上安頭救活南泉好臨事全提少作家雲堂徒自臥煙霞趙州一塞無餘欠萬古彌堅應落花舉鄧隱峰禪師一日推車次馬大師展腳在路上坐師云請師收足大師云已展不收師云已進不退乃推車碾過大師腳損歸法堂執斧子云適來碾損老僧腳底出來師便出於大師前引頸大師乃置斧拈云馬大師放鄧隱峰收推車碾足父子風流粗行禪和著甚來由無相光中罕遇人恐參未徹滯疑情橫推直截何干礙碾出靈明耀日新舉南泉普願禪師陸亘大夫問曰弟子家中有一片石或時坐或時臥如今擬鐫作佛還得否師云得大夫云莫不得否師云不得不得雲巖云坐即佛不坐即非佛洞山云不坐即佛坐即非佛拈云陸亘大夫家中幸自無事又且頓立一片石坐臥又不得作佛又不是南泉連聲下兩句不得大夫轉轉眼盲耳塞雲巖也是身間心不間洞山正是心間身不間要易會麼還汝佛箇中須得意又生疑本不假修造識破現圓如舉百靈和尚一日龐居士路次相逢師云昔日居士南嶽得意句還曾舉向人也未居士云曾舉來師云舉向什麼人居士以手指云龐公師云直是妙德空生也歎居士不及居士却問師得力句是誰知師便戴笠子而去居士云善為道途師一去更不回首拈云是人道百靈贊歎龐公唯我見龐居士被這長老一杓惡水劈頭澆潑不少及乎居士相問直得無言祗對直入孤峰意甚深相逢道伴少知音無物堪比龐居士分明解聽沒絃琴舉南泉普願禪師陸亘大夫向師道肇法師甚奇怪道萬物同根是非一體師指庭前牡丹花云大夫時人見此一株花如夢相似大夫罔措拈云陸亘大夫學肇法師寐語未了南泉却到這裏用計不成普菴著語云牡丹花紅黃碧緑是誰成會得無不合天真祇這一株驚被夢令知大地百花新舉石林和尚一日龐居士來乃竪起拂子云不落丹霞機試道一句來居士奪却拂子却竪起拳師云正是丹霞機居士云與我不落看師云丹霞患啞龐老患聾居士云恰是也恰是也師無語居士云向伊道偶爾恁麼師亦無語拈云石林竪拂龐公意氣不落有無誰非誰是若不解心開眼打睡達人相見無交涉不落丹霞正自瞞賴得龐公無二解迎來送去一般般舉南泉普願禪師示衆云王老師要賣身阿誰肯買一僧出云某甲買師云他不作貴價不作賤價汝作麼生買僧無對臥龍代云屬某甲去也禾山代云是何道理趙州代云明年來與和尚縫箇布袋子拈云南泉許多時為身作主豈知今日家寒一場敗缺猶幸其僧商量不成若也買得教誰擔負臥龍愛使饒禾山依本分趙州下手忒遲普菴著語云太尊貴一箇間身用不盡肯承當者奉相呈黃金萬兩非堪比東西南北至分明舉潭州秀溪和尚一日谷山問聲色純真如何是道師云亂道作麼谷山却從東邊過西邊立師云若不恁麼即禍生也谷山却過東邊師乃下禪牀方行兩步被谷山捉住云聲色純真事作麼生師便掌谷山谷山云十年後要箇人下茶也無在師云要谷山老漢作麼谷山呵呵大笑三聲拈云谷山要與秀溪同販海船又恐秀溪無本秀溪擬留谷山一宿又怕谷山無可蓋覆不免合窮直至如是所以谷山大笑三聲普菴道谷山不是好人此人笑裏有刀諸人且照顧左右始得萬仞峰撑沒底船憑知有點海中燈六月臥氷鋪瑞雪大笑三聲作麼生舉南泉普願禪師與麻谷歸宗同去參禮南陽國師師先於路上畫一圓相云道得即去歸宗便於圓相中坐麻谷作女人拜師云恁麼即不去也歸宗云是什麼心行師相喚回更不去禮國師拈云這四大沒量己德底漢憨不成癡不是做盡鬼怪究竟一切出這國師圈子不得不如相喚休去歇去好日月燈光逈不俱何須伴侶學真如國師道在無相見知音何處不文殊舉溈山祐禪師普請摘茶次謂仰山曰終日摘茶只聞子聲不見子形何不現形相見仰山撼茶樹師云子只得用不得體仰山云未審和尚如何師良久仰山云和尚即得體不得用師云放子三十棒玄覺云且道過在什麼處拈云與子千金不如教子一藝是知欲行天下路無過一藝精溈山父子體用雙影悲智同運此時摘茶園裏大有人喪身失命玄覺也不免隨他草裏走不住鼻孔遼天老古錐入泥入水驚貧兒死中得活機鋒疾不斷玄風徹紫微舉鄧隱峰禪師到南泉泉指淨瓶云銅瓶是境瓶中有水不得動著境與老僧將水來師拈瓶向南泉面前瀉泉便休拈云南泉一時共鄧隱峰説十二部大藏經教了然不談一字鄧隱峰聞五千四十八卷寂淨無言且道鄧隱峰有無過犯若道有過南泉作麼生休得若也無犯爭奈觸著淨瓶了試下口斷看師子全威境白聞誰人敢扣鬼門關除非體用知無我瓶傾不出悟無難舉大慈和尚示衆云説得一丈不如行取一尺説得一尺不如行取一寸洞山云我不恁麼道僧云作麼生道山云説取行不得底行取説不得底雲居云行時無説路説時無行路不説不行時合行什麼路樂普云行説俱到即本事無行説俱不到即本事在拈云大慈過去生中只是一箇繩墨都料為什麼如是觀其所作習氣猶在只好教伊離却言説丈尺寸道將一句來若也不道與他三拄杖不得放過洞山及乎到這裏亦向百草頭上乞命雲居已到爭奈往復辛勤樂普天明猶寐語不住在無量光圓不動尊亘今亘古語奚論普雲彌布香芬馥周行無住海幢門舉長沙岑和尚僧問南泉遷化向什麼處去師云東家作驢西家作馬僧云此意如何師云要騎即騎要下便下拈云大小長沙和尚及乎到這裏被僧一問直得七縱八橫依驢附馬何況未超數量學住有無且道這僧於長沙言下死活如何看智者聊聞猛提取莫待須臾失却頭百億化身唯佛知含生經劫轉沉迷空花水月分三界一念歸元也太奇舉溈山祐禪師示衆云老僧百年後向山下作一頭水牯牛去左脅書五字云溈山僧某甲此時喚溈山僧又是水牯牛喚作水牯牛又是溈山僧喚作什麼即得雲居代云師無異號資福代作圓相托起拈云溈山雖得畜生身不得畜生報所以向此説彼向彼説此彼此一般了無交涉只好向溈山鼻孔裏一穿教他道一字也不得雲居恁麼判斷未免腳跟不點地在資福患風不住賴得不狂言又較𬅿子頭角完全不住行溈山獨步驚聾盲牧童未辨牛消息至今落塹墮深坑舉雲際師祖禪師問南泉云摩尼珠人不識如來藏裡親收得如何是藏泉云與汝往來者是藏師云不往來者如何師云亦是藏又問如何是珠泉召云師祖師應諾泉云去汝不會我語拈云師祖發問義遍乾坤道得相似入處無門南泉徹底大慈悲賓主和光表裏存聲喚聲應黑漆昆侖咦閻羅子可畏聞道摩尼無價珍得來轉轉似孤貧師祖未諳申一問南泉應不亂傳人舉長沙岑和尚示偈云百尺竿頭坐底人雖然得入未為真百尺竿頭須進步十方法界現全身僧問祇如百尺竿頭如何進步師云朗州山澧州水僧云請師道師云四海五湖皇化裏拈云是人不奈何這長沙四句只有者僧敢近前打失落猶少末後句在拏雲浪透山川獨掉孤峰般若船度盡四生超彼岸九年面壁少林傳舉趙州諗禪師問南泉知有底人向什麼處休歇南泉云山下作牛去師云謝師指示南泉云昨夜三更月到窗拈云趙州放南泉收若也未明端的不消別處尋牛猶如血脈洪灌穿過髑髏不會者銅墻鐵壁達能者皎月澄秋知有之人不出頭涅槃光裏度春秋一條水牯金穿鼻萬劫逍遙得自由舉子湖巖蹤禪師於中夜叫有賊衆皆驚走師到僧堂後架把住一僧叫云維那捉得也捉得也僧云不是某甲師云是即是只是汝不肯承當拈云子湖於中夜見日輪當午所心急悲流未免驚動髑髏捉空成賊非但臨濟白拈南泉到這裏一場敗缺我道這僧多時失却性命如今安肯承當風舞巖松人不會謾施巧便轉惛惶徹夜為伊堅不信未知何劫肯承當蒼天蒼天舉趙州諗禪師問一座主講什麼經主云涅槃經師云問一段義得否云得師以腳踢空吹一吹云是什麼義主云經中無此義師云五百力士揭石義便道無拈云趙州深知座主瞌睡又更與他寐語一尚且道趙州以腳踢空吹一吹是什麼義若更不會畢竟瞞殺人踢一踢時吹一吹金毛師子現全威趙州用處形言絶爭奈迷頭不肯歸舉甘贄行者於南泉設粥云請和尚念誦泉云甘贄行者設粥請大衆為狸奴白牯念摩訶般若波羅蜜贄乃禮拜便出去南泉却到厨內打破鍋子拈云甘贄不了死尸充塞南泉鼻孔帶纍阿師打破頑家具露出一道金光證明設粥這一隊孤魂猶尚不知時節吽吽只管喫有什麼了期門外君子至一切人不會打這間家具甘贄與南泉大地扶不起為甚扶不起果報還如是舉大隋法真禪師僧問劫火洞然大千俱壞未審此箇還壞也無師云壞僧云恁麼即隨他去也師云隨他去拈云大隋法真與這僧入泥入水只是這僧扶籬摸壁似隔千山若是大隋小腸狹肚這僧難救幸而太隋寬繫繩頭幾乎走殺這野狐精若普菴當時才見這僧擬開口便拄却舌頭忽然省解免興文彩東西南北通徹交過悟者清涼迷者大禍隨流入流法真不墮若未全提誰敢擔荷舉趙州諗禪師僧問萬法歸一一歸何處師云老僧在青州作一領布衫重七斤拈云這僧開典庫三十年尚不識一文錢趙州八十年行腳且不知有言語要會機鋒親的處直須穿領趙州衫循水尋流不見源逢人相問豈堪言知君背覺勞生解謾語皆真意普賢舉雲巖掃地次溈山云大區區生師云須知有不區區者溈山云恁麼即有第二月也師竪起掃云這箇是幾月溈山低頭而去玄沙聞云正是第二月拈云雲巖竪起掃之處溈山滿口道不出玄沙猶尚不放行檢點將來溈山幸然無事惹起塵埃末後喫他一觜永劫出頭不得等間平地掃塵埃須還知有肯相陪悲風皓月猿啼急窮子離家甚日回舉關南道吾和尚有時執木劍橫在肩上作舞僧問手中劍什麼處得來師擲劍於地僧却置師手中師云什麼處得來僧無對師曰容汝三日內下取一語僧亦無對師自代拈劍肩上作舞云恁麼始得拈云道吾獨泛孤舟垂絲千尺遍遊江海罕邊吞鈎忽然綸驚將謂洪鯨擺撥及乎下手提取却是箇弄水蝦公虗勞神用關南老婆橫木劍不露鋒鋩大靈驗擲下威光絶見聞豐城獨卓無餘欠舉陸亘大夫問南泉云古人瓶中養一鵝鵝漸長大出瓶不得如今不得毀瓶不得損鵝作麼生得南泉召云大夫陸應諾泉云出也拈云究竟出不得陸亘大夫一生只究古人出瓶不得之句南泉善得不壞瓶鵝之體所以一聲直拔迷悟等平透古穿今為真宗匠試問參方出也未急速相應始得標宗立法大瞞人意氣彌陀局局親黑白不分難下手放過一著大驚神舉臨濟義玄禪師黃檗一日普請鋤園黃檗後至師問訊按钁而立黃檗曰莫是困也師云才钁地何言困黃檗舉拄杖便打師接杖推倒黃檗黃檗呼維那維那扶起我來維那扶起曰和尚爭容得這風顛漢黃檗却打維那師自钁地云諸方即火葬我這裡活埋拈云作家相見如覿面之讐人達士陳機的箭鋒之相拄遍歷十方且無影像一目法界不落有無豈似逐臊獵犬趂塊狂盧尋言著句背覺勞生虗名禪子無益自他且如臨濟玄師遇黃檗普請現微標旨智用無師自然廓落明妙希夷維那向夢裏喫棒臨濟於智海埋人普菴要打黃檗壓良為賤相輕如今欲覺斯人直須先露眼睛心藏智寶少知音全機付與水龍吟忽然撞著無相似誰解光和活死人舉三聖慧然禪師師到德山才展坐具德山云莫展炊巾這裏無餿飯師云縱有也無著處德山以拄杖打師師接住却推德山向禪牀上德山大笑師哭蒼天而去拈云大小德山究竟不奈得一箇三聖何三聖又推倒這德山永起不得普菴著語云蒼天蒼天且你諸人且作麼生商量噓放過一著三聖戴角虎德山獨眼龍未展機先合非言意已通風雲融萬象笑哭是誰同死中若不活爭免被他籠舉興化存獎禪師謂克賓維那曰汝不久為唱導之師克賓曰我不入汝保社師曰會了不入不會不入曰沒交涉師乃打之白衆曰克賓維那法戰不勝令捨衣鉢錢五貫文設纂飯而趂出院拈云平地起土堆且放興化過為甚克賓維那向大雪山中遭𦦨毒如是若斷這一段公案不破未是宗師忽然東嶺露柱云我却解斷克賓難扶趂出院者過犯彌天生心受飯者生陷地獄察明表重驗虗無不久堪為唱導師不覺驚動生滅相臨時撮略顯精粗舉杉洋菴主有僧到參師問阿誰曰杉洋菴主師曰是我僧便喝師作噓聲僧曰猶要棒在師便打僧問菴主得什麼道理後住此山師曰也欲通箇來由又恐遭人點檢僧曰又爭免得師乃喝之僧曰恰是師乃打之其僧大笑而出師曰大敗大敗拈云通方勘辨未舉先知沒巴鼻人徒勞往返我道菴主與老僧共得一隻眼覷全不見共成一箇鼻孔更不知香未免大笑大敗具眼者還悉得麼良久云劄雲無蹤兮雨無迹事理綿綿有何極賣金須是買金人這裏若真不相識舉清峰楚禪師訪白水白水問樂普有生機一路是否師云是白水云止却生路向熟路上來師云生路上死人無數熟路上不著活漢白水云此是樂普的你的作麼生師云豈但樂普夾山亦不奈何白水云夾山為甚不奈何師曰不見道生機一路拈云清峰幸自尊特翠翠蒼蒼不合撥動一星子火燒得赤剌噠直至如今也無住著見道不生機生機不見道青峰年年青白水常浩浩生熟路不通迷悟俱不到青白未萌前樂普大深奧咄舉興化獎禪師莊宗皇帝一日謂師曰朕收大梁得一顆無價明珠未有人酬價師曰請陛下珠看帝以手舒開幞頭帶腳師曰君王之寶誰敢酬價拈曰仁君達本呈見無門了利宗師希逢作者及其利者裏相逢不拈出舉意便知有莊宗皇帝放一線道興化掣電郎當氣急殺人展開誰解子細點檢將來興化澆潑過當要須皂白分明直應如是覿面相呈也大奇更無分別與遲疑自從收得非離合豈可虗明放過伊精金百鍊方為貴脫體靈明絶見知舉石頭希遷禪師問新到僧什麼處來僧云江西來師云見馬大師否僧云見師乃指一橛柴曰馬大師何似這箇僧無對却回舉似馬大師馬曰汝見橛柴大小僧云勿量大馬曰汝甚有力僧曰何也馬曰汝從南嶽負一橛柴來豈不是有力拈曰其僧好喫石頭棒為什麼如此來處不分明所以見馬大師與柴成相賴得馬大師以慈悲放一道光灌髑髏口髑髏亦放一道神光射馬大師身嚇得普菴不敢出石頭塔地不起只倩竹葉相敲作彈指歎曰傷嗟今古人幾箇知恩力妙指間柴意馬師失之千里費工夫佛法不是這道理拙用金毛作野狐舉丹霞天然禪師見忠國師便展坐具國師云不用不用師退步國師云如是如是師却進前國師云不是不是師繞國師一匝便出國師云去聖時遙三十年後不見此漢也還難得拈云丹霞琢國師磨二龍間戲湧起洪波若無主海大神別人應不奈何口説難窮意普通世間希有義和同三春萬卉皆含笑裝點繁花只一風舉藥山惟儼禪師僧問學人擬歸鄉時如何師曰汝父母遍身紅爛臥在荊棘林中汝歸何所僧曰恁麼即不歸去也師曰汝却須歸去汝若歸鄉我示汝箇休糧方僧云便請師曰二時上堂不須咬著一粒米拈云者僧已是扶籬摸壁又被藥山推放深坑這僧定不放未免一時拖泥帶水末後休糧弄巧成拙普菴竪起布毛云吽吽提輪放線知深淺把火燒山預辨宜莫道逢場間作戲直須對病設良醫舉華亭船子和尚善會和尚參禮次師問曰座主住甚寺會曰寺即不住師曰不似又不似箇什麼會曰目前無相似何處學得來會曰非耳目之所到師笑曰一句合頭語萬劫繫驢橛垂絲千尺意在深潭離鈎三寸速道速道會擬開口師便以篙撞在水中拈云風行雨至師子相投不犯煙塵自然契合若無船子應渡善會不過不得善會也成辜負華亭孤舟不繫弄華亭無限風光意氣清善會不干於耳目豈容聲色付元靈舉藥山儼禪師夜參不點燈師垂語曰我有一句子待特牛生兒却向汝道時有僧曰特牛生兒也何以不道師曰侍者把燈來其僧抽身入衆雲巖後舉似洞山洞山云其僧却會只是不肯禮拜拈云行住及坐臥日月與燈光世間出世間悟者不相干普菴則不然我有一句子直得石女生子却向汝道教這僧與大地人開口道不得可惜藥山放過此僧雲巖長吐氣洞山出白嵐語言應三昧希友同參諸方且道參誰剎土微塵總出不得沒眼休談見藥山免將明暗警盲參特牛生子猶為易石女生兒豈似凡孤明獨朗光無二只恐癡猿攪碧潭舉高沙彌住菴後雨裏來看藥山藥山云你來也師云是山云可殺濕師曰不打這鼓笛雲巖云皮也無打甚麼鼓道吾云鼓也無打什麼皮山云今日大好曲調拈云小溪還海海納而豈有二源悟子親師師許而意無別理若到裏許直是盡十方諸佛那更放出歷代祖師爛嚼父母六親到處豈存含識所以古人道不壞假名而談實相玄沙云用處不換機心外無別法然雖如是不妨打鼓弄琵琶還他一會家諸人且道藥山高沙彌雲巖道吾只今在什麼處舉揚般若信地無間處知心用不非微塵佛國土妙在一毫釐應當如是見所説但隨宜古錐無做作謾把布毛吹舉石室善導和尚一夕與仰山玩月仰山問云這月尖時圓相什麼處去圓時尖相向什麼處去師曰尖時圓相隱圓時尖相在雲巖云尖時圓相在圓時無尖相道吾云尖時亦不尖圓相亦不圓拈云石室一夜與仰山寐語驚動雲巖道吾無故於天曉做賊不肯認贓若還不是普菴這裏實難勘破普菴好好向三十夜共釋迦老子與三世諸佛玩月之次敢問山河大地色空明暗這月即今在什麼處還有人敢出頭來祗對得老僧一言半句便教他遍身紅爛墮坑落塹不留毫髮許青天白日常相應眼明方曉獼猴鏡自從曠劫不揩磨知音謾舉無生令舉德山宣鑑禪師師抵于溈山從法堂西過東回視方丈溈山無語師云無也無也師出至僧堂前乃曰然雖如此不得草草遂具威儀上參才跨門提起坐具喚云和尚溈山擬取拂子師喝之揚袂而出拈云師子出窟群獸驚忙巨虎踞巖野犴難過忽遇箇降龍伏虎文殊普賢披毛戴角且歸邊隻眼無頭印空坐正當恁麼時溈山德山共一箇鼻孔所以諸方行腳無眼者不肯信還肯信普菴麼自云者弄影漢最難信最難信難信難聞獨眼龍布雲施雨覓無蹤却被普賢穿却鼻如今衆信永無窮舉洞山價禪師示衆云兄弟初秋夏末或東或西直須萬里無寸草處去始得又曰只如萬里無寸草處且作麼生去顧視衆云欲知此事須枯木上生花方與他合石霜聞云出門便是草後明安云直得不出門亦是曼曼地拈云洞山吐氣清健竭力為人尚未免向犁觜端溶鐵石霜大寒生也隨他向氷上加凍只得明安尊貴較𬅿子又和茅搭草普菴子細看來不得一箇靈利遂拈起拄杖子云若不得這箇永不靈利拋下拄杖子良久云會麼萬里草不生三昧號無諍夢遊觀玉境畢竟是誰行在處曼曼地只道無兩般法門非出入學者莫顢頇舉漸源仲興禪師一日隨道吾弔喪師以手撫棺曰生耶死耶吾曰生也不道死也不道師曰為什麼不道吾曰不道不道弔畢同回途次師曰和尚今日須與仲興道倘更不道即打去也吾曰打即任打生也不道死也不道師遂打吾數拳却往石霜舉前問石霜曰汝不見道吾道生也不道死也不道師乃大悟拈云漸源夢中問生死道吾白日被鬼打賴遇石霜連忙叫醒帶識髑髏撥死尸箇中許道實難為任渠碎我骨消散終須不賺釋迦兒舉清平令導禪師師問翠微如何是西來的的意微曰待無人即向汝道師良久曰無人也請和尚説翠微下禪牀引入竹園師曰無人也請和尚説微指竹云這竿得恁麼長那竿得恁麼短拈云清平本自常樂不肯心休因問而迷入筠林却分長短判曰翠微指竹示清平試問靈丹成未成若將聲色依宗匠劫盡參玄不契津普菴則不然設有人問西來的的意竪箇指端良久云會麼若也會得只如是若也不會免更教他上山入水令導禪和翠微峯鐵壁銅墻路不同遙指雙林是歸處至今猶尚鬼儱通舉投子大同禪師趙州途中相遇問曰莫是投子山主麼師云茶鹽錢乞一箇趙州即先到菴中坐師後携一瓶油歸菴趙州曰久嚮投子到來只是箇賣油翁師曰汝只見賣油翁且不識投子曰如何是投子師提起瓶云油油拈云不合投子容易放過趙州致令趙州劈心坐却一切聖凡箇及乎投子回來且無奈藏身插足處更説什麼油若教普菴當時途中邂逅一場敗闕非細只今敢問諸人還見投子麼良久默顧左右曰只這花十八難賽古人投子續宗枝相逢作者便呈機含光知有菴中主提起油瓶應不疑舉石霜慶諸禪師師在溈山為米頭一日在寮內篩米次溈山云施主物莫拋撒師云不拋撒溈山於地上拾得一粒云汝道不拋撒這箇是什麼處得來師無對溈山又云莫欺這一粒子百千粒從這一粒生師曰百千粒從這一粒生未審這一粒從什麼處生溈山呵呵笑歸方丈晚上堂云大衆米裏有蟲拈云石霜和米連天白詰問元來應不得莫令拋撒卒難收免被邪魔外道嚇且道石霜有見解無見解若有見解為什麼却無對若無見解為什麼溈説不得呵呵大笑歸方丈試斷看溈山道米裏有蟲普菴道蟲裏有米不會者開口塞喉悟解者不妨插觜咄道人到處全示真如若求言句未免區區舉漸源興禪師一日將鍬子於法堂上從東過西從西過東石霜曰作麼師曰覓先師靈骨霜曰洪波浩渺白浪滔天覓什麼先師靈骨師曰正好著力霜曰這裏針劄不入著什麼力師持鍬子肩上便行太原孚云先師靈骨猶在拈云漸源尋先師靈骨未免東西石霜正瓦解氷消洪波白浪且道這一等盡是參方見解似分差別若還太原孚上座不加四字先師靈愈不現骨更難尋普菴老人拈一塊土云靈骨靈骨恍恍惚惚孚兄孚兄杳杳冥冥却拋土於地顧視左右云還知落處麼探宗勘辨要當人劫火𦦨中摝眼睛漸源頓入洪波裏直至如今不見形舉洞山價禪師問太長老云有一物上拄天下拄地常在動用中黑似漆過在什麼處太曰過在動用師乃咄云出去拈云洞山只瞞得太長老若問普菴老人有一物上拄天下拄地常在動用中黑似漆過在什麼處便與他三十拄杖了却問價禪師未有天地時此物拄箇什麼快道快道若恁麼免被他喝出洞山活計未全包太老鑽龜罕辨爻有物先天非相貌豈干動用色相交舉黃山月輪禪師一日夾山抗聲問曰子是什麼處人師曰閩中人夾山云還識老僧否師曰和尚還識學人否夾山曰不然子且還老僧草鞋錢然後老僧還子江陵米價師曰恁麼即不識和尚未審江陵米作麼價夾山曰子善能哮吼拈云黃山月輪無物不照夾山草鞋價直難酬恁麼則兩箇不鑑識一箇亦不識江陵米折草鞋錢善能哮吼通消息咄不識是真識有心識心遍處不求人江陵米滿元無價師子全威畫不成舉僧問洛浦學人擬歸鄉時如何師曰家破人亡子歸何處僧曰恁麼即不歸去也師曰庭前殘雪日輪消室內遊塵遣誰掃拈云這僧聞道家破見説人亡便不敢歸鄉普菴無可做作即今為洛浦舉哀一時蒼天蒼天家不破兮人不亡設機不應轉郎當龜毛拂子呵呵笑六月炎天好大霜舉雲居道膺禪師僧問羚羊挂角時如何師曰六六三十六又曰會麼僧曰不會師曰不見道無蹤迹有僧舉似趙州州云雲居師兄猶在僧乃問羚羊挂角時如何趙州云六六三十六拈云雲居答話無頭腦所以道六六三十六這僧問處沒人情未免羚羊挂角會與不會且置設若這僧問普菴羚羊挂角時如何九九八十一衲僧眼似漆扶籬摸壁不知臊挂角羚羊也不識咬舉乾峰示衆云舉一不得舉二放過一著落在第二雲門出衆云昨日有人從天台來却往南嶽去峰下坐云明日不得普請拈云乾峰開口月朗風清雲門答處妙湛除非知有之人動靜是誰聽探普菴則不然一舉便得二舉不得放過三舉不及第且道落在什麼處釋梵天帝寶冠履地不誦華嚴佛不富貴離四句非絶百非是絶百非非離四句易舉欽山文邃禪師師入浴院見僧踏水輪僧見師乃下不審師曰幸自碌碌地轉何須却恁麼僧云不恁麼又爭得師曰若恁麼欽山眼堪作什麼也僧曰作麼生是師眼師乃以手作撥眉勢僧云和尚又得恁麼師云是是為我恁麼便不得恁麼僧無語師云索戰無功一場氣悶良久乃問僧云會麼僧云不會師云欽山為汝擔一擔拈云欽山隨流認得性其僧雖然碌碌地正當恁麼時不曾看見欽山且作麼生免得這老和尚道為汝擔一擔具眼者不妨注腳一撥眉毛露眼睛只傷底許沒瞳人燈籠開口呵呵笑衲僧和夢蹈車輪舉玄沙師備禪師垂語云諸方老宿盡道接物利生且問汝只如盲聾啞三種病人汝作麼生接若拈槌豎拂他眼且不見共他説話他又不聞口復啞若接不得佛法無靈驗時有僧出曰三種病人和尚還許商量否師云許汝作麼生商量其僧珍重便出師云不是不是羅漢云桂琛現有眼耳和尚作麼生接中塔曰三種病人只今在什麼處拈云玄沙大師雖有截斷衆流之辨爭奈只醫得箇無眼耳鼻舌身意人病這箇人本自無病設若醫得安樂不為好手羅漢橫生頭角無下稍也中塔不奈冬瓜何破瓠子普菴向諸人鼻孔裏高聲叫玄沙玄沙且照顧自己風發也古今學道與參禪未諳眼耳妙言詮一粒玄沙無住本時時興販海南船快度舉龍濟山紹修山主示衆云具足凡夫法凡夫不知具足聖人法聖人不會聖人若會即是凡夫凡夫若知即是聖人此兩語一理二義若人辨得不妨於佛法中有箇入處若辨不得莫道不疑拈云修山主老老大大拄杖亦不把只與麼草裏鑽水裏走著甚來由普菴拈起拄杖云這箇吞却聖凡了如今處處穩便阿却擲下拄杖目周回漩良久云莫道不疑龍濟興雲雨遍施聖凡不落與誰齊能持地藏無空印具足圓方始不疑舉雪峰示衆云世界濶一丈古鏡濶一丈世界濶一尺古鏡濶一尺玄沙指面前火爐云火爐濶多少峰云似古鏡濶沙云老漢腳跟未點地在拈云雪峰示衆有口無心玄沙相應有心無口且道雪峰世界在古鏡裏古鏡在世界裏若也未活且向玄沙火爐裏烹煉世界揩拭元光直待失却水月空花塵塵不昧始得鏡含世界幾千春非相非形假立名汩沒未嘗離鏡體憐生誰合飲光人舉洞山問雲居膺大闡提人殺父害母出佛身血破和合僧如是種種孝養何在雲居云始得孝養自爾洞山許之為室中領袖拈云一法界中唯有洞山觀見作大五逆人是孝順子行持孝順為大五逆人如今普菴將什麼為孝養瞪目四顧良久云在在處處不識佛父母又問如何行五逆答羊羹細酒齋餅饅頭騎馬底騎馬牽牛底牽牛也有橫吹孤笛也有拍掌鳴謳唯獨一般不可説雪人火裏趙楊州大稱稱不起小斗量不盡無量劫即今無不是心印舉夾山為渡子時有一婆子抱一孩兒上船云呈橈舞棹都不問且道婆子手中孩兒甚處得來夾山以橈子便打婆子云婆婆有六箇孩兒五箇不遇善知識只這箇也不消得遂拋向江中夾山乃吐舌拈云諸方道夾山與麼時打著這婆婆普菴見這婆子與夾山共一足共隻眼一箇口説又説不得去又不得見又見不得孩兒則不問作麼生分別夾山吐舌之處船子寥寥載不空幾回明月弄清風呈橈舞棹無他事只欲教人解六通舉雪峰云飯籬邊坐餓死人臨河渴死漢玄沙云飯籬裏坐餓死漢水裏沒頭浸渴死漢雲門云通身是飯通身是水拈云大小大雪峰及乎到這裏未免破一作二普菴念呪曰婆嚧吃嚀拈却飯籠邊死人婆訶這一粒玄沙無端被雪老引入飯裏水裏如今大地生靈飲水喫飯且子細照顧雖是玄沙也能殺人也能活人祇有雲門老漢吞聲忍氣不能管得所以和泥合水何處無雲不是門藏鋒不露理難論雪峰未盡玄沙意惹得村人村又村舉教云城東老母與佛同時而生一世共處而不欲見佛每見佛來即便回避周回上下皆避不得乃以手掩面十指掌中悉皆見佛拈云咄這老婆子也是沒量己德與佛同時不二不生既是取捨不得便好堂中穩坐飯來開口箸來伸手無端作得許多揑怪教壞人家男女若當時教普菴一見婆子連佛一時埋却只存箇弄影漢時時與人方便行住坐臥豈不快哉又云如今亦不欠少似水煎茶待故人知音喫了笑欣欣茶水本來無一説揚眉早是自瞞心舉永嘉大師云無相無空無不空即是如來真實相拈云子細思量永嘉大師恁麼説話都無頭腦如今一念棄捨塵緣到處參尋知識楖𣗖橫肩盡是學佛知見究生死一段大事作麼生相也無空也無不空又無却教學人向什麼處摸索咦不可説不可説中又不可説究竟如是拈古談今我尚無木奴草女辨工夫草木恰知非外物含靈那信自毗盧舉雪峰普請畬田見一蛇以杖挑起召大衆云看看以刀芟為兩斷玄沙以杖拋向背後更不顧視衆愕然雪峰曰俊哉拈云雪峰大修行人不合斬蛇據令判斷這漢永不得復來世界來作人身玄沙雖不干事不合對面移尸與他兔角拄杖三十再歸遠行地大難大難為衆竭力著甚來由驀提起拄杖子云更有箇在又云放過一著飛空著地情依識大地山河情識磨色空明暗無相似挑起蛇時會也麼舉九峰在石霜為侍者時石霜遷化衆欲請堂中第一座接續住持峰云待某甲問過若會先師意一依先師事奉遂問云休去歇去一念萬年去寒灰枯木去口中泊瀑去一條白練去古廟裏香爐冷啾啾地去你作麼生會座云一色邊事峰云恁麼則未會先師意在座云你不肯我那裝香來我若不會先師意香煙起處脫去不得言訖脫去峰撫背云坐脫立亡則不無先師意未會在拈云九峰恁麼擔板第一座鐵打肝心檢點將來九峰有過且道過在甚處香煙起處普菴若許云蒼天蒼天逼人至死立亡坐脫不為奇石霜遷化少人知九峰師子連天吼剎那驚殺野狐狸舉教云未離兜率早降王宮未出母胎度人已畢拈云衆生與諸佛是諸法空相離降出度不生不滅雪埋糞坑不垢不淨擔水投河不增不減打開兜率露王宮摩耶夫人沒老去淨飯國王生太子字字言言説脫空噓舉玄沙雪峰遊山次玄沙云我如今大用去和尚且作麼生峰遂將三箇木毬一時拋沙作斫牌勢峰云你親到靈山方得如此玄沙云也只是自家底拈云雪峰玄沙父子同行遊山非二玄沙也忽然寐語雪峰又等間揑怪家活又不欠不少行貨且無買無賣當初若遇普菴未免一場敗闕玄沙大用雪峰三弄大地山河六遍震動舉教世尊初生一手指天一手指地周行七步目顧四方云天上天下唯我獨尊雲門云當時若教我見一棒打殺與狗子喫却貴圖天下太平拈云若是世尊應不初生又更伸手舉足目顧四方爭人奪我却向有佛處稱尊莫道雲門不放過驀拈拄杖瞪目周旋良久云慚愧且得十方常常清淨拋下拄杖子却問諸人還知落處麼若也未會説夢了也日裡不可道人夜裡不可説鬼無量劫來成道一時都在這裏舉丹霞訪忠國師逢國師侍者霞問國師在麼侍者云在即在佛眼亦不見霞云龍生龍子鳳生鳳兒侍者舉似國師國師打侍者二十拄杖拈云丹霞不會為客所以煩惱主人侍者學得國師語不會國師行却被丹霞將惡水潑一尚又復喫國師拄杖二十諸人且道國師打侍者有何意代云千手大悲也摸索不著三腳驢子弄蹄行只欲途中拶後生一片丹霞塵不染包藏萬有豈稱能舉玄沙上堂大衆集定驀拈拄杖趕散大衆後云老僧今日作一解險入地獄如箭射侍者云且喜和尚再復人身拈云人道玄沙不可得我道玄沙恰似一箇打野狸漢若救得玄沙出地獄便是解脫人若救不得隨他入地獄去魚在岸時活不久人落深淵當下亡川陸誰知同一性恰如地獄與天堂舉雪峰遷化玄沙為喪主集大衆煎茶拈起盞子云諸人若道得先師無過若道不得過在先師如是三問俱無對沙撲碎盞子歸方丈拈云我道玄沙不解作喪主所以道先師有過無過若會做喪主自合當連皮和骨一時埋却且要免得一場打家碎事驚嚇髑髏普菴既到這裡安可無聲將鼻孔云嗚呼哀哉伏惟尚饗無相光中弄影人形同異類性天真披毛戴角氷和水削髮披衣水合氷舉有僧遊五臺山問一婆子云臺山路向什麼處去婆子云驀直去僧便去婆子云又恁麼去也其僧舉似趙州州云我去勘破這婆子州明日便去問臺山路向什麼處去婆子云驀直去州便去婆子云又恁麼去也州歸謂僧曰我為汝勘破這婆子了也拈云無人知趙州不動步而到臺山不開口而勘破婆子了也諸人若信婆子道便驀直去若信不及又與麼去也古人遺意不留言婆子臺山著一邊識得臺山婆子了趙州消息沒休年舉趙州從諗禪師在南泉作火頭一日閉却門叫云救火救火衆皆到師曰道得即開門衆無對南泉將鎖匙於窗間過與師師便開門拈云明知趙州這老漢正在水裡火發叫起一隊半聾半瞽扶籬摸壁有什麼益處猶賴南泉腳跟不點地將水救水深慶無事趙州火急要人成大衆渾無半眼親騎箇金毛遊物外南泉滴滴意深深普菴家寶普菴家寶不著尋討迷時不見在處煩惱悟時無相如日杲杲取舍不得自然恰好誰生誰病誰死誰老達人無證凡夫顛倒日西道晚日東道早有睛無眼撞頭磕腦扶籬摸壁棄金抱草機關木人弄口叫好線牽則動索斷則倒撒放間處如第爛藁本自無形被他作造五彩妝來安名立號只欲瞞他何曾自保打閙過日全無倚靠問他貴姓口中便道草木李張適來方到有甚急事特來干冒衣食不足莫怪䀨澡人口不安田園旱潦賺埋公祖移墳修造被術人算年月不好朝山拜嶽何處不到未嘗感應至今囉噪又逢卦師胡言亂道速遷公祖更改門竈絲蠶天旺官祿便到但信八卦陰陽最好公卿宰相都是我振酌發稍輕搖頭擺腦贈他豐厚連聲道好因此貧窮日夕煩惱雪上加霜苦寒難保耳裡忽聞普菴得道捻土為香直須親到行來不覺鐘聲浩浩自心火急無人通報行童不管維那高傲息心定意低聲苦苦不久之間果見一老一條拄杖披一布襖竪箇指頭教我速道鼻孔遼天眼睛潦倒更不説錢也不愛寶不得妄想不得作造但識得心無法不到汝本是佛不須別討離諸名相法身自保生滅本無諸佛假號世出世相全無可道真實一心不空靈寶十方諸佛都有裏許一切幻緣此心無主幻化須盡心等太虗識得此心如琉璃珠隨色影現無著無去得意忘言了更無語亦無可舍亦無可取也不燒疏也不化紙設齋無眼供養蛇鼠布施不明却還沉墜雖是善因能招惡理公子王孫因修福慧持齋精進衣食布施才出頭來一切整備豈用埋尸卜度好地心若不善一切不利頭頭作業處處祭鬼枯骨消磨神識沉墜生不念善死地獄現在處慈悲來生方便不信佛法貧窮下賤萬中無一官人相現滿山滿嶺頭長觜尖撈魚置鳥歷劫相煎無一毫善皆是結冤不識父母叫喚喧天貪淫殺盜罪不可言陰振未滿王法牽纏心無一足煩惱連天因何不息澄淨心田若不飲酒智慧光鮮親近善者心自善妍若不食肉公婆不哭日夕心靈善神助福若不殺盜自身無惱行住坐臥心無煩惱若不邪淫淨行甚深精神勿虧身體安寧若不妄言常親貴侶守口如瓶不驚寒暑若不貪愛觸目便會見如不見背如不背若不嗔癡眼耳如泥天翻地覆我自不知若不惡口身如瓦狗人來不吠棒打不走若不兩舌無事間歇誰是誰非清風明月若不綺語身心一如所在尊貴為人中瑞十般不善在迷不見佛為分別覺悟自見依此修行見本來面大地含靈誰敢輕賤心共一心隨業轉變我若不如只管喫現我令始覺感佛方便翻十不善回向十善永不賺你天亦常願超出三界見佛知見凡夫肉眼非明不見無日月燈如黑漆面開眼見色色即歸空空中無得恰如無見開眼無見猶如無目見與不見全無可善眼不是眼見不是見空色無實不明方便達本了心是佛知見心若未了識業黑變今日安樂逐光隨現眼光落地黑暗周遍心思業顯雷奔閃電怕怖天地投誰發願百千刀輪火車掣電一剎那間魂識消散動經塵劫業無所間豈比世間公牽私絆哀哉衆生尚貪喫飯若還思死火急難辨五千教典祕言無限只為愚心習氣深慣已化聞經已身無難一人了達與衆除患不勸不善惡不消散若聞其聲何忍食由若見衆生死當助哭身衣口食難心自足直至到死神識纏逐隨念往生定入毛畜心不念佛鎮在牢獄心若念善善果善因笙笋笙竹不曾捻種遍地野菊耕田得禾耕畬得粟樂善天堂造惡地獄善惡無差由心直曲信佛拜泥轉轉昏迷信神燒紙自損穀皮信經讀字不干心事信道行淫只瞞自心信善貪財到死也呆信福殺盜不久惡報信是説非將油洗衣信罪不悔如飛蛾昧火爍油煎去了又來一似浮徒貪嗔癡愛前念作福後念受罪人不達理妄執神鬼人不會事梅上添醋急處鬪急好做不做見他富貴一心趍侍借口一文還十文利連妻帶子為他奴婢子細觀瞻丈夫意氣非我不非是我不是有無分定因果相繼懶惰貧窮精勤富貴修般若多獲慈悲惠今生和順在處恭敬來生佛國開發衆信習氣清淨行住皆定定中有慧慧體如鏡鏡不是鏡是非成病失却是非大圓智鏡若人全會何垢何淨本無背面光明性命性即佛性命即慧命非生非老誰死誰病包括有無無欠無剩風動塵起無有不應水陸色空血脈連通微塵不透不成正道影響無知猶如死尸頭上一劄却令眼眨腳下一針用口呻吟問病叫痛類同蠢動將假為身業力所成成應有壞有壞復形成有本空誰解通宗不宗為本無住為宗不空不住無異虗空快須薦取脫却樊籠古佛今佛因此大通釋迦親印猶如虗空如水中月應物標宗如水是體水月空同有無相貌二相皆同同則無礙有礙不中不中非佛佛亦無窮騰今耀古不受瞞籠萬法之母諸佛祖公若人了達便與佛同若人不了萬法盲聾猶如雜話枉費日工如是家寶永不空空究竟無説法本無空普菴和尚家寶示衆御製普菴至善弘仁圓通智慧寂感妙應慈濟真覺昭貺慧慶護國宣教大德菩薩讚朕惟佛道廣大周遍千經萬法無非勸善化惡濟度群生功德所及無有窮盡至善弘仁圓通智慧寂感妙應慈濟真覺昭貺慧慶護國宣教大德菩薩普菴實再來之佛也顯化於江西袁州慈化寺色相圓融福慧具足內含慈濟外示神通降伏妖魔消弭災厄遍遊剎土拯一切靈應昭彰妙不可測所垂寶訓一千六百餘言演無盡之宗旨發至妙之玄微廣大而無所不包精密而無所不備普為衆生作種種方便有能佩服奉持者如身遊寶藏各隨所欲皆獲如意如飢餐香積即得充飽苟不務此而欲求無上正真其猶冥行遠道塊坐暗室終無所益朕間窺真諦略究旨歸嘉興群生廣作利益善信之士能導此而行即得享福而獲吉違此弗守必至踏禍而召凶經曰積善之家必有餘慶積不善之家必有餘殃又曰作善降之百祥作不善降之百殃謹書其槩以詔將來并系之以讚曰如來顯化身無處不充滿功德利群生遍覆河沙界如如大覺師神通不思議示現出世間佛身即無二體相湛圓明摩尼紫金聚端嚴妙自在具足於福慧方便大慈悲誓願弘濟度普攝諸有情法力無不至祛邪滅妖魅弭災消疾癘洗滌諸罪愆吉祥獲如意訓戒垂真言悉發如來祕懇懇導冥愚切切化善類珠璣等金玉至寶無與比聞者與見者莫不生歡喜普勸諸善緣敬受此家寶善有不寶此技道終無濟譬猶入寶山獲寶方遂意有不獲寶者空歸意何益爰用作讚言光揚於永世翊贊我皇圖福德被一切
